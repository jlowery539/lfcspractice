cross reboots).</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Temporarily set SELinux to permissive for troubleshooting a blocked application, then re-enable enforcing once the issue is resolved.</p>", "procedure": "<ol>\n    <li>Temporarily switch to permissive (does not survive reboot):\n        <pre>sudo setenforce 0\ngetenforce   # Should show \"Permissive\"</pre>\n    </li>\n    <li>Switch back to enforcing:\n        <pre>sudo setenforce 1\ngetenforce   # Should show \"Enforcing\"</pre>\n    </li>\n    <li>For persistent change, edit the configuration:\n        <pre>sudo vi /etc/selinux/config\n# Set: SELINUX=permissive</pre>\n    </li>\n    <li>Set a single domain to permissive (more targeted approach):\n        <pre>sudo semanage permissive -a httpd_t\n# Only httpd_t domain runs in permissive; everything else enforces</pre>\n    </li>\n    <li>Remove per-domain permissive:\n        <pre>sudo semanage permissive -d httpd_t</pre>\n    </li>\n</ol>", "verification": "<pre>$ setenforce 0 && getenforce\nPermissive\n\n$ setenforce 1 && getenforce\nEnforcing</pre>", "solution": "<p>Per-domain permissive mode (<code>semanage permissive -a</code>) is preferred over system-wide permissive because it limits the security relaxation to only the problematic service.</p>"}}, {"id": 92, "section": 7, "title": "Lab 92: Understanding and Managing SELinux File Contexts", "shortTitle": "Understanding and Managing SELinux File Contexts", "fields": {"objective": "<p>View, set, and manage SELinux security contexts on files and directories to allow services proper access.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li><code>policycoreutils-python-utils</code> package (<code>semanage</code> command)</li>\n</ul>", "scenario": "<p>A web server cannot read files in a custom document root at <code>/custom/www</code> because the files have incorrect SELinux contexts.</p>", "procedure": "<ol>\n    <li>View current file contexts:\n        <pre>ls -Z /var/www/html/\n# Expected context type: httpd_sys_content_t</pre>\n    </li>\n    <li>Understand the context format: <code>user:role:type:level</code>\n        <pre># Example: unconfined_u:object_r:httpd_sys_content_t:s0</pre>\n    </li>\n    <li>Set the correct context for the custom directory:\n        <pre>sudo semanage fcontext -a -t httpd_sys_content_t \"/custom/www(/.*)?\"</pre>\n    </li>\n    <li>Apply the context to existing files:\n        <pre>sudo restorecon -Rv /custom/www/</pre>\n    </li>\n    <li>Verify:\n        <pre>ls -Z /custom/www/</pre>\n    </li>\n    <li>Use <code>chcon</code> for temporary changes (lost on <code>restorecon</code>):\n        <pre>sudo chcon -t httpd_sys_content_t /custom/www/index.html</pre>\n    </li>\n</ol>", "verification": "<pre>$ ls -Z /custom/www/\nunconfined_u:object_r:httpd_sys_content_t:s0 index.html</pre>", "solution": "<p>Always use <code>semanage fcontext</code> + <code>restorecon</code> for permanent context changes. <code>chcon</code> is temporary and will be undone by any relabeling operation.</p>"}}, {"id": 93, "section": 7, "title": "Lab 93: Restoring Default SELinux Contexts", "shortTitle": "Restoring Default SELinux Contexts", "fields": {"objective": "<p>Use <code>restorecon</code> to fix incorrect file contexts caused by moving files instead of copying them.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Files moved with <code>mv</code> to <code>/var/www/html/</code> have incorrect contexts (preserving their original context), causing Apache to return “403 Forbidden” errors.</p>", "procedure": "<ol>\n    <li>Demonstrate the difference between <code>mv</code> and <code>cp</code>:\n        <pre># cp creates new file → gets context from target directory\nsudo cp /root/index.html /var/www/html/\nls -Z /var/www/html/index.html\n# Shows: httpd_sys_content_t (correct)\n\n# mv preserves original context\nsudo mv /root/page.html /var/www/html/\nls -Z /var/www/html/page.html\n# Shows: admin_home_t (WRONG - from /root)</pre>\n    </li>\n    <li>Fix with restorecon:\n        <pre>sudo restorecon -v /var/www/html/page.html</pre>\n    </li>\n    <li>Recursive fix:\n        <pre>sudo restorecon -Rv /var/www/html/</pre>\n    </li>\n    <li>Full system relabel (slow, for major issues):\n        <pre>sudo touch /.autorelabel\nsudo reboot\n# Or:\nsudo fixfiles -F onboot\nsudo reboot</pre>\n    </li>\n    <li>Check what context a file should have:\n        <pre>matchpathcon /var/www/html/index.html</pre>\n    </li>\n</ol>", "verification": "<pre>$ sudo restorecon -v /var/www/html/page.html\nRelabeled /var/www/html/page.html from\n  unconfined_u:object_r:admin_home_t:s0 to\n  unconfined_u:object_r:httpd_sys_content_t:s0</pre>", "solution": "<p>Rule of thumb: <strong>copy</strong> files to web/service directories (gets correct context automatically) rather than <strong>move</strong> (preserves wrong context).</p>"}}, {"id": 94, "section": 7, "title": "Lab 94: Managing SELinux Booleans", "shortTitle": "Managing SELinux Booleans", "fields": {"objective": "<p>Use SELinux booleans to toggle policy features on and off for specific services.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Apache or Nginx installed for testing</li>\n</ul>", "scenario": "<p>Allow Apache to connect to the network (for reverse proxy functionality) and serve content from user home directories.</p>", "procedure": "<ol>\n    <li>List all booleans:\n        <pre>getsebool -a</pre>\n    </li>\n    <li>Search for httpd-related booleans:\n        <pre>getsebool -a | grep httpd</pre>\n    </li>\n    <li>Get detailed information about a boolean:\n        <pre>semanage boolean -l | grep httpd_can_network_connect</pre>\n    </li>\n    <li>Set a boolean temporarily (lost on reboot):\n        <pre>sudo setsebool httpd_can_network_connect on</pre>\n    </li>\n    <li>Set a boolean persistently:\n        <pre>sudo setsebool -P httpd_can_network_connect on\nsudo setsebool -P httpd_enable_homedirs on</pre>\n    </li>\n    <li>Verify:\n        <pre>getsebool httpd_can_network_connect\ngetsebool httpd_enable_homedirs</pre>\n    </li>\n</ol>", "verification": "<pre>$ getsebool httpd_can_network_connect\nhttpd_can_network_connect --> on\n\n$ getsebool httpd_enable_homedirs\nhttpd_enable_homedirs --> on</pre>", "solution": "<p>Always use <code>-P</code> (persistent) flag for booleans that should survive reboots. Without <code>-P</code>, the change is lost on next boot.</p>"}}, {"id": 95, "section": 7, "title": "Lab 95: Troubleshooting SELinux Denials with audit2why and sealert", "shortTitle": "Troubleshooting SELinux Denials with audit2why and sealert", "fields": {"objective": "<p>Analyze SELinux AVC (Access Vector Cache) denials and determine the correct solution using audit tools.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Packages: <code>policycoreutils-python-utils</code>, <code>setroubleshoot-server</code></li>\n</ul>", "scenario": "<p>An application is being blocked by SELinux. You need to find the denial in the audit log, understand why it was blocked, and implement the correct fix.</p>", "procedure": "<ol>\n    <li>Generate a denial (e.g., Apache trying to read from <code>/opt/data</code>):\n        <pre>sudo mkdir -p /opt/data\necho \"test\" | sudo tee /opt/data/index.html\n# Configure Apache to serve from /opt/data (will fail with SELinux)</pre>\n    </li>\n    <li>Check the audit log for AVC denials:\n        <pre>sudo ausearch -m AVC -ts recent</pre>\n    </li>\n    <li>Pipe to audit2why for an explanation:\n        <pre>sudo ausearch -m AVC -ts recent | audit2why</pre>\n    </li>\n    <li>Use sealert for detailed analysis with suggested fixes:\n        <pre>sudo dnf install setroubleshoot-server\nsudo sealert -a /var/log/audit/audit.log</pre>\n    </li>\n    <li>Follow the recommended fix (typically a context change or boolean).</li>\n</ol>", "verification": "<pre>$ sudo ausearch -m AVC -ts recent | audit2why\ntype=AVC msg=audit(...): avc:  denied  { read } for pid=1234\n  comm=\"httpd\" name=\"index.html\" dev=\"sda2\" ino=567890\n  scontext=system_u:system_r:httpd_t:s0\n  tcontext=unconfined_u:object_r:usr_t:s0\n\n  Was caused by:\n    Missing type enforcement (TE) allow rule.\n    You can use audit2allow to generate a loadable module.</pre>", "solution": "<p>The most common fixes are: (1) set the correct file context with <code>semanage fcontext</code>, (2) enable a boolean with <code>setsebool</code>, or (3) create a custom policy module with <code>audit2allow</code>.</p>"}}, {"id": 96, "section": 7, "title": "Lab 96: Creating Custom SELinux Policy Modules", "shortTitle": "Creating Custom SELinux Policy Modules", "fields": {"objective": "<p>Generate and install custom SELinux policy modules using <code>audit2allow</code> when no boolean or context change resolves the denial.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Packages: <code>policycoreutils-python-utils</code>, <code>checkpolicy</code></li>\n</ul>", "scenario": "<p>A custom application needs a policy exception that no existing boolean can satisfy. You must create a minimal custom policy module.</p>", "procedure": "<ol>\n    <li>Set the domain to permissive to collect all denials:\n        <pre>sudo semanage permissive -a myapp_t</pre>\n    </li>\n    <li>Exercise the application to generate all needed denials.</li>\n    <li>Generate the policy module:\n        <pre>sudo ausearch -m AVC -ts recent | audit2allow -m myapp > myapp.te</pre>\n    </li>\n    <li>Review the type enforcement file:\n        <pre>cat myapp.te</pre>\n    </li>\n    <li>Compile the module:\n        <pre>checkmodule -M -m -o myapp.mod myapp.te</pre>\n    </li>\n    <li>Package the module:\n        <pre>semodule_package -o myapp.pp -m myapp.mod</pre>\n    </li>\n    <li>Install the module:\n        <pre>sudo semodule -i myapp.pp</pre>\n    </li>\n    <li>Verify and remove permissive domain:\n        <pre>sudo semodule -l | grep myapp\nsudo semanage permissive -d myapp_t</pre>\n    </li>\n</ol>", "verification": "<pre>$ sudo semodule -l | grep myapp\nmyapp</pre>", "solution": "<p>Custom modules should be as minimal as possible. Always review the <code>.te</code> file to ensure it does not grant excessive permissions.</p>"}}, {"id": 97, "section": 7, "title": "Lab 97: Managing SELinux Port Contexts", "shortTitle": "Managing SELinux Port Contexts", "fields": {"objective": "<p>Add and manage SELinux port labels to allow services to listen on non-standard ports.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Apache or another web server installed</li>\n</ul>", "scenario": "<p>Run Apache on port 8888. SELinux blocks services from binding to non-standard ports by default.</p>", "procedure": "<ol>\n    <li>Configure Apache to listen on port 8888 and attempt to start:\n        <pre>sudo vi /etc/httpd/conf/httpd.conf\n# Change: Listen 8888\nsudo systemctl restart httpd\n# Fails with \"Permission denied\" - SELinux blocks it</pre>\n    </li>\n    <li>Check which ports are allowed for HTTP:\n        <pre>sudo semanage port -l | grep http_port_t</pre>\n    </li>\n    <li>Add port 8888 to the HTTP port type:\n        <pre>sudo semanage port -a -t http_port_t -p tcp 8888</pre>\n    </li>\n    <li>Verify and restart:\n        <pre>sudo semanage port -l | grep http_port_t\nsudo systemctl restart httpd</pre>\n    </li>\n    <li>Remove a custom port:\n        <pre>sudo semanage port -d -t http_port_t -p tcp 8888</pre>\n    </li>\n</ol>", "verification": "<pre>$ sudo semanage port -l | grep http_port_t\nhttp_port_t   tcp   8888, 80, 81, 443, 488, 8008, 8009, 8443, 9000\n\n$ sudo systemctl status httpd\n● httpd.service - The Apache HTTP Server\n     Active: active (running)</pre>", "solution": "<p>If a port is already assigned to another type, use <code>semanage port -m</code> (modify) instead of <code>-a</code> (add).</p>"}}, {"id": 98, "section": 7, "title": "Lab 98: Configuring SELinux for a Custom Application", "shortTitle": "Configuring SELinux for a Custom Application", "fields": {"objective": "<p>Set up complete SELinux configuration for a custom web application, combining file contexts, port labels, booleans, and service integration.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>A custom application directory and service</li>\n</ul>", "scenario": "<p>Deploy a Node.js application at <code>/opt/nodeapp</code> on port 3000 with proper SELinux contexts, ensuring it can connect to a backend database and serve content with SELinux in enforcing mode.</p>", "procedure": "<ol>\n    <li>Create the application directory and set file contexts:\n        <pre>sudo mkdir -p /opt/nodeapp\nsudo semanage fcontext -a -t httpd_sys_content_t \"/opt/nodeapp(/.*)?\"\nsudo restorecon -Rv /opt/nodeapp</pre>\n    </li>\n    <li>Add the non-standard port:\n        <pre>sudo semanage port -a -t http_port_t -p tcp 3000</pre>\n    </li>\n    <li>Enable necessary booleans:\n        <pre>sudo setsebool -P httpd_can_network_connect on\nsudo setsebool -P httpd_can_network_connect_db on</pre>\n    </li>\n    <li>Create a systemd service with proper SELinux context:\n        <pre>sudo vi /etc/systemd/system/nodeapp.service</pre>\n        <pre>[Unit]\nDescription=Node.js Application\nAfter=network.target\n\n[Service]\nType=simple\nUser=nodeapp\nWorkingDirectory=/opt/nodeapp\nExecStart=/usr/bin/node /opt/nodeapp/server.js\nRestart=on-failure\nSELinuxContext=system_u:system_r:httpd_t:s0\n\n[Install]\nWantedBy=multi-user.target</pre>\n    </li>\n    <li>Start and verify with SELinux enforcing:\n        <pre>sudo systemctl daemon-reload\nsudo systemctl start nodeapp\ngetenforce   # Confirm still Enforcing\ncurl http://localhost:3000</pre>\n    </li>\n</ol>", "verification": "<pre>$ getenforce\nEnforcing\n\n$ sudo systemctl status nodeapp\n● nodeapp.service - Node.js Application\n     Active: active (running)\n\n$ curl http://localhost:3000\n(application response)</pre>", "solution": "<p>A complete SELinux-aware deployment combines: file contexts (<code>semanage fcontext</code>), port labels (<code>semanage port</code>), booleans (<code>setsebool</code>), and service context (<code>SELinuxContext=</code> in the unit file).</p>"}}, {"id": 99, "section": 7, "title": "Lab 99: Managing SELinux User Mappings", "shortTitle": "Managing SELinux User Mappings", "fields": {"objective": "<p>Map Linux users to SELinux users to enforce mandatory access controls on user activities, such as preventing privilege escalation.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>A test user account</li>\n</ul>", "scenario": "<p>Restrict a user so they cannot run unconfined processes, use <code>sudo</code>, or escalate privileges, even if they know the root password.</p>", "procedure": "<ol>\n    <li>List current SELinux login mappings:\n        <pre>sudo semanage login -l</pre>\n    </li>\n    <li>List available SELinux users:\n        <pre>sudo semanage user -l</pre>\n    </li>\n    <li>Map a Linux user to a restricted SELinux user:\n        <pre>sudo semanage login -a -s user_u testuser</pre>\n    </li>\n    <li>Verify the mapping:\n        <pre>sudo semanage login -l | grep testuser</pre>\n    </li>\n    <li>Test as the restricted user:\n        <pre>su - testuser\nid -Z\n# Should show: user_u:user_r:user_t:s0\n\nsudo ls /root\n# Should be denied — user_u cannot use sudo\n\nsu - root\n# Should be denied — user_u cannot use su</pre>\n    </li>\n    <li>Understand the SELinux user types:\n        <ul>\n            <li><strong>unconfined_u</strong>: No SELinux restrictions (default for most users)</li>\n            <li><strong>user_u</strong>: Cannot use sudo, su, or run setuid programs</li>\n            <li><strong>staff_u</strong>: Can use sudo for specific commands; limited escalation</li>\n            <li><strong>sysadm_u</strong>: Full system administration access within SELinux policy</li>\n        </ul>\n    </li>\n    <li>Remove the mapping to restore default behavior:\n        <pre>sudo semanage login -d testuser</pre>\n    </li>\n</ol>", "verification": "<pre>$ sudo semanage login -l\nLogin Name       SELinux User     MLS/MCS Range    Service\n__default__      unconfined_u     s0-s0:c0.c1023   *\nroot             unconfined_u     s0-s0:c0.c1023   *\ntestuser         user_u           s0               *\n\n$ su - testuser -c \"id -Z\"\nuser_u:user_r:user_t:s0</pre>", "solution": "<p>SELinux user mappings provide a powerful layer of access control beyond traditional Unix permissions. Mapping untrusted users to <code>user_u</code> prevents privilege escalation regardless of file permissions or sudo configuration.</p>"}}, {"id": 100, "section": 7, "title": "Lab 100: Comprehensive SELinux Troubleshooting Challenge", "shortTitle": "Comprehensive SELinux Troubleshooting Challenge", "fields": {"objective": "<p>Apply all SELinux skills to diagnose and fix a complex, multi-issue scenario involving a web application with several SELinux problems simultaneously.</p>", "prerequisites": "<ul>\n    <li>All SELinux skills from Labs 90–99</li>\n    <li>Root or sudo access</li>\n    <li>Apache (httpd) installed</li>\n</ul>", "scenario": "<p>A web application deployment has multiple SELinux issues causing it to fail completely. The application has: (1) wrong file contexts on its document root, (2) a non-standard listening port, (3) a need to connect to a remote database, and (4) CGI scripts that are blocked. You must fix all four issues with SELinux remaining in enforcing mode.</p>", "procedure": "<ol>\n    <li><strong>Issue 1 — Fix file contexts on the custom document root:</strong>\n        <pre># Diagnose\nls -Z /opt/webapp/\n# Shows: default_t (wrong)\n\n# Fix\nsudo semanage fcontext -a -t httpd_sys_content_t \"/opt/webapp(/.*)?\"\nsudo restorecon -Rv /opt/webapp/\n\n# Verify\nls -Z /opt/webapp/\n# Should show: httpd_sys_content_t</pre>\n    </li>\n    <li><strong>Issue 2 — Add the custom port (9090):</strong>\n        <pre># Diagnose\nsudo semanage port -l | grep 9090\n# (no output — port not labeled)\n\n# Fix\nsudo semanage port -a -t http_port_t -p tcp 9090\n\n# Verify\nsudo semanage port -l | grep http_port_t\n# Should include 9090</pre>\n    </li>\n    <li><strong>Issue 3 — Enable database network access:</strong>\n        <pre># Diagnose\ngetsebool httpd_can_network_connect_db\n# Shows: off\n\n# Fix\nsudo setsebool -P httpd_can_network_connect_db on\n\n# Verify\ngetsebool httpd_can_network_connect_db\n# Should show: on</pre>\n    </li>\n    <li><strong>Issue 4 — Resolve CGI script denial:</strong>\n        <pre># Diagnose\nsudo ausearch -m AVC -ts recent | grep cgi | audit2why\n\n# Fix — try the boolean first\nsudo setsebool -P httpd_enable_cgi on\n\n# If boolean is not sufficient, create a custom policy:\nsudo ausearch -m AVC -ts recent | audit2allow -m webapp_cgi > webapp_cgi.te\ncheckmodule -M -m -o webapp_cgi.mod webapp_cgi.te\nsemodule_package -o webapp_cgi.pp -m webapp_cgi.mod\nsudo semodule -i webapp_cgi.pp</pre>\n    </li>\n    <li><strong>Final verification — Confirm everything works with SELinux enforcing:</strong>\n        <pre>getenforce   # Must be \"Enforcing\"\nsudo systemctl restart httpd\ncurl http://localhost:9090\ncurl http://localhost:9090/cgi-bin/test.cgi\n\n# Confirm no new AVC denials\nsudo ausearch -m AVC -ts recent\n# Should show no new denials related to httpd</pre>\n    </li>\n    <li><strong>Document all changes:</strong>\n        <pre># List all custom file contexts\nsudo semanage fcontext -lC\n\n# List all custom port labels\nsudo semanage port -lC\n\n# List all non-default booleans\nsudo semanage boolean -lC\n\n# List all custom policy modules\nsudo semodule -l | grep webapp</pre>\n    </li>\n</ol>", "verification": "<pre>$ getenforce\nEnforcing\n\n$ curl http://localhost:9090\n(web application home page)\n\n$ curl http://localhost:9090/cgi-bin/test.cgi\n(CGI script output)\n\n$ sudo ausearch -m AVC -ts recent | grep httpd\n(no denials)\n\n$ sudo semanage fcontext -lC\n/opt/webapp(/.*)?    all files    system_u:object_r:httpd_sys_content_t:s0\n\n$ sudo semanage port -lC\nhttp_port_t    tcp    9090\n\n$ sudo semanage boolean -lC\nhttpd_can_network_connect_db (on, on)\nhttpd_enable_cgi             (on, on)</pre>", "solution": "<p>This comprehensive exercise demonstrates the systematic approach to SELinux troubleshooting: (1) identify denials with <code>ausearch</code> and <code>audit2why</code>, (2) determine the correct fix (context, port, boolean, or custom module), (3) apply the fix, (4) verify with SELinux enforcing, and (5) document all changes for compliance and future reference.</p>"}}];
var SECTIONS=[{"title": "Section 1: Configure Kernel Parameters, Persistent and Non-Persistent", "shortTitle": "Kernel Parameters", "labRange": "Labs 1-13", "labCount": 13}, {"title": "Section 2: Diagnose, Identify, Manage, and Troubleshoot Processes and Services", "shortTitle": "Process & Services", "labRange": "Labs 14-28", "labCount": 15}, {"title": "Section 3: Manage or Schedule Jobs for Executing Commands", "shortTitle": "Job Scheduling", "labRange": "Labs 29-40", "labCount": 12}, {"title": "Section 4: Search for, Install, Validate, and Maintain Software Packages", "shortTitle": "Package Management", "labRange": "Labs 41-53", "labCount": 13}, {"title": "Section 5: Recover from Hardware, Operating System, or Filesystem Failures", "shortTitle": "System Recovery", "labRange": "Labs 54-65", "labCount": 12}, {"title": "Section 6: Manage Virtual Machines — Libvirt", "shortTitle": "Virtualization / libvirt", "labRange": "Labs 66-77", "labCount": 12}, {"title": "Section 7: Configure Container Engines, Create and Manage Containers", "shortTitle": "Container Engines", "labRange": "Labs 78-89", "labCount": 12}, {"title": "Section 8: Create and Enforce MAC Using SELinux", "shortTitle": "SELinux", "labRange": "Labs 90-100", "labCount": 11}];
var active=null;
var done=JSON.parse(localStorage.getItem('lfcs_done')||'{}');
var expanded=JSON.parse(localStorage.getItem('lfcs_exp')||'{}');
var SEC_DESCS=["View, modify, and persist kernel parameters using sysctl, /proc/sys, GRUB, and kernel modules.","Use ps, top, systemd, and journalctl to diagnose, manage, and troubleshoot processes and services.","Schedule recurring and one-time tasks with cron, at, anacron, and systemd timers.","Search, install, verify, downgrade, and manage packages with dnf, apt, rpm, and dpkg.","Boot into rescue mode, reset passwords, repair filesystems, fix GRUB, and recover LVM volumes.","Install KVM/libvirt, create VMs, manage snapshots, networking, storage, and VM resources.","Install Podman, pull images, build containers, manage pods, networking, and rootless containers.","Check SELinux status, manage contexts and booleans, troubleshoot denials, create custom policies."];
var SEC_ICONS=["cpu","activity","clock","package","shield-alert","monitor","container","lock"];
var SEC_COLORS=["#3b82f6","#8b5cf6","#f59e0b","#10b981","#ef4444","#06b6d4","#ec4899","#f97316"];
var FORDER=["objective","scenario","prerequisites","procedure","verification","solution"];
var FICONS={objective:"target",scenario:"book-open",prerequisites:"list-checks",procedure:"list-ordered",verification:"check-circle",solution:"code"};
var FCOL={objective:"#3b82f6",scenario:"#8b5cf6",prerequisites:"#f59e0b",procedure:"#10b981",verification:"#06b6d4",solution:"#ef4444"};
var FCLS={objective:"obj",scenario:"scn",prerequisites:"pre",procedure:"prc",verification:"ver",solution:"sol"};

document.addEventListener('DOMContentLoaded',function(){
  lucide.createIcons();
  buildNav();
  handleHash();
  setupEvts();
  updProg();
  if(window.innerWidth<=768) document.getElementById('close-btn').style.display='block';
});
window.addEventListener('hashchange',handleHash);
window.addEventListener('resize',function(){document.getElementById('close-btn').style.display=window.innerWidth<=768?'block':'none'});

function buildNav(){
  var nav=document.getElementById('sidebar-scroll');
  nav.innerHTML='';
  SECTIONS.forEach(function(sec,si){
    var isExp=expanded[si]!==false;
    var sLabs=LABS.filter(function(l){return l.section===si});
    var h=document.createElement('div');
    h.className='sec-hdr';
    h.dataset.si=si;
    h.innerHTML='<i data-lucide="'+(isExp?'chevron-down':'chevron-right')+'" class="w-4 h-4 sch" style="color:#64748b;flex-shrink:0"></i><span style="font-size:11px;font-weight:600;color:#64748b;letter-spacing:.04em">S'+(si+1)+'</span><span style="font-size:13px;font-weight:500;color:#cbd5e1;flex:1">'+sec.shortTitle+'</span><span style="font-size:11px;color:#475569">'+sLabs.length+'</span>';
    nav.appendChild(h);
    var ul=document.createElement('div');
    ul.className='sec-labs'+(isExp?'':' shut');
    ul.id='sl-'+si;
    ul.style.maxHeight=isExp?(sLabs.length*36)+'px':'0';
    sLabs.forEach(function(lab){
      var d=document.createElement('div');
      d.className='lab-link'+(active===lab.id?' on':'');
      d.dataset.lab=lab.id;
      d.innerHTML='<div class="chk'+(done[lab.id]?' done':'')+'" data-ck="'+lab.id+'"></div><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><span style="color:#64748b;font-weight:500">'+lab.id+'.</span> '+lab.shortTitle+'</span>';
      ul.appendChild(d);
    });
    nav.appendChild(ul);
  });
  lucide.createIcons();
}

function filterNav(q){
  q=q.toLowerCase();
  SECTIONS.forEach(function(sec,si){
    var ul=document.getElementById('sl-'+si);
    var links=ul.querySelectorAll('.lab-link');
    var vis=0;
    links.forEach(function(lk){
      var lab=LABS.find(function(l){return l.id===parseInt(lk.dataset.lab)});
      var m=!q||lab.title.toLowerCase().indexOf(q)>=0;
      lk.style.display=m?'flex':'none';
      if(m) vis++;
    });
    if(q){ul.classList.remove('shut');ul.style.maxHeight=(vis*36)+'px'}
    else{
      var isExp=expanded[si]!==false;
      if(!isExp){ul.classList.add('shut');ul.style.maxHeight='0'}
      else{ul.style.maxHeight=(links.length*36)+'px'}
    }
  });
}

function setupEvts(){
  document.getElementById('sidebar-scroll').addEventListener('click',function(e){
    var hdr=e.target.closest('.sec-hdr');
    if(hdr){
      var si=parseInt(hdr.dataset.si);
      var ul=document.getElementById('sl-'+si);
      var shut=ul.classList.contains('shut');
      if(shut){ul.classList.remove('shut');ul.style.maxHeight=(LABS.filter(function(l){return l.section===si}).length*36)+'px';expanded[si]=true}
      else{ul.classList.add('shut');ul.style.maxHeight='0';expanded[si]=false}
      localStorage.setItem('lfcs_exp',JSON.stringify(expanded));
      var ch=hdr.querySelector('.sch');
      if(ch){ch.setAttribute('data-lucide',shut?'chevron-down':'chevron-right');lucide.createIcons()}
      return;
    }
    var ck=e.target.closest('.chk');
    if(ck){togDone(parseInt(ck.dataset.ck));e.stopPropagation();return}
    var lk=e.target.closest('.lab-link');
    if(lk) selLab(parseInt(lk.dataset.lab));
  });
  document.getElementById('q').addEventListener('input',function(e){filterNav(e.target.value)});
  document.getElementById('menu-btn').addEventListener('click',function(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show')});
  document.getElementById('close-btn').addEventListener('click',closeMenu);
  document.getElementById('overlay').addEventListener('click',closeMenu);
  document.addEventListener('keydown',function(e){
    if(e.target.tagName==='INPUT') return;
    if(e.key==='j'||e.key==='ArrowDown'){e.preventDefault();navLab(1)}
    if(e.key==='k'||e.key==='ArrowUp'){e.preventDefault();navLab(-1)}
  });
}

function closeMenu(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show')}

function selLab(id){active=id;location.hash='lab-'+id;renderLab(id);hiActive(id);document.getElementById('main').scrollTop=0;closeMenu()}

function handleHash(){
  var h=location.hash;
  if(h.indexOf('#lab-')===0){
    var id=parseInt(h.replace('#lab-',''));
    var lab=LABS.find(function(l){return l.id===id});
    if(lab){active=id;expanded[lab.section]=true;localStorage.setItem('lfcs_exp',JSON.stringify(expanded));buildNav();renderLab(id);hiActive(id);return}
  }
  renderLanding();
}

function navLab(dir){
  if(!active){if(dir>0) selLab(1);return}
  var idx=LABS.findIndex(function(l){return l.id===active});
  var nx=idx+dir;
  if(nx>=0&&nx<LABS.length) selLab(LABS[nx].id);
}

function hiActive(id){
  document.querySelectorAll('.lab-link').forEach(function(el){el.classList.toggle('on',parseInt(el.dataset.lab)===id)});
  var a=document.querySelector('.lab-link.on');
  if(a) a.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function togDone(id){
  done[id]=!done[id];
  localStorage.setItem('lfcs_done',JSON.stringify(done));
  updProg();
  var ck=document.querySelector('.chk[data-ck="'+id+'"]');
  if(ck) ck.classList.toggle('done',done[id]);
  var btn=document.getElementById('cbtn');
  if(btn&&active===id){btn.textContent=done[id]?'\u2713 Completed':'Mark Complete';btn.style.background=done[id]?'#10b981':'#3b82f6'}
}

function updProg(){
  var c=Object.values(done).filter(Boolean).length;
  document.getElementById('ptxt').textContent=c+' / 100';
  document.getElementById('pfill').style.width=c+'%';
}

function renderLanding(){
  active=null;history.replaceState(null,'',location.pathname);
  document.querySelectorAll('.lab-link').forEach(function(el){el.classList.remove('on')});
  var td=Object.values(done).filter(Boolean).length;
  var cards='';
  SECTIONS.forEach(function(sec,i){
    var ld=LABS.filter(function(l){return l.section===i&&done[l.id]}).length;
    cards+='<div class="scard" data-sc="'+i+'"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="background:'+SEC_COLORS[i]+'18;border-radius:8px;padding:7px;display:flex"><i data-lucide="'+SEC_ICONS[i]+'" class="w-5 h-5" style="color:'+SEC_COLORS[i]+'"></i></div><div style="flex:1"><div style="font-size:10px;font-weight:600;color:#94a3b8;letter-spacing:.04em">SECTION '+(i+1)+'</div><div style="font-weight:600;color:#1e293b;font-size:15px">'+sec.shortTitle+'</div></div><div style="text-align:right"><div style="font-size:18px;font-weight:700;color:'+SEC_COLORS[i]+'">'+sec.labCount+'</div><div style="font-size:10px;color:#94a3b8">labs</div></div></div><p style="font-size:13px;color:#475569;line-height:1.55;margin-bottom:8px">'+SEC_DESCS[i]+'</p><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#94a3b8">'+sec.labRange+'</span><span style="font-size:12px;color:'+(ld===sec.labCount?'#10b981':'#94a3b8')+'">'+ld+' / '+sec.labCount+' done</span></div></div>';
  });
  document.getElementById('content').innerHTML='<div style="text-align:center;padding:36px 0 28px"><div style="display:inline-flex;align-items:center;justify-content:center;background:#1e3a5a;border-radius:14px;padding:12px;margin-bottom:16px"><i data-lucide="terminal" class="w-7 h-7" style="color:#60a5fa"></i></div><h1 style="font-size:26px;font-weight:700;color:#0f172a;margin-bottom:6px">LFCS Operations Deployment</h1><p style="font-size:15px;color:#64748b;margin-bottom:20px">100 Hands-On Lab Exercises</p><div style="display:flex;justify-content:center;gap:28px;flex-wrap:wrap"><div><div style="font-size:26px;font-weight:700;color:#3b82f6">100</div><div style="font-size:11px;color:#94a3b8">Labs</div></div><div><div style="font-size:26px;font-weight:700;color:#8b5cf6">8</div><div style="font-size:11px;color:#94a3b8">Sections</div></div><div><div style="font-size:26px;font-weight:700;color:#10b981">'+td+'</div><div style="font-size:11px;color:#94a3b8">Completed</div></div><div><div style="font-size:26px;font-weight:700;color:#f59e0b">120m</div><div style="font-size:11px;color:#94a3b8">Exam Time</div></div></div></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px">'+cards+'</div><div style="margin-top:24px;padding:16px;background:#fff;border-radius:10px;border:1px solid #e2e8f0"><p style="font-size:13px;color:#475569;line-height:1.6"><strong style="color:#1e293b">Keyboard shortcuts:</strong> <kbd style="background:#f1f5f9;padding:2px 5px;border-radius:3px;font-size:11px;border:1px solid #e2e8f0">j</kbd> / <kbd style="background:#f1f5f9;padding:2px 5px;border-radius:3px;font-size:11px;border:1px solid #e2e8f0">k</kbd> navigate labs &middot; Click any section card to start.</p></div>';
  lucide.createIcons();
  document.querySelectorAll('.scard[data-sc]').forEach(function(c){
    c.addEventListener('click',function(){
      var si=parseInt(c.dataset.sc);
      var fl=LABS.find(function(l){return l.section===si});
      if(fl){expanded[si]=true;localStorage.setItem('lfcs_exp',JSON.stringify(expanded));buildNav();selLab(fl.id)}
    });
  });
}

function renderLab(id){
  var lab=LABS.find(function(l){return l.id===id});
  if(!lab) return;
  var sec=SECTIONS[lab.section];
  var ic=done[id]===true;
  var li=LABS.findIndex(function(l){return l.id===id});
  var pv=li>0?LABS[li-1]:null;
  var nx=li<LABS.length-1?LABS[li+1]:null;
  var h='<div style="margin-bottom:6px"><span style="font-size:12px;color:#94a3b8;cursor:pointer" id="bhome">Home</span><span style="font-size:12px;color:#cbd5e1"> / </span><span style="font-size:12px;color:#3b82f6">Section '+(lab.section+1)+': '+sec.shortTitle+'</span></div>';
  h+='<h1 style="font-size:22px;font-weight:700;color:#0f172a;margin-bottom:14px;line-height:1.3">'+lab.title+'</h1>';
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px"><button id="cbtn" style="padding:7px 14px;border-radius:7px;border:none;color:#fff;font-size:13px;font-weight:500;cursor:pointer;background:'+(ic?'#10b981':'#3b82f6')+'">'+(ic?'\u2713 Completed':'Mark Complete')+'</button><span style="font-size:13px;color:#94a3b8">Lab '+id+' of 100</span></div>';
  FORDER.forEach(function(f){
    if(!lab.fields[f]) return;
    var isSol=f==='solution';
    h+='<div class="fcard '+FCLS[f]+'">';
    if(isSol){
      h+='<div class="fl sol-tog" data-tg="sb-'+id+'" style="color:'+FCOL[f]+';cursor:pointer"><i data-lucide="'+FICONS[f]+'" class="w-4 h-4"></i>'+f.charAt(0).toUpperCase()+f.slice(1)+'<i data-lucide="chevron-right" class="w-4 h-4 sol-ch" style="margin-left:auto;transition:transform .2s"></i></div>';
      h+='<div class="sol-body shut" id="sb-'+id+'" style="max-height:0"><div class="lc" style="padding-top:6px">'+lab.fields[f]+'</div></div>';
    } else {
      h+='<div class="fl" style="color:'+FCOL[f]+'"><i data-lucide="'+FICONS[f]+'" class="w-4 h-4"></i>'+f.charAt(0).toUpperCase()+f.slice(1)+'</div><div class="lc">'+lab.fields[f]+'</div>';
    }
    h+='</div>';
  });
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:16px;border-top:1px solid #e2e8f0">';
  h+='<button class="nb" id="pbtn" '+(pv?'data-lab="'+pv.id+'"':'disabled')+'><i data-lucide="arrow-left" class="w-4 h-4"></i>'+(pv?'Lab '+pv.id:'Start')+'</button>';
  h+='<button class="nb" id="nbtn" '+(nx?'data-lab="'+nx.id+'"':'disabled')+'>'+(nx?'Lab '+nx.id:'End')+'<i data-lucide="arrow-right" class="w-4 h-4"></i></button>';
  h+='</div>';
  document.getElementById('content').innerHTML=h;
  lucide.createIcons();
  addCopy();
  document.getElementById('cbtn').addEventListener('click',function(){togDone(id)});
  document.getElementById('bhome').addEventListener('click',function(){renderLanding();document.getElementById('main').scrollTop=0});
  var pb=document.getElementById('pbtn');
  if(pb&&pb.dataset.lab) pb.addEventListener('click',function(){selLab(parseInt(pb.dataset.lab))});
  var nb=document.getElementById('nbtn');
  if(nb&&nb.dataset.lab) nb.addEventListener('click',function(){selLab(parseInt(nb.dataset.lab))});
  document.querySelectorAll('.sol-tog').forEach(function(t){
    t.addEventListener('click',function(){
      var tgt=document.getElementById(t.dataset.tg);
      var shut=tgt.classList.contains('shut');
      if(shut){tgt.classList.remove('shut');tgt.style.maxHeight=tgt.scrollHeight+'px';var ch=t.querySelector('.sol-ch');if(ch) ch.style.transform='rotate(90deg)'}
      else{tgt.classList.add('shut');tgt.style.maxHeight='0';var ch=t.querySelector('.sol-ch');if(ch) ch.style.transform=''}
    });
  });
}

function addCopy(){
  document.querySelectorAll('#content pre').forEach(function(p){
    if(p.querySelector('.cp-btn')) return;
    var b=document.createElement('button');
    b.className='cp-btn';
    b.textContent='Copy';
    b.addEventListener('click',function(e){
      e.stopPropagation();
      var txt=p.textContent.replace('Copy','').replace('Copied!','').trim();
      navigator.clipboard.writeText(txt).then(function(){b.textContent='Copied!';setTimeout(function(){b.textContent='Copy'},1500)});
    });
    p.appendChild(b);
  });
}
</script>
</body>
</html>
