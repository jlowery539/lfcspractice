scheduling methods: full backup on Sunday at 1 AM (cron), incremental backup every 6 hours (systemd timer), a one-time migration job at the next maintenance window (at), and monthly cleanup of old backups (systemd calendar timer).</p>", "procedure": "<ol>\n    <li>Create the weekly full backup cron job:\n        <pre>sudo crontab -e\n0 1 * * 0 /opt/scripts/full-backup.sh >> /var/log/backup-full.log 2>&1</pre>\n    </li>\n    <li>Create the incremental backup systemd timer:\n        <pre># /etc/systemd/system/incremental-backup.timer\n[Timer]\nOnBootSec=10min\nOnUnitActiveSec=6h\n[Install]\nWantedBy=timers.target</pre>\n    </li>\n    <li>Schedule the one-time migration job:\n        <pre>echo \"/opt/scripts/migrate-data.sh\" | at 2:00 AM May 3</pre>\n    </li>\n    <li>Create the monthly cleanup timer:\n        <pre># /etc/systemd/system/backup-cleanup.timer\n[Timer]\nOnCalendar=monthly\nPersistent=true\n[Install]\nWantedBy=timers.target</pre>\n    </li>\n    <li>Verify all scheduled tasks:\n        <pre>sudo crontab -l\nsystemctl list-timers --all\natq</pre>\n    </li>\n</ol>", "verification": "<p>All four methods should be visible in their respective query commands. Each log file should be created on first execution.</p>", "solution": "<pre>$ sudo crontab -l\n0 1 * * 0 /opt/scripts/full-backup.sh >> /var/log/backup-full.log 2>&1\n\n$ systemctl list-timers | grep backup\nWed 2026-04-29 11:42:00 EDT ...  incremental-backup.timer\nFri 2026-05-01 00:00:00 EDT ...  backup-cleanup.timer\n\n$ atq\n9    Sun May  3 02:00:00 2026 a root</pre>"}}, {"id": 41, "section": 3, "title": "Lab 41: Searching for Packages with dnf (RHEL/Rocky)", "shortTitle": "Searching for Packages with dnf (RHEL/Rocky)", "fields": {"objective": "<p>Search and discover packages using <code>dnf</code> subcommands including <code>search</code>, <code>info</code>, <code>provides</code>, and <code>repoquery</code>.</p>", "prerequisites": "<ul>\n    <li>Rocky Linux 9 or RHEL 9 with configured repositories</li>\n</ul>", "scenario": "<p>You need to find and evaluate packages for a web server deployment, identify which package provides a specific file, and gather package details before installation.</p>", "procedure": "<ol>\n    <li>Search for packages by keyword:\n        <pre>dnf search httpd</pre>\n    </li>\n    <li>Get detailed information about a package:\n        <pre>dnf info httpd</pre>\n    </li>\n    <li>Find which package provides a specific file:\n        <pre>dnf provides */httpd.conf\ndnf provides /usr/sbin/httpd</pre>\n    </li>\n    <li>List available packages matching a pattern:\n        <pre>dnf list available | grep php</pre>\n    </li>\n    <li>Use repoquery for advanced queries:\n        <pre>dnf repoquery --whatprovides /usr/sbin/httpd\ndnf repoquery --requires httpd\ndnf repoquery --list httpd</pre>\n    </li>\n</ol>", "verification": "<pre>$ dnf info httpd | head -10\nName         : httpd\nVersion      : 2.4.57\nRelease      : 5.el9\nArchitecture : x86_64\nSize         : 54 k\nSource        : httpd-2.4.57-5.el9.src.rpm\nRepository   : appstream\nSummary      : Apache HTTP Server</pre>", "solution": "<p><code>dnf search</code> matches keywords in name and summary. <code>dnf provides</code> searches by file path. <code>dnf repoquery</code> provides advanced package queries.</p>"}}, {"id": 42, "section": 3, "title": "Lab 42: Searching for Packages with apt (Ubuntu/Debian)", "shortTitle": "Searching for Packages with apt (Ubuntu/Debian)", "fields": {"objective": "<p>Search and discover packages using <code>apt</code>, <code>apt-cache</code>, <code>dpkg</code>, and <code>apt-file</code> on Debian-based systems.</p>", "prerequisites": "<ul>\n    <li>Ubuntu 22.04+ with configured repositories</li>\n</ul>", "scenario": "<p>Find packages related to network monitoring and determine which package provides a specific binary.</p>", "procedure": "<ol>\n    <li>Search for packages:\n        <pre>apt search nagios</pre>\n    </li>\n    <li>Show package details:\n        <pre>apt show nginx</pre>\n    </li>\n    <li>Check package versions and repository sources:\n        <pre>apt-cache policy nginx</pre>\n    </li>\n    <li>Find which installed package owns a file:\n        <pre>dpkg -S /usr/sbin/nginx</pre>\n    </li>\n    <li>Search for a file across all packages (including uninstalled):\n        <pre>sudo apt install apt-file\nsudo apt-file update\napt-file search bin/tcpdump</pre>\n    </li>\n</ol>", "verification": "<pre>$ apt-cache policy nginx\nnginx:\n  Installed: 1.24.0-1ubuntu1\n  Candidate: 1.24.0-1ubuntu1\n  Version table:\n *** 1.24.0-1ubuntu1 500</pre>", "solution": "<p><code>apt-cache policy</code> shows installed version, candidate version, and which repository provides it.</p>"}}, {"id": 43, "section": 3, "title": "Lab 43: Installing and Removing Packages", "shortTitle": "Installing and Removing Packages", "fields": {"objective": "<p>Install, reinstall, and cleanly remove software packages on both RHEL and Ubuntu systems.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Deploy a web server, verify the installation, and later decommission it by cleanly removing all associated files.</p>", "procedure": "<ol>\n    <li><strong>RHEL/Rocky:</strong>\n        <pre>sudo dnf install httpd -y\nsudo dnf reinstall httpd\nsudo dnf remove httpd\nsudo dnf autoremove   # Remove unused dependencies</pre>\n    </li>\n    <li><strong>Ubuntu:</strong>\n        <pre>sudo apt install nginx -y\nsudo apt reinstall nginx\nsudo apt remove nginx        # Removes package, keeps config files\nsudo apt purge nginx         # Removes package AND config files\nsudo apt autoremove          # Remove unused dependencies</pre>\n    </li>\n</ol>\n\n\n    <p>💡 remove vs. purge (Ubuntu)</p>\n    <p><strong>apt remove</strong>: Removes the package binaries but leaves configuration files in place.\n    <strong>apt purge</strong>: Removes both the package binaries and all configuration files. Use purge for a completely clean removal.</p>", "verification": "<pre># RHEL/Rocky:\n$ rpm -q httpd\nhttpd-2.4.57-5.el9.x86_64   # installed\n$ sudo dnf remove httpd -y\n$ rpm -q httpd\npackage httpd is not installed\n\n# Ubuntu:\n$ dpkg -l | grep nginx       # Shows 'rc' (removed, config remains) or 'un'</pre>", "solution": "<p>Always use <code>autoremove</code> after removing a package to clean up orphaned dependencies.</p>"}}, {"id": 44, "section": 3, "title": "Lab 44: Managing Package Repositories", "shortTitle": "Managing Package Repositories", "fields": {"objective": "<p>Add, enable, disable, and remove package repositories to expand software availability.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Internet connectivity</li>\n</ul>", "scenario": "<p>Add the EPEL repository on Rocky Linux for additional packages, and learn to manually create custom repository configurations.</p>", "procedure": "<ol>\n    <li><strong>RHEL/Rocky — Add EPEL:</strong>\n        <pre>sudo dnf install epel-release -y\nsudo dnf repolist</pre>\n    </li>\n    <li><strong>RHEL/Rocky — Create a custom repo file:</strong>\n        <pre>sudo vi /etc/yum.repos.d/custom.repo</pre>\n        <pre>[custom-repo]\nname=Custom Repository\nbaseurl=https://repo.example.com/el9/\nenabled=1\ngpgcheck=1\ngpgkey=https://repo.example.com/RPM-GPG-KEY</pre>\n    </li>\n    <li><strong>RHEL/Rocky — Enable/disable repos:</strong>\n        <pre>sudo dnf config-manager --set-enabled crb\nsudo dnf config-manager --set-disabled custom-repo\nsudo dnf repolist all</pre>\n    </li>\n    <li><strong>Ubuntu — Add a repository:</strong>\n        <pre>sudo add-apt-repository ppa:deadsnakes/ppa\nsudo apt update</pre>\n    </li>\n    <li><strong>Ubuntu — Create a custom sources file:</strong>\n        <pre>sudo vi /etc/apt/sources.list.d/custom.list</pre>\n        <pre>deb [signed-by=/usr/share/keyrings/custom.gpg] https://repo.example.com/ubuntu jammy main</pre>\n    </li>\n</ol>", "verification": "<pre>$ dnf repolist\nrepo id              repo name\nappstream            Rocky Linux 9 - AppStream\nbaseos               Rocky Linux 9 - BaseOS\nepel                 Extra Packages for Enterprise Linux 9 - x86_64</pre>", "solution": "<p>Use <code>dnf repolist</code> or <code>apt-cache policy</code> to verify repositories are active and accessible.</p>"}}, {"id": 45, "section": 3, "title": "Lab 45: Verifying Package Integrity and GPG Signatures", "shortTitle": "Verifying Package Integrity and GPG Signatures", "fields": {"objective": "<p>Verify package integrity using GPG keys, checksums, and package verification commands to ensure packages have not been tampered with.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Before deploying packages to production, validate that they are authentic and that installed package files have not been modified.</p>", "procedure": "<ol>\n    <li><strong>RHEL/Rocky — Verify an RPM file’s signature:</strong>\n        <pre>rpm -K package.rpm</pre>\n    </li>\n    <li><strong>RHEL/Rocky — Verify installed package files:</strong>\n        <pre>rpm -V httpd</pre>\n        <p>No output means all files are intact. Modified files show flags like <code>S.5....T.</code> (size, checksum, time changed).</p>\n    </li>\n    <li><strong>RHEL/Rocky — Import a GPG key:</strong>\n        <pre>sudo rpm --import https://www.redhat.com/security/team/key/\nrpm -qa gpg-pubkey*</pre>\n    </li>\n    <li><strong>Ubuntu — Verify installed packages:</strong>\n        <pre>dpkg --verify\ndpkg --verify nginx</pre>\n    </li>\n</ol>", "verification": "<pre>$ rpm -V httpd\nS.5....T.  c /etc/httpd/conf/httpd.conf\n# 'c' = config file, S = size changed, 5 = checksum changed, T = time changed\n\n$ rpm -V bash\n# (no output = all files intact)</pre>", "solution": "<p>Modified configuration files are expected. Modified binary files are a potential security concern and should be investigated.</p>"}}, {"id": 46, "section": 3, "title": "Lab 46: Downgrading Packages", "shortTitle": "Downgrading Packages", "fields": {"objective": "<p>Roll back a package to a previous version when an update causes problems.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Package with multiple versions available</li>\n</ul>", "scenario": "<p>An application update broke compatibility with your custom plugins. You need to downgrade to the previous working version.</p>", "procedure": "<ol>\n    <li><strong>RHEL/Rocky — Review transaction history:</strong>\n        <pre>sudo dnf history list\nsudo dnf history info 15</pre>\n    </li>\n    <li><strong>RHEL/Rocky — Undo a specific transaction:</strong>\n        <pre>sudo dnf history undo 15</pre>\n    </li>\n    <li><strong>RHEL/Rocky — Downgrade a specific package:</strong>\n        <pre>sudo dnf downgrade package-name</pre>\n    </li>\n    <li><strong>Ubuntu — List available versions:</strong>\n        <pre>apt-cache madison nginx</pre>\n    </li>\n    <li><strong>Ubuntu — Install a specific older version:</strong>\n        <pre>sudo apt install nginx=1.22.0-1ubuntu1</pre>\n    </li>\n</ol>", "verification": "<pre>$ dnf history list | head -5\nID     | Command line              | Date and time    | Action(s)      | Altered\n-------------------------------------------------------------------------------\n16     | history undo 15           | 2026-04-29 05:30 | Downgrade       |    1\n15     | update nginx              | 2026-04-28 14:00 | Upgrade         |    1</pre>", "solution": "<p><code>dnf history undo</code> reverses a specific transaction. <code>apt install package=version</code> installs a specific version on Ubuntu.</p>"}}, {"id": 47, "section": 3, "title": "Lab 47: Installing from Local RPM/DEB Files", "shortTitle": "Installing from Local RPM/DEB Files", "fields": {"objective": "<p>Install packages from local files rather than repositories, handling dependencies appropriately.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>A downloaded .rpm or .deb package file</li>\n</ul>", "scenario": "<p>A vendor has provided their application as an RPM or DEB file that is not available in any configured repository.</p>", "procedure": "<ol>\n    <li><strong>RHEL/Rocky — Install with dependency resolution:</strong>\n        <pre>sudo dnf localinstall package.rpm</pre>\n    </li>\n    <li><strong>RHEL/Rocky — Install with rpm directly (no dependency resolution):</strong>\n        <pre>sudo rpm -ivh package.rpm</pre>\n    </li>\n    <li><strong>RHEL/Rocky — Query a local RPM file before installing:</strong>\n        <pre>rpm -qpi package.rpm    # Package info\nrpm -qpl package.rpm    # List files\nrpm -qpR package.rpm    # List dependencies</pre>\n    </li>\n    <li><strong>Ubuntu — Install with dpkg:</strong>\n        <pre>sudo dpkg -i package.deb</pre>\n    </li>\n    <li><strong>Ubuntu — Fix missing dependencies:</strong>\n        <pre>sudo apt install -f</pre>\n    </li>\n</ol>", "verification": "<pre>$ rpm -qpi custom-app-1.0.rpm\nName        : custom-app\nVersion     : 1.0\nRelease     : 1.el9\nSummary     : Custom Application\n\n$ sudo dnf localinstall custom-app-1.0.rpm\nDependencies resolved. ... Complete!</pre>", "solution": "<p>Always prefer <code>dnf localinstall</code> over <code>rpm -i</code> because it resolves dependencies from configured repositories.</p>"}}, {"id": 48, "section": 3, "title": "Lab 48: Querying Package Information and File Ownership", "shortTitle": "Querying Package Information and File Ownership", "fields": {"objective": "<p>Determine which package owns a file, list all files in a package, and extract detailed package metadata.</p>", "prerequisites": "<ul>\n    <li>Installed packages to query</li>\n</ul>", "scenario": "<p>Find out which package installed <code>/usr/bin/curl</code>, what other files that package contains, and what configuration files it provides.</p>", "procedure": "<ol>\n    <li><strong>RHEL/Rocky:</strong>\n        <pre>rpm -qf /usr/bin/curl       # Which package owns this file?\nrpm -ql curl                # List all files in the package\nrpm -qi curl                # Package info\nrpm -qc curl                # Config files only\nrpm -qd curl                # Documentation files only</pre>\n    </li>\n    <li><strong>Ubuntu:</strong>\n        <pre>dpkg -S /usr/bin/curl       # Which package owns this file?\ndpkg -L curl                # List all files in the package\ndpkg -s curl                # Package info</pre>\n    </li>\n</ol>", "verification": "<pre>$ rpm -qf /usr/bin/curl\ncurl-8.0.1-1.el9.x86_64\n\n$ rpm -qc curl\n/etc/pki/tls/certs/ca-bundle.crt  (if applicable)\n\n$ dpkg -S /usr/bin/curl\ncurl: /usr/bin/curl</pre>", "solution": "<p>These queries work on installed packages. For uninstalled packages, use <code>dnf provides</code> or <code>apt-file search</code>.</p>"}}, {"id": 49, "section": 3, "title": "Lab 49: Cleaning Package Caches and Managing Disk Space", "shortTitle": "Cleaning Package Caches and Managing Disk Space", "fields": {"objective": "<p>Clean package manager caches to reclaim disk space consumed by cached packages and metadata.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>A server’s <code>/var</code> partition is filling up. Investigation reveals large cached package files.</p>", "procedure": "<ol>\n    <li><strong>RHEL/Rocky:</strong>\n        <pre>du -sh /var/cache/dnf/         # Check cache size\nsudo dnf clean packages        # Remove cached packages\nsudo dnf clean metadata        # Remove cached metadata\nsudo dnf clean all             # Remove everything</pre>\n    </li>\n    <li><strong>Ubuntu:</strong>\n        <pre>du -sh /var/cache/apt/archives/  # Check cache size\nsudo apt clean                   # Remove all cached packages\nsudo apt autoclean               # Remove only obsolete packages</pre>\n    </li>\n</ol>", "verification": "<pre>$ du -sh /var/cache/dnf/\n1.2G    /var/cache/dnf/\n\n$ sudo dnf clean all\n45 files removed\n\n$ du -sh /var/cache/dnf/\n12K     /var/cache/dnf/</pre>", "solution": "<p>Regular cache cleanup should be part of server maintenance. Consider adding a cron job or systemd timer to automate this.</p>"}}, {"id": 50, "section": 3, "title": "Lab 50: Managing Package Groups and Module Streams", "shortTitle": "Managing Package Groups and Module Streams", "fields": {"objective": "<p>Install package groups and manage DNF module streams to select specific application versions.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Rocky Linux 9 or RHEL 9 (for module streams)</li>\n</ul>", "scenario": "<p>Set up a complete development workstation using package groups and install a specific version of Node.js using module streams.</p>", "procedure": "<ol>\n    <li>List and install package groups:\n        <pre>dnf group list\nsudo dnf group install \"Development Tools\" -y</pre>\n    </li>\n    <li>List available module streams:\n        <pre>dnf module list\ndnf module list nodejs</pre>\n    </li>\n    <li>Enable and install a specific stream:\n        <pre>sudo dnf module enable nodejs:18\nsudo dnf module install nodejs:18/default</pre>\n    </li>\n    <li>Reset a module to switch streams:\n        <pre>sudo dnf module reset nodejs\nsudo dnf module enable nodejs:20</pre>\n    </li>\n    <li><strong>Ubuntu equivalent:</strong>\n        <pre>tasksel --list-tasks\nsudo apt install build-essential</pre>\n    </li>\n</ol>", "verification": "<pre>$ dnf module list nodejs\nName    Stream  Profiles                    Summary\nnodejs  18 [e]  common [d] [i], development Node.js runtime\nnodejs  20      common [d], development     Node.js runtime\n\n$ node --version\nv18.x.x</pre>", "solution": "<p>Module streams allow multiple major versions to coexist in repositories. Only one stream can be enabled at a time per module.</p>"}}, {"id": 51, "section": 3, "title": "Lab 51: Pinning and Holding Package Versions", "shortTitle": "Pinning and Holding Package Versions", "fields": {"objective": "<p>Prevent specific packages from being updated to protect against unplanned version changes.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Lock the kernel and database package versions to prevent automatic upgrades that could break application compatibility.</p>", "procedure": "<ol>\n    <li><strong>RHEL/Rocky:</strong>\n        <pre>sudo dnf install python3-dnf-plugin-versionlock\nsudo dnf versionlock add kernel\nsudo dnf versionlock add postgresql\nsudo dnf versionlock list\nsudo dnf versionlock delete kernel</pre>\n    </li>\n    <li><strong>Ubuntu:</strong>\n        <pre>sudo apt-mark hold linux-image-generic\nsudo apt-mark hold postgresql\nsudo apt-mark showhold\nsudo apt-mark unhold linux-image-generic</pre>\n    </li>\n</ol>", "verification": "<pre># RHEL:\n$ dnf versionlock list\nkernel-0:5.14.0-362.el9.*\n\n# Ubuntu:\n$ apt-mark showhold\nlinux-image-generic\npostgresql</pre>", "solution": "<p>Held packages will be skipped during <code>dnf update</code> or <code>apt upgrade</code>. Always document why packages are held to avoid confusion.</p>"}}, {"id": 52, "section": 3, "title": "Lab 52: Building Software from Source", "shortTitle": "Building Software from Source", "fields": {"objective": "<p>Download, compile, and install software from source code when a specific version is not available in repositories.</p>", "prerequisites": "<ul>\n    <li>Development tools: <code>gcc</code>, <code>make</code>, etc.</li>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Install a specific version of a tool that is not available in the distribution’s repositories.</p>", "procedure": "<ol>\n    <li>Install build dependencies:\n        <pre>sudo dnf group install \"Development Tools\"   # RHEL/Rocky\nsudo apt install build-essential               # Ubuntu</pre>\n    </li>\n    <li>Download and extract the source code:\n        <pre>wget https://example.com/software-2.0.tar.gz\ntar xzf software-2.0.tar.gz\ncd software-2.0/</pre>\n    </li>\n    <li>Configure, compile, and install:\n        <pre>./configure --prefix=/usr/local\nmake\nsudo make install</pre>\n    </li>\n    <li>Verify installation:\n        <pre>/usr/local/bin/software --version</pre>\n    </li>\n    <li>Optionally, create a package from the source install using checkinstall:\n        <pre>sudo dnf install checkinstall   # or apt install checkinstall\nsudo checkinstall              # Creates an RPM or DEB from make install</pre>\n    </li>\n    <li>Uninstall:\n        <pre>sudo make uninstall   # If supported by the Makefile</pre>\n    </li>\n</ol>", "verification": "<pre>$ /usr/local/bin/software --version\nsoftware 2.0</pre>", "solution": "<p>Using <code>--prefix=/usr/local</code> keeps source-built software separate from package-managed software. Using <code>checkinstall</code> allows management via the package manager.</p>"}}, {"id": 53, "section": 3, "title": "Lab 53: Configuring Repository Priorities and Exclusions", "shortTitle": "Configuring Repository Priorities and Exclusions", "fields": {"objective": "<p>Set repository priorities and exclude specific packages from repositories to control package sourcing.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Multiple repositories configured</li>\n</ul>", "scenario": "<p>Ensure base repository packages are preferred over third-party repositories to prevent accidental overwrites, and exclude kernel packages from a third-party repo.</p>", "procedure": "<ol>\n    <li><strong>RHEL/Rocky — Set repository priority:</strong>\n        <pre>sudo vi /etc/yum.repos.d/epel.repo\n# Add under [epel] section:\npriority=10   # Lower number = higher priority (default is 99)</pre>\n    </li>\n    <li><strong>RHEL/Rocky — Exclude packages:</strong>\n        <pre>sudo vi /etc/yum.repos.d/epel.repo\n# Add under [epel] section:\nexclude=kernel* php*</pre>\n    </li>\n    <li><strong>Ubuntu — Configure pinning priorities:</strong>\n        <pre>sudo vi /etc/apt/preferences.d/custom-pin</pre>\n        <pre>Package: *\nPin: release o=Ubuntu\nPin-Priority: 900\n\nPackage: *\nPin: release o=LP-PPA-deadsnakes\nPin-Priority: 400</pre>\n    </li>\n    <li>Verify the effective priority:\n        <pre>apt-cache policy package-name</pre>\n    </li>\n</ol>", "verification": "<pre>$ dnf repolist -v | grep -A2 epel\nRepo-id      : epel\nRepo-name    : Extra Packages for Enterprise Linux 9\nRepo-priority: 10</pre>", "solution": "<p>Repository priorities and exclusions prevent third-party repos from overriding critical system packages.</p>"}}, {"id": 54, "section": 4, "title": "Lab 54: Booting into Rescue and Emergency Modes", "shortTitle": "Booting into Rescue and Emergency Modes", "fields": {"objective": "<p>Access rescue and emergency systemd targets from the GRUB menu to repair a misconfigured system.</p>", "prerequisites": "<ul>\n    <li>Physical or console access to the system</li>\n</ul>", "scenario": "<p>A misconfigured <code>/etc/fstab</code> entry prevents normal boot. You need to access the system for repair.</p>", "procedure": "<ol>\n    <li>At the GRUB menu, press <code>e</code> to edit the boot entry.</li>\n    <li>Append to the <code>linux</code> line:\n        <pre>systemd.unit=rescue.target</pre>\n        <p>Or for emergency (minimal) mode:</p>\n        <pre>systemd.unit=emergency.target</pre>\n    </li>\n    <li>Press <code>Ctrl+X</code> to boot with the modified parameters.</li>\n    <li>Enter the root password when prompted.</li>\n    <li>For a running system, switch targets directly:\n        <pre>sudo systemctl rescue\nsudo systemctl emergency</pre>\n    </li>\n</ol>\n\n\n    <p>💡 Rescue vs. Emergency Mode</p>\n    <p><strong>Rescue mode</strong> (rescue.target): Mounts all filesystems, starts basic services, single-user. Good for most repair tasks.\n    <strong>Emergency mode</strong> (emergency.target): Minimal environment, root filesystem often mounted read-only, no other filesystems. Use when rescue mode itself fails (e.g., bad /etc/fstab).</p>", "verification": "<p>You should get a root shell. Verify the current target with <code>systemctl get-default</code>.</p>", "solution": "<p>After making repairs, exit the shell or run <code>systemctl default</code> to boot into the normal target.</p>"}}, {"id": 55, "section": 4, "title": "Lab 55: Resetting a Forgotten Root Password", "shortTitle": "Resetting a Forgotten Root Password", "fields": {"objective": "<p>Recover root access on a system where the root password is unknown.</p>", "prerequisites": "<ul>\n    <li>Physical or console access to GRUB</li>\n</ul>", "scenario": "<p>A server’s root password was lost when the previous administrator left the organization. You need to regain root access.</p>", "procedure": "<ol>\n    <li>Reboot the system and interrupt GRUB by pressing <code>e</code>.</li>\n    <li><strong>RHEL/Rocky method:</strong> Append <code>rd.break</code> to the <code>linux</code> line and press <code>Ctrl+X</code>.</li>\n    <li>At the <code>switch_root</code> prompt, remount and change password:\n        <pre>mount -o remount,rw /sysroot\nchroot /sysroot\npasswd root\ntouch /.autorelabel    # Required for SELinux\nexit\nreboot</pre>\n    </li>\n    <li><strong>Ubuntu method:</strong> Append <code>init=/bin/bash</code> to the <code>linux</code> line and press <code>Ctrl+X</code>.</li>\n    <li>At the bash prompt:\n        <pre>mount -o remount,rw /\npasswd root\nsync\nreboot -f</pre>\n    </li>\n</ol>\n\n\n    <p>⚠ SELinux Note (RHEL/Rocky)</p>\n    <p>After changing the root password with <code>rd.break</code>, you <strong>must</strong> run <code>touch /.autorelabel</code> before rebooting. Otherwise SELinux will deny login with the new password because the <code>/etc/shadow</code> file will have the wrong security context. The relabel process may take several minutes on first boot.</p>", "verification": "<p>After reboot, log in with the new root password.</p>", "solution": "<p>This procedure works because GRUB is not password-protected by default. In production, consider setting a GRUB password.</p>"}}, {"id": 56, "section": 4, "title": "Lab 56: Checking and Repairing Filesystems with fsck", "shortTitle": "Checking and Repairing Filesystems with fsck", "fields": {"objective": "<p>Use <code>fsck</code> and filesystem-specific repair tools to check and fix corrupted filesystems.</p>", "prerequisites": "<ul>\n    <li>Root access</li>\n    <li>A secondary partition to test on (never fsck a mounted filesystem)</li>\n</ul>", "scenario": "<p>After a sudden power failure, a filesystem shows errors and fails to mount cleanly.</p>", "procedure": "<ol>\n    <li>Unmount the filesystem (required):\n        <pre>sudo umount /dev/sdb1</pre>\n    </li>\n    <li>Run fsck interactively:\n        <pre>sudo fsck /dev/sdb1</pre>\n    </li>\n    <li>Auto-fix all errors:\n        <pre>sudo fsck -y /dev/sdb1</pre>\n    </li>\n    <li>Force check an ext4 filesystem:\n        <pre>sudo e2fsck -f /dev/sdb1</pre>\n    </li>\n    <li>For XFS filesystems, use xfs_repair:\n        <pre>sudo xfs_repair /dev/sdb1</pre>\n    </li>\n</ol>\n\n\n    <p>⚠ Warning</p>\n    <p>Never run <code>fsck</code> on a mounted filesystem. This can cause catastrophic data corruption. Always unmount first, or use rescue/emergency mode for the root filesystem.</p>", "verification": "<pre>$ sudo fsck -y /dev/sdb1\ne2fsck 1.46.5 (30-Dec-2021)\n/dev/sdb1: clean, 11/65536 files, 12345/262144 blocks</pre>", "solution": "<p>A clean fsck should report no errors. After repair, remount and verify data integrity.</p>"}}, {"id": 57, "section": 4, "title": "Lab 57: Repairing the GRUB Bootloader", "shortTitle": "Repairing the GRUB Bootloader", "fields": {"objective": "<p>Reinstall and reconfigure GRUB when the system fails to boot due to bootloader corruption.</p>", "prerequisites": "<ul>\n    <li>Rescue/live media (USB or CD)</li>\n    <li>Knowledge of the system’s disk layout</li>\n</ul>", "scenario": "<p>After a disk operation, the GRUB bootloader was corrupted and the system displays “GRUB rescue” or fails to boot entirely.</p>", "procedure": "<ol>\n    <li>Boot from rescue or live media.</li>\n    <li>Identify and mount the root filesystem:\n        <pre>lsblk\nsudo mount /dev/sda2 /mnt\nsudo mount /dev/sda1 /mnt/boot</pre>\n    </li>\n    <li>Mount necessary virtual filesystems:\n        <pre>sudo mount --bind /dev /mnt/dev\nsudo mount --bind /proc /mnt/proc\nsudo mount --bind /sys /mnt/sys</pre>\n    </li>\n    <li>Chroot into the system:\n        <pre>sudo chroot /mnt</pre>\n    </li>\n    <li>Reinstall GRUB (BIOS):\n        <pre>grub2-install /dev/sda\ngrub2-mkconfig -o /boot/grub2/grub.cfg</pre>\n    </li>\n    <li>Exit and reboot:\n        <pre>exit\nsudo umount -R /mnt\nreboot</pre>\n    </li>\n</ol>", "verification": "<p>The system should boot normally and present the GRUB menu.</p>", "solution": "<p>For UEFI systems, also mount the EFI System Partition (typically <code>/boot/efi</code>) before running <code>grub2-install</code>.</p>"}}, {"id": 58, "section": 4, "title": "Lab 58: Recovering a System Using Live Media", "shortTitle": "Recovering a System Using Live Media", "fields": {"objective": "<p>Use a live USB or CD to repair an unbootable Linux system when critical files have been deleted.</p>", "prerequisites": "<ul>\n    <li>A bootable live media (e.g., Rocky Linux minimal ISO or Ubuntu live USB)</li>\n</ul>", "scenario": "<p>The system kernel was accidentally deleted and the system will not boot. Use live media to reinstall it.</p>", "procedure": "<ol>\n    <li>Boot from live media and identify the root partition:\n        <pre>lsblk\nsudo mount /dev/sda2 /mnt</pre>\n    </li>\n    <li>Mount all necessary filesystems:\n        <pre>sudo mount /dev/sda1 /mnt/boot\nsudo mount --bind /dev /mnt/dev\nsudo mount --bind /proc /mnt/proc\nsudo mount --bind /sys /mnt/sys\nsudo mount --bind /run /mnt/run</pre>\n    </li>\n    <li>Chroot into the mounted system:\n        <pre>sudo chroot /mnt</pre>\n    </li>\n    <li>Reinstall the kernel:\n        <pre># RHEL/Rocky:\ndnf reinstall kernel\ndracut -f\n\n# Ubuntu:\napt install --reinstall linux-image-generic\nupdate-initramfs -u</pre>\n    </li>\n    <li>Reinstall the bootloader:\n        <pre>grub2-install /dev/sda        # RHEL/Rocky\ngrub2-mkconfig -o /boot/grub2/grub.cfg</pre>\n    </li>\n    <li>Exit chroot and reboot:\n        <pre>exit\nsudo umount -R /mnt\nreboot</pre>\n    </li>\n</ol>", "verification": "<p>The system should boot normally with the reinstalled kernel. Verify with <code>uname -r</code>.</p>", "solution": "<p>This procedure works for any situation where critical boot files have been damaged or deleted.</p>"}}, {"id": 59, "section": 4, "title": "Lab 59: Recovering from a Full Filesystem", "shortTitle": "Recovering from a Full Filesystem", "fields": {"objective": "<p>Diagnose and resolve a completely full filesystem that is causing application crashes.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access (may need rescue mode if root FS is full)</li>\n</ul>", "scenario": "<p>Applications are crashing because the root filesystem is at 100% capacity. You must identify the cause and reclaim space.</p>", "procedure": "<ol>\n    <li>Check filesystem usage:\n        <pre>df -h</pre>\n    </li>\n    <li>Find the largest directories:\n        <pre>du -sh /* | sort -rh | head -10</pre>\n    </li>\n    <li>Find large individual files:\n        <pre>find / -xdev -size +100M -exec ls -lh {} \\; 2>/dev/null</pre>\n    </li>\n    <li>Check for deleted but still-open files consuming space:\n        <pre>lsof +L1</pre>\n    </li>\n    <li>Reclaim space:\n        <pre># Truncate large logs (don't delete - the file handle may be held open)\nsudo truncate -s 0 /var/log/messages\n\n# Clean package cache\nsudo dnf clean all     # or sudo apt clean\n\n# Remove old kernels (RHEL/Rocky)\nsudo dnf remove --oldinstallonly</pre>\n    </li>\n</ol>", "verification": "<pre>$ df -h /\nFilesystem      Size  Used Avail Use% Mounted on\n/dev/sda2        40G   28G   12G  70% /</pre>", "solution": "<p>The most common culprits are log files, package caches, old kernels, and core dumps. Use <code>lsof +L1</code> to find deleted files still held open by processes.</p>"}}, {"id": 60, "section": 4, "title": "Lab 60: Recovering from a Failed Kernel Upgrade", "shortTitle": "Recovering from a Failed Kernel Upgrade", "fields": {"objective": "<p>Roll back to a previous working kernel after a failed kernel update causes boot failures.</p>", "prerequisites": "<ul>\n    <li>Multiple kernels installed</li>\n    <li>Access to the GRUB boot menu</li>\n</ul>", "scenario": "<p>After a kernel update, the system panics during boot. You need to boot the previous kernel and remove the problematic one.</p>", "procedure": "<ol>\n    <li>At the GRUB menu, select the previous kernel from “Advanced Options.”</li>\n    <li>Once booted, verify the running kernel:\n        <pre>uname -r</pre>\n    </li>\n    <li>Remove the problematic kernel:\n        <pre># RHEL/Rocky:\nsudo dnf remove kernel-5.14.0-400.el9.x86_64\n\n# Ubuntu:\nsudo apt remove linux-image-6.5.0-45-generic</pre>\n    </li>\n    <li>Set the default kernel (RHEL/Rocky):\n        <pre>sudo grubby --info=ALL | grep title\nsudo grubby --set-default /boot/vmlinuz-5.14.0-362.el9.x86_64</pre>\n    </li>\n    <li>Regenerate GRUB configuration:\n        <pre>sudo grub2-mkconfig -o /boot/grub2/grub.cfg</pre>\n    </li>\n</ol>", "verification": "<pre>$ uname -r\n5.14.0-362.el9.x86_64   # Previous working kernel\n\n$ grubby --default-kernel\n/boot/vmlinuz-5.14.0-362.el9.x86_64</pre>", "solution": "<p>Linux keeps previous kernels installed by default specifically for this scenario. Always test kernel updates in a staging environment first.</p>"}}, {"id": 61, "section": 4, "title": "Lab 61: Repairing a Broken Package Database", "shortTitle": "Repairing a Broken Package Database", "fields": {"objective": "<p>Fix a corrupted package manager database that was damaged by a system crash during package installation.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>A system crash during a <code>dnf update</code> left the RPM database inconsistent, causing errors with any package operation.</p>", "procedure": "<ol>\n    <li><strong>RHEL/Rocky — Rebuild the RPM database:</strong>\n        <pre>sudo cp -r /var/lib/rpm /var/lib/rpm.backup\nsudo rpm --rebuilddb\nrpm -qa | wc -l    # Verify packages are listed</pre>\n    </li>\n    <li><strong>Ubuntu — Fix interrupted dpkg:</strong>\n        <pre>sudo dpkg --configure -a\nsudo apt install -f\nsudo dpkg --clear-avail\nsudo apt update</pre>\n    </li>\n</ol>", "verification": "<pre>$ rpm -qa | wc -l\n523   # Should list all installed packages without errors\n\n$ sudo dnf check\n(no problems should be reported)</pre>", "solution": "<p>Always backup the RPM database before rebuilding. The <code>rpm --rebuilddb</code> command reconstructs the database from installed package headers.</p>"}}, {"id": 62, "section": 4, "title": "Lab 62: Restoring Files and Systems with rsync", "shortTitle": "Restoring Files and Systems with rsync", "fields": {"objective": "<p>Use <code>rsync</code> for efficient backup and restore operations, both local and remote.</p>", "prerequisites": "<ul>\n    <li>The <code>rsync</code> package installed</li>\n    <li>A backup destination (local directory or remote server)</li>\n</ul>", "scenario": "<p>Restore a web application directory from a backup after accidental deletion.</p>", "procedure": "<ol>\n    <li>Create a backup:\n        <pre>sudo rsync -avz --delete /var/www/ /backup/www/</pre>\n    </li>\n    <li>Restore from backup:\n        <pre>sudo rsync -avz /backup/www/ /var/www/</pre>\n    </li>\n    <li>Remote restore via SSH:\n        <pre>sudo rsync -avz -e ssh backup-server:/backup/www/ /var/www/</pre>\n    </li>\n    <li>Use <code>--dry-run</code> to preview changes:\n        <pre>sudo rsync -avz --dry-run /backup/www/ /var/www/</pre>\n    </li>\n    <li>Exclude patterns and show progress:\n        <pre>sudo rsync -avz --progress --exclude='*.tmp' --exclude='.cache/' /backup/www/ /var/www/</pre>\n    </li>\n</ol>", "verification": "<pre>$ sudo rsync -avz --dry-run /backup/www/ /var/www/\nsending incremental file list\nindex.html\ncss/style.css\nsent 234 bytes  received 45 bytes  558.00 bytes/sec</pre>", "solution": "<p>The trailing slash on source paths matters in rsync. <code>/backup/www/</code> copies the contents of www, while <code>/backup/www</code> copies the directory itself.</p>"}}, {"id": 63, "section": 4, "title": "Lab 63: Recovering LVM Logical Volumes", "shortTitle": "Recovering LVM Logical Volumes", "fields": {"objective": "<p>Diagnose and recover from LVM volume issues including missing physical volumes and metadata problems.</p>", "prerequisites": "<ul>\n    <li>Root access</li>\n    <li>An LVM-based storage configuration</li>\n</ul>", "scenario": "<p>An LVM volume group will not activate after a disk replacement. You need to scan, diagnose, and recover the logical volumes.</p>", "procedure": "<ol>\n    <li>Scan for physical volumes:\n        <pre>sudo pvs\nsudo pvscan</pre>\n    </li>\n    <li>Check volume groups:\n        <pre>sudo vgs\nsudo vgscan</pre>\n    </li>\n    <li>Activate volume groups:\n        <pre>sudo vgchange -ay</pre>\n    </li>\n    <li>Backup and restore LVM metadata:\n        <pre>sudo vgcfgbackup vg0\nsudo vgcfgrestore vg0</pre>\n    </li>\n    <li>Move data off a failing physical volume:\n        <pre>sudo pvmove /dev/sdb1 /dev/sdc1</pre>\n    </li>\n</ol>", "verification": "<pre>$ sudo lvs\n  LV   VG   Attr       LSize  Pool Origin Data%  Meta%\n  root vg0  -wi-a----- 20.00g\n  swap vg0  -wi-a-----  2.00g</pre>", "solution": "<p>LVM metadata backups are stored in <code>/etc/lvm/backup/</code>. The <code>vgcfgrestore</code> command can recover from metadata corruption.</p>"}}, {"id": 64, "section": 4, "title": "Lab 64: Diagnosing Boot Failures with journalctl", "shortTitle": "Diagnosing Boot Failures with journalctl", "fields": {"objective": "<p>Use persistent journal logs to analyze boot failures and unexpected reboots.</p>", "prerequisites": "<ul>\n    <li>Persistent journal storage enabled (see Lab 22)</li>\n</ul>", "scenario": "<p>A server rebooted unexpectedly during the night. You need to determine the cause using journal logs from the previous boot.</p>", "procedure": "<ol>\n    <li>Ensure persistent logging is enabled:\n        <pre>sudo mkdir -p /var/log/journal\nsudo systemctl restart systemd-journald</pre>\n    </li>\n    <li>List all recorded boots:\n        <pre>journalctl --list-boots</pre>\n    </li>\n    <li>View logs from the previous boot:\n        <pre>journalctl -b -1</pre>\n    </li>\n    <li>View only errors from the previous boot:\n        <pre>journalctl -b -1 -p err</pre>\n    </li>\n    <li>View kernel messages from the previous boot:\n        <pre>journalctl -b -1 -k</pre>\n    </li>\n</ol>", "verification": "<pre>$ journalctl --list-boots\n-2 abc123 Mon 2026-04-27 08:00:00 EDT—Mon 2026-04-27 23:45:12 EDT\n-1 def456 Tue 2026-04-28 08:00:00 EDT—Tue 2026-04-28 22:15:33 EDT\n 0 ghi789 Wed 2026-04-29 05:30:00 EDT—Wed 2026-04-29 05:37:00 EDT</pre>", "solution": "<p>Look for OOM killer messages, kernel panics, hardware errors, or watchdog timeouts in the previous boot’s logs.</p>"}}, {"id": 65, "section": 4, "title": "Lab 65: Creating and Restoring System Snapshots", "shortTitle": "Creating and Restoring System Snapshots", "fields": {"objective": "<p>Use LVM snapshots and filesystem backup tools to create recovery points before major system changes.</p>", "prerequisites": "<ul>\n    <li>LVM-based storage with free space in the volume group</li>\n    <li>Root access</li>\n</ul>", "scenario": "<p>Create a recovery point before applying a major system upgrade, so you can roll back if the upgrade fails.</p>", "procedure": "<ol>\n    <li>Check free space in the volume group:\n        <pre>sudo vgs</pre>\n    </li>\n    <li>Create an LVM snapshot:\n        <pre>sudo lvcreate -s -n snap_root -L 5G /dev/vg0/root</pre>\n    </li>\n    <li>Verify the snapshot:\n        <pre>sudo lvs</pre>\n    </li>\n    <li>Mount and inspect the snapshot:\n        <pre>sudo mkdir /mnt/snapshot\nsudo mount -o ro /dev/vg0/snap_root /mnt/snapshot\nls /mnt/snapshot</pre>\n    </li>\n    <li>Restore by merging the snapshot (system reverts to snapshot state):\n        <pre>sudo umount /mnt/snapshot\nsudo lvconvert --merge /dev/vg0/snap_root\n# Reboot required to complete merge of root volume</pre>\n    </li>\n    <li>For XFS filesystems, use xfsdump/xfsrestore:\n        <pre>sudo xfsdump -l 0 -f /backup/root.dump /\nsudo xfsrestore -f /backup/root.dump /mnt/restore</pre>\n    </li>\n</ol>", "verification": "<pre>$ sudo lvs\n  LV        VG   Attr       LSize  Origin\n  root      vg0  owi-a-s--- 20.00g\n  snap_root vg0  swi-a-s---  5.00g root</pre>", "solution": "<p>Snapshot space should be large enough to hold all changes made during the upgrade. Monitor usage with <code>lvs</code> — if the snapshot fills up, it becomes invalid.</p>"}}, {"id": 66, "section": 5, "title": "Lab 66: Installing KVM and libvirt Virtualization Stack", "shortTitle": "Installing KVM and libvirt Virtualization Stack", "fields": {"objective": "<p>Install and configure the complete KVM/libvirt virtualization environment on a host system.</p>", "prerequisites": "<ul>\n    <li>CPU with hardware virtualization support (Intel VT-x or AMD-V)</li>\n    <li>Root or sudo access</li>\n    <li>8 GB+ RAM recommended</li>\n</ul>", "scenario": "<p>Provision a bare-metal server as a virtualization host for running development and test virtual machines.</p>", "procedure": "<ol>\n    <li>Verify CPU virtualization support:\n        <pre>grep -c 'vmx\\|svm' /proc/cpuinfo\nlscpu | grep Virtualization</pre>\n    </li>\n    <li>Install the virtualization packages:\n        <strong>RHEL/Rocky:</strong>\n        <pre>sudo dnf install qemu-kvm libvirt virt-install virt-viewer -y</pre>\n        <strong>Ubuntu:</strong>\n        <pre>sudo apt install qemu-kvm libvirt-daemon-system virtinst virt-viewer -y</pre>\n    </li>\n    <li>Start and enable libvirtd:\n        <pre>sudo systemctl enable --now libvirtd</pre>\n    </li>\n    <li>Verify the installation:\n        <pre>virsh list --all\nvirsh net-list --all</pre>\n    </li>\n    <li>Add your user to the libvirt group (for non-root access):\n        <pre>sudo usermod -aG libvirt $(whoami)</pre>\n    </li>\n</ol>", "verification": "<pre>$ virsh list --all\n Id   Name   State\n-----------------------\n\n$ virsh net-list\n Name      State    Autostart   Persistent\n--------------------------------------------\n default   active   yes         yes</pre>", "solution": "<p>A working libvirt installation should show an empty VM list and an active <code>default</code> NAT network.</p>"}}, {"id": 67, "section": 5, "title": "Lab 67: Creating a Virtual Machine with virt-install", "shortTitle": "Creating a Virtual Machine with virt-install", "fields": {"objective": "<p>Create a virtual machine from the command line using <code>virt-install</code> with custom resource specifications.</p>", "prerequisites": "<ul>\n    <li>Completed Lab 66</li>\n    <li>An ISO image available (e.g., Rocky Linux 9 minimal)</li>\n</ul>", "scenario": "<p>Deploy a test server virtual machine with specific CPU, memory, and storage requirements for application testing.</p>", "procedure": "<ol>\n    <li>Create the VM using virt-install:\n        <pre>sudo virt-install \\\n  --name testvm1 \\\n  --ram 1024 \\\n  --vcpus 1 \\\n  --disk path=/var/lib/libvirt/images/testvm1.qcow2,size=10 \\\n  --os-variant rocky9.0 \\\n  --network bridge=virbr0 \\\n  --graphics none \\\n  --console pty,target_type=serial \\\n  --location /var/lib/libvirt/images/Rocky-9-x86_64-minimal.iso \\\n  --extra-args 'console=ttyS0,115200n8'</pre>\n    </li>\n    <li>Parameter explanation:\n        <ul>\n            <li><code>--name</code>: VM name for virsh management</li>\n            <li><code>--ram</code>: Memory in MB</li>\n            <li><code>--vcpus</code>: Number of virtual CPUs</li>\n            <li><code>--disk</code>: Disk image path and size in GB</li>\n            <li><code>--os-variant</code>: OS type for optimization (list with <code>osinfo-query os</code>)</li>\n            <li><code>--location</code>: Installation source (ISO or URL)</li>\n            <li><code>--extra-args</code>: Kernel parameters for console access</li>\n        </ul>\n    </li>\n</ol>", "verification": "<pre>$ virsh list --all\n Id   Name      State\n--------------------------\n 1    testvm1   running</pre>", "solution": "<p>The installer will proceed via the serial console. Complete the installation following the on-screen prompts.</p>"}}, {"id": 68, "section": 5, "title": "Lab 68: Managing VMs with virsh (Start, Stop, List, Console)", "shortTitle": "Managing VMs with virsh (Start, Stop, List, Console)", "fields": {"objective": "<p>Use <code>virsh</code> for day-to-day VM management operations including starting, stopping, suspending, and accessing the console.</p>", "prerequisites": "<ul>\n    <li>At least one VM created (Lab 67)</li>\n</ul>", "scenario": "<p>Perform routine management of virtual machines on a hypervisor host.</p>", "procedure": "<ol>\n    <li>List all VMs:\n        <pre>virsh list --all</pre>\n    </li>\n    <li>Start a VM:\n        <pre>virsh start testvm1</pre>\n    </li>\n    <li>Graceful shutdown (sends ACPI signal):\n        <pre>virsh shutdown testvm1</pre>\n    </li>\n    <li>Force power off (like pulling the power cord):\n        <pre>virsh destroy testvm1</pre>\n    </li>\n    <li>Reboot, suspend, and resume:\n        <pre>virsh reboot testvm1\nvirsh suspend testvm1\nvirsh resume testvm1</pre>\n    </li>\n    <li>Access the serial console:\n        <pre>virsh console testvm1\n# Press Ctrl+] to exit the console</pre>\n    </li>\n    <li>Get VM information:\n        <pre>virsh dominfo testvm1\nvirsh domstate testvm1</pre>\n    </li>\n</ol>", "verification": "<pre>$ virsh dominfo testvm1\nId:             1\nName:           testvm1\nState:          running\nCPU(s):         1\nMax memory:     1048576 KiB\nUsed memory:    1048576 KiB\nAutostart:      disable</pre>", "solution": "<p>Use <code>virsh shutdown</code> for graceful stops and <code>virsh destroy</code> only when the VM is unresponsive.</p>"}}, {"id": 69, "section": 5, "title": "Lab 69: Cloning a Virtual Machine", "shortTitle": "Cloning a Virtual Machine", "fields": {"objective": "<p>Create an exact copy of an existing VM for rapid deployment.</p>", "prerequisites": "<ul>\n    <li>A source VM to clone (must be shut down)</li>\n</ul>", "scenario": "<p>Clone a configured template VM to quickly deploy new servers without repeating the full installation.</p>", "procedure": "<ol>\n    <li>Shut down the source VM:\n        <pre>virsh shutdown testvm1</pre>\n    </li>\n    <li>Clone using virt-clone:\n        <pre>virt-clone --original testvm1 --name testvm2 --auto-clone</pre>\n    </li>\n    <li>Start the clone and customize:\n        <pre>virsh start testvm2\nvirsh console testvm2\n# Inside the clone: change hostname, IP address, etc.</pre>\n    </li>\n    <li>Manual clone method (for more control):\n        <pre># Copy the disk image\nsudo cp /var/lib/libvirt/images/testvm1.qcow2 /var/lib/libvirt/images/testvm2.qcow2\n\n# Export and modify the XML\nvirsh dumpxml testvm1 > testvm2.xml\n# Edit: change name, UUID, disk path, MAC address\nvirsh define testvm2.xml</pre>\n    </li>\n</ol>", "verification": "<pre>$ virsh list --all\n Id   Name      State\n--------------------------\n -    testvm1   shut off\n 2    testvm2   running</pre>", "solution": "<p><code>virt-clone</code> automatically handles UUID, MAC address, and disk path changes. The manual method requires editing these manually.</p>"}}, {"id": 70, "section": 5, "title": "Lab 70: Creating and Managing VM Snapshots", "shortTitle": "Creating and Managing VM Snapshots", "fields": {"objective": "<p>Create, list, revert, and delete VM snapshots to enable safe testing and rollback.</p>", "prerequisites": "<ul>\n    <li>A VM with qcow2 disk format (required for internal snapshots)</li>\n</ul>", "scenario": "<p>Take a snapshot before applying updates to a VM so you can revert if the updates cause problems.</p>", "procedure": "<ol>\n    <li>Create a named snapshot:\n        <pre>virsh snapshot-create-as testvm1 pre-update --description \"Before April updates\"</pre>\n    </li>\n    <li>List snapshots:\n        <pre>virsh snapshot-list testvm1</pre>\n    </li>\n    <li>Show snapshot details:\n        <pre>virsh snapshot-info testvm1 pre-update</pre>\n    </li>\n    <li>Revert to a snapshot:\n        <pre>virsh snapshot-revert testvm1 pre-update</pre>\n    </li>\n    <li>Delete a snapshot:\n        <pre>virsh snapshot-delete testvm1 pre-update</pre>\n    </li>\n</ol>", "verification": "<pre>$ virsh snapshot-list testvm1\n Name         Creation Time               State\n---------------------------------------------------\n pre-update   2026-04-29 05:37:00 -0400   running</pre>", "solution": "<p>Internal snapshots require qcow2 disk format. RAW disk images do not support snapshots. Check with <code>qemu-img info disk.qcow2</code>.</p>"}}, {"id": 71, "section": 5, "title": "Lab 71: Configuring VM Networking (NAT and Bridge)", "shortTitle": "Configuring VM Networking (NAT and Bridge)", "fields": {"objective": "<p>Configure virtual machine networking using both NAT and bridged modes for different connectivity requirements.</p>", "prerequisites": "<ul>\n    <li>A working libvirt installation</li>\n    <li>NetworkManager (for bridge configuration)</li>\n</ul>", "scenario": "<p>A VM needs direct network access (its own IP on the physical network) via a bridge interface, rather than NAT.</p>", "procedure": "<ol>\n    <li>Examine the default NAT network:\n        <pre>virsh net-info default\nvirsh net-dumpxml default</pre>\n    </li>\n    <li>Create a bridge using nmcli:\n        <pre>sudo nmcli con add type bridge con-name br0 ifname br0\nsudo nmcli con add type bridge-slave con-name br0-ens33 ifname ens33 master br0\nsudo nmcli con up br0</pre>\n    </li>\n    <li>Create a bridged network for libvirt:\n        <pre>cat <<EOF > bridge-net.xml\n<network>\n  <name>bridged-net</name>\n  <forward mode=\"bridge\"/>\n  <bridge name=\"br0\"/>\n</network>\nEOF\n\nvirsh net-define bridge-net.xml\nvirsh net-start bridged-net\nvirsh net-autostart bridged-net</pre>\n    </li>\n    <li>Attach a VM to the bridge:\n        <pre>virsh attach-interface testvm1 bridge br0 --model virtio --persistent</pre>\n    </li>\n</ol>", "verification": "<pre>$ virsh net-list\n Name          State    Autostart   Persistent\n-------------------------------------------------\n bridged-net   active   yes         yes\n default       active   yes         yes</pre>", "solution": "<p>Bridged VMs get IP addresses from the physical network’s DHCP server and are directly accessible from other machines on the LAN.</p>"}}, {"id": 72, "section": 5, "title": "Lab 72: Managing VM Storage Pools and Volumes", "shortTitle": "Managing VM Storage Pools and Volumes", "fields": {"objective": "<p>Create and manage libvirt storage pools and volumes for organized VM disk management.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Sufficient disk space</li>\n</ul>", "scenario": "<p>Set up a dedicated storage pool for VM disk images with proper volume management.</p>", "procedure": "<ol>\n    <li>List existing pools:\n        <pre>virsh pool-list --all</pre>\n    </li>\n    <li>Create a new directory-based pool:\n        <pre>virsh pool-define-as vmpool dir - - - - /var/lib/libvirt/vmpool\nvirsh pool-build vmpool\nvirsh pool-start vmpool\nvirsh pool-autostart vmpool</pre>\n    </li>\n    <li>Create a volume in the pool:\n        <pre>virsh vol-create-as vmpool disk1.qcow2 20G --format qcow2</pre>\n    </li>\n    <li>List and inspect volumes:\n        <pre>virsh vol-list vmpool\nvirsh vol-info disk1.qcow2 --pool vmpool</pre>\n    </li>\n    <li>Delete a volume:\n        <pre>virsh vol-delete disk1.qcow2 --pool vmpool</pre>\n    </li>\n</ol>", "verification": "<pre>$ virsh pool-list --all\n Name     State    Autostart\n-------------------------------\n default  active   yes\n vmpool   active   yes\n\n$ virsh vol-list vmpool\n Name           Path\n---------------------------------------------------\n disk1.qcow2    /var/lib/libvirt/vmpool/disk1.qcow2</pre>", "solution": "<p>Storage pools provide organized management of VM disk images and can be directory-based, LVM-based, or iSCSI-based.</p>"}}, {"id": 73, "section": 5, "title": "Lab 73: Modifying VM Resources (CPU, Memory, Disk)", "shortTitle": "Modifying VM Resources (CPU, Memory, Disk)", "fields": {"objective": "<p>Adjust VM CPU, memory, and disk allocations to meet changing workload requirements.</p>", "prerequisites": "<ul>\n    <li>A VM to modify</li>\n</ul>", "scenario": "<p>A VM needs more resources to handle an increased workload — double the RAM and add a second disk.</p>", "procedure": "<ol>\n    <li>Adjust memory (VM must be shut down for max memory change):\n        <pre>virsh setmaxmem testvm1 2G --config\nvirsh setmem testvm1 2G --config</pre>\n    </li>\n    <li>Adjust vCPUs:\n        <pre>virsh setvcpus testvm1 2 --config --maximum\nvirsh setvcpus testvm1 2 --config</pre>\n    </li>\n    <li>Add a second disk:\n        <pre># Create the disk image\nqemu-img create -f qcow2 /var/lib/libvirt/images/testvm1-data.qcow2 20G\n\n# Attach to the VM\nvirsh attach-disk testvm1 \\\n  /var/lib/libvirt/images/testvm1-data.qcow2 vdb \\\n  --persistent --driver qemu --subdriver qcow2</pre>\n    </li>\n    <li>Resize an existing disk:\n        <pre>virsh shutdown testvm1\nqemu-img resize /var/lib/libvirt/images/testvm1.qcow2 +10G</pre>\n    </li>\n</ol>", "verification": "<pre>$ virsh dominfo testvm1\nCPU(s):         2\nMax memory:     2097152 KiB\nUsed memory:    2097152 KiB\n\n$ virsh domblklist testvm1\n Target   Source\n----------------------------------------------\n vda      /var/lib/libvirt/images/testvm1.qcow2\n vdb      /var/lib/libvirt/images/testvm1-data.qcow2</pre>", "solution": "<p>Changes with <code>--config</code> take effect on next boot. Use <code>--live</code> for runtime changes (if supported by the resource type).</p>"}}, {"id": 74, "section": 5, "title": "Lab 74: Configuring VM Autostart", "shortTitle": "Configuring VM Autostart", "fields": {"objective": "<p>Configure VMs to start automatically when the host system boots.</p>", "prerequisites": "<ul>\n    <li>A defined VM</li>\n</ul>", "scenario": "<p>Critical VMs must automatically start after any host reboot without manual intervention.</p>", "procedure": "<ol>\n    <li>Enable autostart for a VM:\n        <pre>virsh autostart testvm1</pre>\n    </li>\n    <li>Verify autostart status:\n        <pre>virsh dominfo testvm1 | grep Autostart</pre>\n    </li>\n    <li>Disable autostart:\n        <pre>virsh autostart --disable testvm1</pre>\n    </li>\n    <li>List all VMs with their autostart status:\n        <pre>virsh list --all --autostart</pre>\n    </li>\n</ol>", "verification": "<pre>$ virsh dominfo testvm1 | grep Autostart\nAutostart:      enable\n\n$ virsh list --all --autostart\n Id   Name      State\n--------------------------\n 1    testvm1   running</pre>", "solution": "<p>Autostart creates a symlink in <code>/etc/libvirt/qemu/autostart/</code>. The VMs start when <code>libvirtd</code> starts.</p>"}}, {"id": 75, "section": 5, "title": "Lab 75: Exporting and Importing VM Configurations", "shortTitle": "Exporting and Importing VM Configurations", "fields": {"objective": "<p>Export VM definitions for backup or migration to another host.</p>", "prerequisites": "<ul>\n    <li>A defined VM to export</li>\n</ul>", "scenario": "<p>Migrate a VM configuration and disk to another hypervisor host.</p>", "procedure": "<ol>\n    <li>Export the VM XML definition:\n        <pre>virsh dumpxml testvm1 > testvm1.xml</pre>\n    </li>\n    <li>Identify disk images to copy:\n        <pre>virsh domblklist testvm1</pre>\n    </li>\n    <li>Copy files to the new host:\n        <pre>scp testvm1.xml newhost:/tmp/\nscp /var/lib/libvirt/images/testvm1.qcow2 newhost:/var/lib/libvirt/images/</pre>\n    </li>\n    <li>On the new host, adjust paths in XML if needed and define:\n        <pre>virsh define /tmp/testvm1.xml\nvirsh start testvm1</pre>\n    </li>\n    <li>To remove from the old host:\n        <pre>virsh undefine testvm1\nrm /var/lib/libvirt/images/testvm1.qcow2</pre>\n    </li>\n</ol>", "verification": "<pre>$ virsh list --all   # On new host\n Id   Name      State\n--------------------------\n -    testvm1   shut off</pre>", "solution": "<p><code>virsh undefine</code> removes only the VM definition, not the disk images. Use <code>--remove-all-storage</code> to also delete disks.</p>"}}, {"id": 76, "section": 5, "title": "Lab 76: Managing VM Console and Display Access", "shortTitle": "Managing VM Console and Display Access", "fields": {"objective": "<p>Access VMs via serial console and graphical display (VNC/Spice) for management without SSH.</p>", "prerequisites": "<ul>\n    <li>A running VM with console configured</li>\n</ul>", "scenario": "<p>Set up remote access to a VM for installation or troubleshooting when SSH is not available.</p>", "procedure": "<ol>\n    <li>Access the serial console (requires console configured in guest OS):\n        <pre>virsh console testvm1\n# Press Ctrl+] to detach</pre>\n    </li>\n    <li>Check the graphics display configuration:\n        <pre>virsh domdisplay testvm1</pre>\n    </li>\n    <li>Get the VNC display port:\n        <pre>virsh vncdisplay testvm1</pre>\n    </li>\n    <li>Use virt-viewer for graphical access:\n        <pre>virt-viewer testvm1</pre>\n    </li>\n</ol>", "verification": "<pre>$ virsh domdisplay testvm1\nvnc://localhost:0\n\n$ virsh vncdisplay testvm1\n:0</pre>", "solution": "<p>VNC display <code>:0</code> corresponds to TCP port 5900. Connect with any VNC client to <code>host:5900</code>.</p>"}}, {"id": 77, "section": 5, "title": "Lab 77: Monitoring VM Performance and Resource Usage", "shortTitle": "Monitoring VM Performance and Resource Usage", "fields": {"objective": "<p>Monitor virtual machine resource consumption from the hypervisor host to identify resource-hungry VMs.</p>", "prerequisites": "<ul>\n    <li>One or more running VMs</li>\n    <li>Optional: <code>virt-top</code> package</li>\n</ul>", "scenario": "<p>The host is experiencing high I/O utilization. You need to identify which VM is responsible.</p>", "procedure": "<ol>\n    <li>Get comprehensive stats for a VM:\n        <pre>virsh domstats testvm1</pre>\n    </li>\n    <li>CPU stats for all VMs:\n        <pre>virsh domstats --cpu-total</pre>\n    </li>\n    <li>Memory stats:\n        <pre>virsh dommemstat testvm1</pre>\n    </li>\n    <li>Block I/O stats:\n        <pre>virsh domblkstat testvm1 vda</pre>\n    </li>\n    <li>Network I/O stats:\n        <pre>virsh domifstat testvm1 vnet0</pre>\n    </li>\n    <li>Interactive monitoring with virt-top:\n        <pre>sudo dnf install virt-top\nvirt-top</pre>\n    </li>\n</ol>", "verification": "<pre>$ virsh domblkstat testvm1 vda\n rd_req 15234\n rd_bytes 524288000\n wr_req 8765\n wr_bytes 268435456</pre>", "solution": "<p>Compare block I/O stats across VMs to find the one generating the most disk activity. <code>virt-top</code> provides an interactive view similar to <code>top</code> for VMs.</p>"}}, {"id": 78, "section": 6, "title": "Lab 78: Installing and Configuring Podman", "shortTitle": "Installing and Configuring Podman", "fields": {"objective": "<p>Install Podman and verify the container engine is properly configured.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Set up a server for containerized application deployments using Podman as the container engine.</p>", "procedure": "<ol>\n    <li>Install Podman:\n        <strong>RHEL/Rocky:</strong>\n        <pre>sudo dnf install podman -y</pre>\n        <strong>Ubuntu:</strong>\n        <pre>sudo apt install podman -y</pre>\n    </li>\n    <li>Verify installation:\n        <pre>podman --version\npodman info</pre>\n    </li>\n    <li>Run a test container:\n        <pre>podman run --rm hello-world</pre>\n    </li>\n    <li>Examine configuration files:\n        <pre>cat /etc/containers/storage.conf     # Storage configuration\ncat /etc/containers/registries.conf  # Registry configuration</pre>\n    </li>\n</ol>", "verification": "<pre>$ podman --version\npodman version 4.9.4\n\n$ podman info | grep -A3 store\nstore:\n  configFile: /etc/containers/storage.conf\n  graphRoot: /var/lib/containers/storage</pre>", "solution": "<p>Podman is daemonless — it runs containers directly without a background service, unlike Docker.</p>"}}, {"id": 79, "section": 6, "title": "Lab 79: Pulling and Managing Container Images", "shortTitle": "Pulling and Managing Container Images", "fields": {"objective": "<p>Search for, pull, inspect, and manage container images from registries.</p>", "prerequisites": "<ul>\n    <li>Podman installed (Lab 78)</li>\n    <li>Internet connectivity</li>\n</ul>", "scenario": "<p>Prepare container images for a web application stack by pulling, inspecting, and organizing images.</p>", "procedure": "<ol>\n    <li>Search for images:\n        <pre>podman search nginx</pre>\n    </li>\n    <li>Pull an image:\n        <pre>podman pull docker.io/library/nginx:latest</pre>\n    </li>\n    <li>List local images:\n        <pre>podman images</pre>\n    </li>\n    <li>Inspect an image:\n        <pre>podman inspect docker.io/library/nginx</pre>\n    </li>\n    <li>View image layer tree:\n        <pre>podman image tree nginx</pre>\n    </li>\n    <li>Remove an image:\n        <pre>podman rmi nginx</pre>\n    </li>\n    <li>Prune all unused images:\n        <pre>podman image prune -a</pre>\n    </li>\n</ol>", "verification": "<pre>$ podman images\nREPOSITORY                  TAG       IMAGE ID       CREATED       SIZE\ndocker.io/library/nginx     latest    a8758716bb6a   2 weeks ago   192 MB</pre>", "solution": "<p>Always specify the full registry path (e.g., <code>docker.io/library/nginx</code>) for clarity. Use specific tags instead of <code>latest</code> in production.</p>"}}, {"id": 80, "section": 6, "title": "Lab 80: Running and Managing Containers", "shortTitle": "Running and Managing Containers", "fields": {"objective": "<p>Run containers with various configurations including port mapping, detached mode, and interactive access.</p>", "prerequisites": "<ul>\n    <li>Nginx image pulled (Lab 79)</li>\n</ul>", "scenario": "<p>Deploy an Nginx web server container with custom port mapping and learn to manage its lifecycle.</p>", "procedure": "<ol>\n    <li>Run a container in detached mode with port mapping:\n        <pre>podman run -d --name webserver -p 8080:80 nginx</pre>\n    </li>\n    <li>List running containers:\n        <pre>podman ps\npodman ps -a   # Include stopped containers</pre>\n    </li>\n    <li>View container logs:\n        <pre>podman logs webserver\npodman logs -f webserver   # Follow logs</pre>\n    </li>\n    <li>Execute a command inside the container:\n        <pre>podman exec -it webserver /bin/bash</pre>\n    </li>\n    <li>Stop, start, and remove:\n        <pre>podman stop webserver\npodman start webserver\npodman rm webserver        # Must be stopped first\npodman rm -f webserver     # Force remove running container</pre>\n    </li>\n</ol>", "verification": "<pre>$ podman ps\nCONTAINER ID  IMAGE                           COMMAND               STATUS          PORTS                   NAMES\na1b2c3d4e5f6  docker.io/library/nginx:latest  nginx -g daemon o...  Up 30 seconds   0.0.0.0:8080->80/tcp    webserver\n\n$ curl http://localhost:8080\n<!DOCTYPE html>... Welcome to nginx! ...</pre>", "solution": "<p>Port mapping <code>-p 8080:80</code> maps host port 8080 to container port 80.</p>"}}, {"id": 81, "section": 6, "title": "Lab 81: Building Custom Container Images with Containerfile", "shortTitle": "Building Custom Container Images with Containerfile", "fields": {"objective": "<p>Write a Containerfile (Dockerfile) and build a custom container image for an application.</p>", "prerequisites": "<ul>\n    <li>Podman installed</li>\n</ul>", "scenario": "<p>Create a custom Python web application container image with all dependencies baked in.</p>", "procedure": "<ol>\n    <li>Create the application directory:\n        <pre>mkdir ~/myapp && cd ~/myapp</pre>\n    </li>\n    <li>Create a simple application file (<code>app.py</code>):\n        <pre>cat <<'EOF' > app.py\nfrom http.server import HTTPServer, SimpleHTTPRequestHandler\nprint(\"Server starting on port 5000...\")\nHTTPServer((\"\", 5000), SimpleHTTPRequestHandler).serve_forever()\nEOF</pre>\n    </li>\n    <li>Create the Containerfile:\n        <pre>cat <<'EOF' > Containerfile\nFROM registry.access.redhat.com/ubi9/ubi-minimal\nRUN microdnf install -y python3 && microdnf clean all\nWORKDIR /app\nCOPY app.py .\nEXPOSE 5000\nCMD [\"python3\", \"app.py\"]\nEOF</pre>\n    </li>\n    <li>Build the image:\n        <pre>podman build -t myapp:v1 .</pre>\n    </li>\n    <li>Run and test:\n        <pre>podman run -d --name myapp-test -p 5000:5000 myapp:v1\ncurl http://localhost:5000</pre>\n    </li>\n</ol>", "verification": "<pre>$ podman images | grep myapp\nlocalhost/myapp    v1    abc123def456   1 minute ago   150 MB</pre>", "solution": "<p>The Containerfile defines the image build process. Each instruction creates a layer. Use <code>.containerignore</code> to exclude files from the build context.</p>"}}, {"id": 82, "section": 6, "title": "Lab 82: Managing Container Networking", "shortTitle": "Managing Container Networking", "fields": {"objective": "<p>Configure container networking including custom networks and inter-container communication.</p>", "prerequisites": "<ul>\n    <li>Podman installed</li>\n</ul>", "scenario": "<p>Set up multiple containers on a custom network so they can communicate with each other by name.</p>", "procedure": "<ol>\n    <li>List existing networks:\n        <pre>podman network ls</pre>\n    </li>\n    <li>Create a custom network:\n        <pre>podman network create mynet</pre>\n    </li>\n    <li>Run containers on the custom network:\n        <pre>podman run -d --name db --network mynet postgres:latest \\\n  -e POSTGRES_PASSWORD=secret\npodman run -d --name app --network mynet -p 8080:8080 myapp:v1</pre>\n    </li>\n    <li>Verify connectivity between containers:\n        <pre>podman exec app ping -c 2 db</pre>\n    </li>\n    <li>Inspect the network:\n        <pre>podman network inspect mynet</pre>\n    </li>\n    <li>Disconnect a container from a network:\n        <pre>podman network disconnect mynet app</pre>\n    </li>\n</ol>", "verification": "<pre>$ podman network ls\nNETWORK ID    NAME    DRIVER\nabc123def456  mynet   bridge\n2f259bab93aa  podman  bridge</pre>", "solution": "<p>Containers on the same custom network can reach each other using container names as hostnames (DNS resolution is automatic).</p>"}}, {"id": 83, "section": 6, "title": "Lab 83: Configuring Persistent Container Storage with Volumes", "shortTitle": "Configuring Persistent Container Storage with Volumes", "fields": {"objective": "<p>Create and manage volumes for persistent container data that survives container restarts and recreation.</p>", "prerequisites": "<ul>\n    <li>Podman installed</li>\n</ul>", "scenario": "<p>Ensure database container data survives container restarts and even container deletion.</p>", "procedure": "<ol>\n    <li>Create a named volume:\n        <pre>podman volume create dbdata</pre>\n    </li>\n    <li>Run a container with the volume mounted:\n        <pre>podman run -d --name postgres \\\n  -v dbdata:/var/lib/postgresql/data \\\n  -e POSTGRES_PASSWORD=secret \\\n  postgres:latest</pre>\n    </li>\n    <li>Use bind mounts for host directory mapping:\n        <pre>podman run -d --name webserver \\\n  -v /host/html:/usr/share/nginx/html:Z \\\n  -p 8080:80 nginx</pre>\n        <p>The <code>:Z</code> option sets the correct SELinux context on the mounted directory.</p>\n    </li>\n    <li>Inspect, list, and remove volumes:\n        <pre>podman volume inspect dbdata\npodman volume ls\npodman volume rm dbdata    # Volume must not be in use</pre>\n    </li>\n</ol>", "verification": "<pre>$ podman volume inspect dbdata\n[\n    {\n        \"Name\": \"dbdata\",\n        \"Mountpoint\": \"/var/lib/containers/storage/volumes/dbdata/_data\"\n    }\n]</pre>", "solution": "<p>Named volumes persist independently of containers. Bind mounts map host paths directly. Use <code>:Z</code> for SELinux relabeling.</p>"}}, {"id": 84, "section": 6, "title": "Lab 84: Creating and Managing Pods", "shortTitle": "Creating and Managing Pods", "fields": {"objective": "<p>Group related containers into Podman pods that share network namespaces.</p>", "prerequisites": "<ul>\n    <li>Podman installed</li>\n</ul>", "scenario": "<p>Deploy a multi-container web application stack (web server + app backend) as a pod.</p>", "procedure": "<ol>\n    <li>Create a pod with port mapping:\n        <pre>podman pod create --name webapp -p 8080:80</pre>\n    </li>\n    <li>Add containers to the pod:\n        <pre>podman run -d --pod webapp --name web nginx\npodman run -d --pod webapp --name app myapp:v1</pre>\n    </li>\n    <li>List and manage pods:\n        <pre>podman pod list\npodman pod inspect webapp\npodman pod stop webapp\npodman pod rm webapp</pre>\n    </li>\n</ol>", "verification": "<pre>$ podman pod list\nPOD ID        NAME    STATUS    CREATED        INFRA ID      # OF CONTAINERS\nabc123def456  webapp  Running   1 minute ago   def456abc123  3</pre>", "solution": "<p>All containers in a pod share the same network namespace (localhost connectivity). Ports are mapped at the pod level, not the container level.</p>"}}, {"id": 85, "section": 6, "title": "Lab 85: Generating systemd Unit Files from Containers", "shortTitle": "Generating systemd Unit Files from Containers", "fields": {"objective": "<p>Create systemd services to manage containers at boot, using both generated unit files and Quadlet.</p>", "prerequisites": "<ul>\n    <li>A running Podman container</li>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Make a containerized web application start automatically when the system boots.</p>", "procedure": "<ol>\n    <li>Generate a systemd unit file from a running container:\n        <pre>podman generate systemd --name webserver --new --files</pre>\n    </li>\n    <li>Install the unit file:\n        <pre>sudo cp container-webserver.service /etc/systemd/system/\nsudo systemctl daemon-reload\nsudo systemctl enable --now container-webserver</pre>\n    </li>\n    <li>For rootless containers (user-level systemd):\n        <pre>mkdir -p ~/.config/systemd/user/\ncp container-webserver.service ~/.config/systemd/user/\nsystemctl --user daemon-reload\nsystemctl --user enable --now container-webserver\nloginctl enable-linger $(whoami)</pre>\n    </li>\n    <li><strong>Quadlet method</strong> (Podman 4.4+): Create <code>/etc/containers/systemd/webserver.container</code>:\n        <pre>[Container]\nImage=docker.io/library/nginx:latest\nPublishPort=8080:80\nVolume=web-data:/usr/share/nginx/html\n\n[Install]\nWantedBy=default.target</pre>\n        <pre>sudo systemctl daemon-reload\nsudo systemctl start webserver</pre>\n    </li>\n</ol>", "verification": "<pre>$ sudo systemctl status container-webserver\n● container-webserver.service\n     Loaded: loaded\n     Active: active (running)</pre>", "solution": "<p>The <code>--new</code> flag creates a service that removes the old container and creates a fresh one on each start, ensuring a clean state.</p>"}}, {"id": 86, "section": 6, "title": "Lab 86: Running Rootless Containers", "shortTitle": "Running Rootless Containers", "fields": {"objective": "<p>Configure and run containers without root privileges for enhanced security.</p>", "prerequisites": "<ul>\n    <li>A regular (non-root) user account</li>\n    <li>Podman installed</li>\n</ul>", "scenario": "<p>Deploy containers as a non-root user to follow the principle of least privilege.</p>", "procedure": "<ol>\n    <li>As a regular user, run a rootless container:\n        <pre>podman run -d --name rootless-web -p 8080:80 nginx</pre>\n    </li>\n    <li>Verify no root processes:\n        <pre>ps aux | grep nginx</pre>\n    </li>\n    <li>Check user namespace mapping:\n        <pre>podman unshare cat /proc/self/uid_map</pre>\n    </li>\n    <li>Verify subuid/subgid configuration:\n        <pre>cat /etc/subuid\ncat /etc/subgid</pre>\n    </li>\n    <li>After modifying subuid/subgid, migrate storage:\n        <pre>podman system migrate</pre>\n    </li>\n</ol>", "verification": "<pre>$ podman unshare cat /proc/self/uid_map\n         0       1000          1\n         1     100000      65536\n\n$ id\nuid=1000(dave) gid=1000(dave)</pre>", "solution": "<p>Rootless containers run entirely in user namespaces. The container’s “root” is actually mapped to your regular UID on the host, providing strong isolation.</p>"}}, {"id": 87, "section": 6, "title": "Lab 87: Inspecting and Troubleshooting Containers", "shortTitle": "Inspecting and Troubleshooting Containers", "fields": {"objective": "<p>Debug container issues using Podman inspection and logging tools.</p>", "prerequisites": "<ul>\n    <li>Podman installed</li>\n</ul>", "scenario": "<p>A container application is failing to start. Diagnose the problem using Podman’s built-in troubleshooting tools.</p>", "procedure": "<ol>\n    <li>Create an intentionally broken container:\n        <pre>podman run -d --name failing nginx nonexistent-command</pre>\n    </li>\n    <li>Check logs:\n        <pre>podman logs failing</pre>\n    </li>\n    <li>Inspect the container for configuration issues:\n        <pre>podman inspect failing</pre>\n    </li>\n    <li>View running processes in a working container:\n        <pre>podman top webserver</pre>\n    </li>\n    <li>View filesystem changes:\n        <pre>podman diff webserver</pre>\n    </li>\n    <li>View recent Podman events:\n        <pre>podman events --since 1h</pre>\n    </li>\n</ol>", "verification": "<pre>$ podman logs failing\n/docker-entrypoint.sh: exec: line 47: nonexistent-command: not found\n\n$ podman inspect failing --format '{{.State.Status}}'\nexited</pre>", "solution": "<p>Container logs, inspect output, and events provide comprehensive diagnostic information for troubleshooting.</p>"}}, {"id": 88, "section": 6, "title": "Lab 88: Configuring Container Registries", "shortTitle": "Configuring Container Registries", "fields": {"objective": "<p>Configure which container registries Podman searches and pulls from, including private registries.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access for system-wide configuration</li>\n</ul>", "scenario": "<p>Add a private container registry and configure the search order for image resolution.</p>", "procedure": "<ol>\n    <li>Edit the registries configuration:\n        <pre>sudo vi /etc/containers/registries.conf</pre>\n    </li>\n    <li>Configure unqualified search registries:\n        <pre>unqualified-search-registries = [\"registry.example.com\", \"docker.io\", \"quay.io\"]</pre>\n    </li>\n    <li>Add a private registry with custom settings:\n        <pre>[[registry]]\nlocation = \"registry.example.com\"\ninsecure = false\n\n[[registry]]\nlocation = \"dev-registry.internal:5000\"\ninsecure = true   # Allow HTTP (not recommended for production)</pre>\n    </li>\n    <li>Log in to a private registry:\n        <pre>podman login registry.example.com</pre>\n    </li>\n    <li>Use drop-in configuration:\n        <pre>sudo vi /etc/containers/registries.conf.d/myregistry.conf</pre>\n    </li>\n</ol>", "verification": "<pre>$ podman info | grep -A5 registries\nregistries:\n  search:\n  - registry.example.com\n  - docker.io\n  - quay.io</pre>", "solution": "<p>The search order determines which registry is checked first for unqualified image names (e.g., <code>nginx</code> without a registry prefix).</p>"}}, {"id": 89, "section": 6, "title": "Lab 89: Managing Container Resource Limits", "shortTitle": "Managing Container Resource Limits", "fields": {"objective": "<p>Set CPU, memory, and I/O limits on containers to prevent resource exhaustion.</p>", "prerequisites": "<ul>\n    <li>Podman installed</li>\n    <li>cgroups v2 enabled (default on RHEL 9 / Ubuntu 22.04+)</li>\n</ul>", "scenario": "<p>Prevent a container from consuming all host resources by applying strict resource limits.</p>", "procedure": "<ol>\n    <li>Run a container with resource limits:\n        <pre>podman run -d --name limited \\\n  --memory 512m \\\n  --cpus 1.5 \\\n  --memory-swap 1g \\\n  --pids-limit 100 \\\n  nginx</pre>\n    </li>\n    <li>Verify the limits:\n        <pre>podman inspect limited --format '{{.HostConfig.Memory}}'\npodman inspect limited --format '{{.HostConfig.NanoCpus}}'</pre>\n    </li>\n    <li>Update limits on a running container:\n        <pre>podman update --memory 1g limited</pre>\n    </li>\n    <li>Monitor real-time resource usage:\n        <pre>podman stats\npodman stats limited</pre>\n    </li>\n</ol>", "verification": "<pre>$ podman stats --no-stream\nCONTAINER ID  NAME     CPU %  MEM USAGE / LIMIT    MEM %  NET I/O  BLOCK I/O  PIDS\na1b2c3d4e5f6  limited  0.05%  15.2MiB / 512MiB     2.97%  0B / 0B  0B / 0B    3</pre>", "solution": "<p>Resource limits prevent noisy-neighbor problems. <code>podman stats</code> provides a real-time dashboard similar to <code>docker stats</code>.</p>"}}, {"id": 90, "section": 7, "title": "Lab 90: Checking SELinux Status and Modes", "shortTitle": "Checking SELinux Status and Modes", "fields": {"objective": "<p>Verify SELinux status, understand the three operating modes, and view security contexts on files, processes, and users.</p>", "prerequisites": "<ul>\n    <li>RHEL/Rocky Linux (SELinux enabled by default)</li>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Audit the SELinux configuration on a newly received server to verify it meets security policy requirements.</p>", "procedure": "<ol>\n    <li>Check the current mode:\n        <pre>getenforce</pre>\n    </li>\n    <li>Get detailed SELinux status:\n        <pre>sestatus</pre>\n    </li>\n    <li>Examine the configuration file:\n        <pre>cat /etc/selinux/config</pre>\n    </li>\n    <li>View security contexts:\n        <pre>ls -Z /var/www/html/         # File contexts\nps -eZ | grep httpd          # Process contexts\nid -Z                        # User context</pre>\n    </li>\n</ol>\n\n\n    <p>💡 SELinux Modes</p>\n    <p><strong>Enforcing</strong>: SELinux policy is enforced; access violations are blocked and logged.\n    <strong>Permissive</strong>: SELinux policy is not enforced, but violations are logged. Useful for troubleshooting.\n    <strong>Disabled</strong>: SELinux is completely turned off. Not recommended; re-enabling requires a full filesystem relabel.</p>", "verification": "<pre>$ getenforce\nEnforcing\n\n$ sestatus\nSELinux status:                 enabled\nSELinuxfs mount:                /sys/fs/selinux\nSELinux root directory:         /etc/selinux\nLoaded policy name:             targeted\nCurrent mode:                   enforcing\nMode from config file:          enforcing</pre>", "solution": "<p>On a properly configured RHEL/Rocky system, SELinux should be in <code>Enforcing</code> mode with the <code>targeted</code> policy loaded.</p>"}}, {"id": 91, "section": 7, "title": "Lab 91: Switching Between SELinux Modes", "shortTitle": "Switching Between SELinux Modes", "fields": {"objective": "<p>Change SELinux modes both temporarily (at runtime) and persistently (a
