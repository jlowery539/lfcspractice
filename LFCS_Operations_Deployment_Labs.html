<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#f1f5f9;overflow:hidden;height:100vh}
#sidebar{width:300px;height:100vh;position:fixed;left:0;top:0;z-index:40;background:#0f172a;color:#cbd5e1;overflow:hidden;display:flex;flex-direction:column;transition:transform .3s ease}
#sidebar-scroll{flex:1;overflow-y:auto;padding-bottom:16px}
#sidebar-scroll::-webkit-scrollbar{width:5px}
#sidebar-scroll::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
#sidebar-scroll::-webkit-scrollbar-track{background:transparent}
#main{margin-left:300px;height:100vh;overflow-y:auto}
#main::-webkit-scrollbar{width:7px}
#main::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
.sec-hdr{cursor:pointer;user-select:none;padding:10px 14px;display:flex;align-items:center;gap:8px;transition:background .15s}
.sec-hdr:hover{background:#1e293b}
.sec-labs{overflow:hidden;transition:max-height .3s ease}
.sec-labs.shut{max-height:0!important}
.lab-link{cursor:pointer;display:flex;align-items:center;gap:8px;padding:5px 12px 5px 22px;font-size:13px;color:#94a3b8;transition:all .15s;line-height:1.35}
.lab-link:hover{background:#1e293b;color:#e2e8f0}
.lab-link.on{background:#1e3a5a;color:#93c5fd;font-weight:500}
.chk{width:15px;height:15px;border-radius:3px;border:1.5px solid #475569;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:10px;color:transparent}
.chk.done{background:#3b82f6;border-color:#3b82f6;color:#fff}
.chk.done::after{content:'\2713'}
pre{background:#1a1b26;color:#c0caf5;padding:14px 44px 14px 14px;border-radius:8px;overflow-x:auto;font-family:'JetBrains Mono',Consolas,monospace;font-size:13px;line-height:1.55;margin:6px 0 10px;position:relative;white-space:pre-wrap;word-wrap:break-word}
.cp-btn{position:absolute;top:6px;right:6px;background:#2a2b3d;color:#7dcfff;border:none;border-radius:5px;padding:3px 9px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;opacity:.6;transition:opacity .2s}
pre:hover .cp-btn{opacity:1}
.cp-btn:hover{background:#3b3c56}
code{font-family:'JetBrains Mono',Consolas,monospace;font-size:.85em;background:#e2e8f0;color:#1e293b;padding:1px 5px;border-radius:4px}
pre code{background:none;padding:0;color:inherit;font-size:inherit}
.fcard{background:#fff;border-radius:10px;padding:18px 22px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.fcard.obj{border-left:4px solid #3b82f6}
.fcard.scn{border-left:4px solid #8b5cf6;background:#faf5ff}
.fcard.pre{border-left:4px solid #f59e0b}
.fcard.prc{border-left:4px solid #10b981}
.fcard.ver{border-left:4px solid #06b6d4}
.fcard.sol{border-left:4px solid #ef4444;background:#fef2f2}
.fl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.sol-body{overflow:hidden;transition:max-height .4s ease}
.sol-body.shut{max-height:0!important}
.lc ol,.lc ul{padding-left:22px;margin:6px 0}
.lc li{margin-bottom:5px;line-height:1.6;color:#334155}
.lc p{margin-bottom:7px;line-height:1.65;color:#334155}
.lc strong{color:#1e293b}
.nb{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid #e2e8f0;background:#fff;color:#334155}
.nb:hover{background:#eff6ff;border-color:#93c5fd;color:#2563eb}
.nb:disabled{opacity:.35;cursor:not-allowed}
.nb:disabled:hover{background:#fff;border-color:#e2e8f0;color:#334155}
.scard{background:#fff;border-radius:10px;padding:18px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:all .2s;border:1px solid #e5e7eb}
.scard:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-2px);border-color:#93c5fd}
#menu-btn{display:none;position:fixed;top:10px;left:10px;z-index:50;background:#0f172a;color:#fff;border:none;border-radius:8px;padding:8px;cursor:pointer}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:35}
@media(max-width:768px){
  #sidebar{transform:translateX(-100%);width:280px}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  #menu-btn{display:flex;align-items:center;justify-content:center}
  #overlay.show{display:block}
}

<script>
var LABS=[{"id": 1, "section": 0, "title": "Lab 1: Viewing Current Kernel Parameters with sysctl", "shortTitle": "Viewing Current Kernel Parameters with sysctl", "fields": {"objective": "<p>Use <code>sysctl</code> to list all active kernel parameters and understand how the parameter namespaces map to the <code>/proc/sys/</code> directory structure.</p>", "prerequisites": "<ul>\n    <li>A running Linux system with root or sudo access</li>\n    <li>The <code>procps-ng</code> package (installed by default on most distributions)</li>\n</ul>", "scenario": "<p>A senior administrator asks you to audit the current kernel tuning on a newly provisioned server before it enters production. You need to document the total number of tunable parameters, review the network configuration, and verify IP forwarding status.</p>", "procedure": "<ol>\n    <li>List all active kernel parameters:\n        <pre>sudo sysctl -a</pre>\n    </li>\n    <li>Count the total number of tunable parameters:\n        <pre>sudo sysctl -a 2>/dev/null | wc -l</pre>\n    </li>\n    <li>Filter parameters by namespace — view all IPv4 network parameters:\n        <pre>sudo sysctl -a | grep net.ipv4</pre>\n    </li>\n    <li>Query a specific parameter by name:\n        <pre>sysctl net.ipv4.ip_forward</pre>\n    </li>\n    <li>Explore the <code>/proc/sys/</code> directory to understand how parameters map to files:\n        <pre>ls /proc/sys/\nls /proc/sys/net/ipv4/</pre>\n    </li>\n    <li>Read a parameter value directly from the proc filesystem:\n        <pre>cat /proc/sys/net/ipv4/ip_forward</pre>\n    </li>\n</ol>", "verification": "<p>Confirm that the output of <code>sysctl net.ipv4.ip_forward</code> matches the value in <code>/proc/sys/net/ipv4/ip_forward</code>. Both should report the same value (typically <code>0</code> on a freshly installed system).</p>", "solution": "<pre># Expected output examples:\n$ sysctl net.ipv4.ip_forward\nnet.ipv4.ip_forward = 0\n\n$ cat /proc/sys/net/ipv4/ip_forward\n0\n\n$ sudo sysctl -a 2>/dev/null | wc -l\n1100   # (approximate; varies by kernel version)</pre>"}}, {"id": 2, "section": 0, "title": "Lab 2: Temporarily Modifying Kernel Parameters (Non-Persistent)", "shortTitle": "Temporarily Modifying Kernel Parameters (Non-Persistent)", "fields": {"objective": "<p>Change kernel parameters at runtime using <code>sysctl -w</code> and direct writes to <code>/proc/sys</code>. Understand that these changes are non-persistent and will be lost on reboot.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Completion of Lab 1</li>\n</ul>", "scenario": "<p>A developer needs IP forwarding enabled temporarily for testing a multi-container network setup. The change should not survive a reboot since it is only needed for today’s test.</p>", "procedure": "<ol>\n    <li>Check the current value of the IP forwarding parameter:\n        <pre>sysctl net.ipv4.ip_forward</pre>\n    </li>\n    <li>Enable IP forwarding using <code>sysctl -w</code>:\n        <pre>sudo sysctl -w net.ipv4.ip_forward=1</pre>\n    </li>\n    <li>Verify the change took effect:\n        <pre>sysctl net.ipv4.ip_forward</pre>\n    </li>\n    <li>Alternatively, write directly to the proc filesystem:\n        <pre>echo 1 | sudo tee /proc/sys/net/ipv4/ip_forward</pre>\n    </li>\n    <li>Confirm the value:\n        <pre>cat /proc/sys/net/ipv4/ip_forward</pre>\n    </li>\n</ol>", "verification": "<p>Both methods should report <code>net.ipv4.ip_forward = 1</code>. Note that rebooting the system (or running <code>sysctl --system</code> if persistent configs override it) will reset this value to the default.</p>", "solution": "<pre>$ sysctl net.ipv4.ip_forward\nnet.ipv4.ip_forward = 0\n\n$ sudo sysctl -w net.ipv4.ip_forward=1\nnet.ipv4.ip_forward = 1\n\n$ sysctl net.ipv4.ip_forward\nnet.ipv4.ip_forward = 1\n\n$ echo 1 | sudo tee /proc/sys/net/ipv4/ip_forward\n1\n\n# After reboot, the value returns to 0 (default)</pre>"}}, {"id": 3, "section": 0, "title": "Lab 3: Making Kernel Parameters Persistent with sysctl.conf", "shortTitle": "Making Kernel Parameters Persistent with sysctl.conf", "fields": {"objective": "<p>Configure permanent kernel parameter changes using <code>/etc/sysctl.conf</code> and <code>/etc/sysctl.d/</code> drop-in files so they survive reboots.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Understanding of non-persistent changes from Lab 2</li>\n</ul>", "scenario": "<p>The security team mandates that ICMP redirects be disabled permanently across all servers to prevent potential man-in-the-middle attacks. You must implement this change so it persists across reboots.</p>", "procedure": "<ol>\n    <li>Create a drop-in configuration file for security settings:\n        <pre>sudo vi /etc/sysctl.d/99-security.conf</pre>\n    </li>\n    <li>Add the following content:\n        <pre># Disable ICMP redirects - Security Team Mandate\nnet.ipv4.conf.all.accept_redirects = 0\nnet.ipv4.conf.default.accept_redirects = 0\nnet.ipv4.conf.all.secure_redirects = 0\nnet.ipv4.conf.default.secure_redirects = 0</pre>\n    </li>\n    <li>Apply the configuration without rebooting:\n        <pre>sudo sysctl -p /etc/sysctl.d/99-security.conf</pre>\n    </li>\n    <li>Alternatively, reload all sysctl configuration files:\n        <pre>sudo sysctl --system</pre>\n    </li>\n    <li>Verify the parameters are now active:\n        <pre>sysctl net.ipv4.conf.all.accept_redirects\nsysctl net.ipv4.conf.default.accept_redirects</pre>\n    </li>\n</ol>", "verification": "<p>All four parameters should return <code>0</code>. Reboot the system and confirm the values persist.</p>", "solution": "<pre>$ sudo sysctl -p /etc/sysctl.d/99-security.conf\nnet.ipv4.conf.all.accept_redirects = 0\nnet.ipv4.conf.default.accept_redirects = 0\nnet.ipv4.conf.all.secure_redirects = 0\nnet.ipv4.conf.default.secure_redirects = 0\n\n$ sysctl net.ipv4.conf.all.accept_redirects\nnet.ipv4.conf.all.accept_redirects = 0</pre>"}}, {"id": 4, "section": 0, "title": "Lab 4: Tuning Network Kernel Parameters for a Web Server", "shortTitle": "Tuning Network Kernel Parameters for a Web Server", "fields": {"objective": "<p>Optimize kernel network stack parameters for high-traffic web server performance by tuning TCP backlog, connection timeouts, and buffer sizes.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Understanding of persistent sysctl configuration from Lab 3</li>\n</ul>", "scenario": "<p>A web application is dropping connections under load. Users report intermittent connection timeouts during peak hours. You must tune the kernel TCP stack to handle higher connection volumes.</p>", "procedure": "<ol>\n    <li>Create a web server tuning configuration file:\n        <pre>sudo vi /etc/sysctl.d/90-webserver.conf</pre>\n    </li>\n    <li>Add the following parameters:\n        <pre># Web Server TCP Tuning\nnet.core.somaxconn = 65535\nnet.ipv4.tcp_max_syn_backlog = 65535\nnet.core.netdev_max_backlog = 65535\nnet.ipv4.tcp_fin_timeout = 15\nnet.ipv4.tcp_tw_reuse = 1\nnet.ipv4.tcp_keepalive_time = 300</pre>\n    </li>\n    <li>Apply the settings:\n        <pre>sudo sysctl --system</pre>\n    </li>\n    <li>Verify each parameter individually:\n        <pre>sysctl net.core.somaxconn\nsysctl net.ipv4.tcp_max_syn_backlog\nsysctl net.core.netdev_max_backlog\nsysctl net.ipv4.tcp_fin_timeout\nsysctl net.ipv4.tcp_tw_reuse\nsysctl net.ipv4.tcp_keepalive_time</pre>\n    </li>\n</ol>", "verification": "<p>Each parameter should reflect the value specified in the configuration file. Under load testing, connection drops should be significantly reduced.</p>", "solution": "<pre>$ sysctl net.core.somaxconn\nnet.core.somaxconn = 65535\n\n$ sysctl net.ipv4.tcp_fin_timeout\nnet.ipv4.tcp_fin_timeout = 15\n\n$ sysctl net.ipv4.tcp_tw_reuse\nnet.ipv4.tcp_tw_reuse = 1\n\n$ sysctl net.ipv4.tcp_keepalive_time\nnet.ipv4.tcp_keepalive_time = 300</pre>"}}, {"id": 5, "section": 0, "title": "Lab 5: Configuring Kernel Memory Management Parameters", "shortTitle": "Configuring Kernel Memory Management Parameters", "fields": {"objective": "<p>Tune the virtual memory (vm) subsystem parameters to optimize a system for database workloads, reducing unnecessary swapping and controlling dirty page behavior.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Understanding of Linux virtual memory concepts</li>\n</ul>", "scenario": "<p>A PostgreSQL database server is experiencing performance degradation due to excessive swapping and unpredictable disk write bursts. You need to tune the kernel memory management to prioritize keeping database pages in RAM and smooth out write operations.</p>", "procedure": "<ol>\n    <li>Examine the current swappiness value (default is 60):\n        <pre>sysctl vm.swappiness</pre>\n    </li>\n    <li>Check current dirty page ratios:\n        <pre>sysctl vm.dirty_ratio\nsysctl vm.dirty_background_ratio</pre>\n    </li>\n    <li>Create the database tuning configuration:\n        <pre>sudo vi /etc/sysctl.d/90-database.conf</pre>\n    </li>\n    <li>Add the following content:\n        <pre># Database Memory Tuning\n# Reduce swappiness - keep data in RAM (default 60, set to 10)\nvm.swappiness = 10\n\n# Start background writeback at 5% dirty memory (default 10)\nvm.dirty_background_ratio = 5\n\n# Force synchronous writeback at 15% dirty memory (default 20)\nvm.dirty_ratio = 15\n\n# Strict overcommit accounting for database stability\nvm.overcommit_memory = 2</pre>\n    </li>\n    <li>Apply and verify:\n        <pre>sudo sysctl -p /etc/sysctl.d/90-database.conf\nsysctl vm.swappiness vm.dirty_ratio vm.dirty_background_ratio vm.overcommit_memory</pre>\n    </li>\n</ol>", "verification": "<p>Confirm <code>vm.swappiness = 10</code>, <code>vm.dirty_background_ratio = 5</code>, <code>vm.dirty_ratio = 15</code>, and <code>vm.overcommit_memory = 2</code>. Monitor swap usage with <code>free -h</code> and <code>vmstat 1 5</code> to observe reduced swap activity under load.</p>", "solution": "<pre>$ sudo sysctl -p /etc/sysctl.d/90-database.conf\nvm.swappiness = 10\nvm.dirty_background_ratio = 5\nvm.dirty_ratio = 15\nvm.overcommit_memory = 2\n\n$ sysctl vm.swappiness\nvm.swappiness = 10</pre>"}}, {"id": 6, "section": 0, "title": "Lab 6: Security Hardening with Kernel Parameters", "shortTitle": "Security Hardening with Kernel Parameters", "fields": {"objective": "<p>Apply CIS benchmark-aligned kernel security parameters to harden a server against common network-level attacks and information disclosure.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Understanding of network security fundamentals</li>\n</ul>", "scenario": "<p>Your organization is preparing for a security audit. You must harden kernel parameters across all servers according to CIS Benchmark Level 1 recommendations before the auditors arrive.</p>", "procedure": "<ol>\n    <li>Create the CIS hardening configuration file:\n        <pre>sudo vi /etc/sysctl.d/80-cis-hardening.conf</pre>\n    </li>\n    <li>Add the following parameters with explanations:\n        <pre># CIS Benchmark Kernel Hardening\n\n# Enable ASLR (Address Space Layout Randomization) - full randomization\nkernel.randomize_va_space = 2\n\n# Enable reverse path filtering - prevents IP spoofing\nnet.ipv4.conf.all.rp_filter = 1\nnet.ipv4.conf.default.rp_filter = 1\n\n# Log martian packets (impossible source addresses)\nnet.ipv4.conf.all.log_martians = 1\n\n# Ignore ICMP broadcast requests (prevents Smurf attacks)\nnet.ipv4.icmp_echo_ignore_broadcasts = 1\n\n# Disable sending ICMP redirects (this host is not a router)\nnet.ipv4.conf.all.send_redirects = 0\n\n# Disable SysRq key (prevents console-level attacks)\nkernel.sysrq = 0\n\n# Disable IPv6 if not in use\nnet.ipv6.conf.all.disable_ipv6 = 1</pre>\n    </li>\n    <li>Apply the hardening settings:\n        <pre>sudo sysctl --system</pre>\n    </li>\n    <li>Verify each setting:\n        <pre>sysctl kernel.randomize_va_space\nsysctl net.ipv4.conf.all.rp_filter\nsysctl net.ipv4.conf.all.log_martians\nsysctl net.ipv4.icmp_echo_ignore_broadcasts\nsysctl net.ipv4.conf.all.send_redirects\nsysctl kernel.sysrq\nsysctl net.ipv6.conf.all.disable_ipv6</pre>\n    </li>\n</ol>", "verification": "<p>All parameters should match the configured values. Verify IPv6 is disabled with <code>ip -6 addr show</code> (should show no addresses or error).</p>", "solution": "<pre>$ sysctl kernel.randomize_va_space\nkernel.randomize_va_space = 2\n\n$ sysctl net.ipv4.conf.all.rp_filter\nnet.ipv4.conf.all.rp_filter = 1\n\n$ sysctl kernel.sysrq\nkernel.sysrq = 0\n\n$ sysctl net.ipv6.conf.all.disable_ipv6\nnet.ipv6.conf.all.disable_ipv6 = 1</pre>"}}, {"id": 7, "section": 0, "title": "Lab 7: Managing Kernel Modules with modprobe", "shortTitle": "Managing Kernel Modules with modprobe", "fields": {"objective": "<p>List, load, inspect, and remove kernel modules using <code>lsmod</code>, <code>modinfo</code>, and <code>modprobe</code>.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>The <code>kmod</code> package (installed by default)</li>\n</ul>", "scenario": "<p>A new storage controller requires loading a specific kernel module. You need to verify module availability, load it, confirm it is functioning, and understand its dependencies.</p>", "procedure": "<ol>\n    <li>List all currently loaded kernel modules:\n        <pre>lsmod</pre>\n    </li>\n    <li>Count loaded modules and sort by size:\n        <pre>lsmod | wc -l\nlsmod | sort -k2 -n -r | head -10</pre>\n    </li>\n    <li>Get detailed information about a specific module:\n        <pre>modinfo ext4\nmodinfo -p ext4   # Show parameters only</pre>\n    </li>\n    <li>Load the <code>dummy</code> network module:\n        <pre>sudo modprobe dummy</pre>\n    </li>\n    <li>Verify the module is loaded:\n        <pre>lsmod | grep dummy</pre>\n    </li>\n    <li>Check module dependencies:\n        <pre>modinfo -F depends dummy\nmodprobe --show-depends dummy</pre>\n    </li>\n    <li>Remove the module:\n        <pre>sudo modprobe -r dummy\nlsmod | grep dummy   # Should return no output</pre>\n    </li>\n</ol>", "verification": "<p>After loading, <code>lsmod | grep dummy</code> should show the module. After removing, the same command should produce no output.</p>", "solution": "<pre>$ sudo modprobe dummy\n$ lsmod | grep dummy\ndummy                  16384  0\n\n$ modinfo dummy\nfilename:       /lib/modules/5.14.0-362.el9.x86_64/kernel/drivers/net/dummy.ko\nlicense:        GPL\n...\n\n$ sudo modprobe -r dummy\n$ lsmod | grep dummy\n(no output)</pre>"}}, {"id": 8, "section": 0, "title": "Lab 8: Blacklisting Kernel Modules", "shortTitle": "Blacklisting Kernel Modules", "fields": {"objective": "<p>Prevent specific kernel modules from loading at boot using blacklist configuration and initramfs regeneration.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Understanding of kernel modules from Lab 7</li>\n</ul>", "scenario": "<p>Security policy requires disabling USB storage and FireWire modules to prevent unauthorized data exfiltration via removable media.</p>", "procedure": "<ol>\n    <li>Create a blacklist configuration file:\n        <pre>sudo vi /etc/modprobe.d/blacklist-usb-storage.conf</pre>\n    </li>\n    <li>Add the following lines:\n        <pre># Prevent USB storage module from loading\nblacklist usb-storage\ninstall usb-storage /bin/false\n\n# Prevent FireWire module from loading\nblacklist firewire-core\ninstall firewire-core /bin/false</pre>\n    </li>\n    <li>Regenerate the initramfs to include the blacklist:\n        <strong>RHEL/Rocky:</strong>\n        <pre>sudo dracut -f</pre>\n        <strong>Ubuntu:</strong>\n        <pre>sudo update-initramfs -u</pre>\n    </li>\n    <li>Verify the module cannot be loaded (after reboot or unloading):\n        <pre>sudo modprobe usb-storage\nlsmod | grep usb_storage   # Should show nothing</pre>\n    </li>\n</ol>", "verification": "<p>After rebooting, <code>lsmod | grep usb_storage</code> should produce no output. Attempting <code>sudo modprobe usb-storage</code> should fail silently (due to the <code>install</code> redirect to <code>/bin/false</code>).</p>", "solution": "<pre>$ cat /etc/modprobe.d/blacklist-usb-storage.conf\nblacklist usb-storage\ninstall usb-storage /bin/false\nblacklist firewire-core\ninstall firewire-core /bin/false\n\n$ sudo dracut -f   # RHEL/Rocky\n$ sudo modprobe usb-storage\n$ lsmod | grep usb_storage\n(no output - module is blacklisted)</pre>"}}, {"id": 9, "section": 0, "title": "Lab 9: Configuring Kernel Boot Parameters via GRUB", "shortTitle": "Configuring Kernel Boot Parameters via GRUB", "fields": {"objective": "<p>Modify GRUB boot parameters to pass options to the kernel at boot time, both persistently and as one-time overrides.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>GRUB2 bootloader (default on RHEL/Rocky and Ubuntu)</li>\n</ul>", "scenario": "<p>A system needs to boot with auditing enabled and crashkernel memory reserved for troubleshooting. You must configure these as persistent GRUB boot parameters.</p>", "procedure": "<ol>\n    <li>View the current kernel boot parameters:\n        <pre>cat /proc/cmdline</pre>\n    </li>\n    <li>Edit the GRUB defaults file:\n        <pre>sudo vi /etc/default/grub</pre>\n    </li>\n    <li>Modify the <code>GRUB_CMDLINE_LINUX</code> line to add parameters:\n        <pre>GRUB_CMDLINE_LINUX=\"... audit=1 crashkernel=auto\"</pre>\n    </li>\n    <li>Regenerate the GRUB configuration:\n        <strong>RHEL/Rocky:</strong>\n        <pre>sudo grub2-mkconfig -o /boot/grub2/grub.cfg</pre>\n        <strong>Ubuntu:</strong>\n        <pre>sudo update-grub</pre>\n    </li>\n    <li>Reboot and verify:\n        <pre>sudo reboot\n# After reboot:\ncat /proc/cmdline | grep audit</pre>\n    </li>\n    <li>For a temporary one-time boot parameter, press <code>e</code> at the GRUB menu, edit the <code>linux</code> line to add parameters, and press <code>Ctrl+X</code> to boot. Changes made this way do not persist.</li>\n</ol>", "verification": "<p>After reboot, <code>cat /proc/cmdline</code> should include <code>audit=1</code> and <code>crashkernel=auto</code>.</p>", "solution": "<pre>$ cat /proc/cmdline\nBOOT_IMAGE=(hd0,msdos1)/vmlinuz-5.14.0-362.el9.x86_64 root=/dev/mapper/rl-root\n  ro crashkernel=auto audit=1\n\n$ grep GRUB_CMDLINE_LINUX /etc/default/grub\nGRUB_CMDLINE_LINUX=\"crashkernel=auto resume=/dev/mapper/rl-swap\n  rd.lvm.lv=rl/root rd.lvm.lv=rl/swap audit=1\"</pre>"}}, {"id": 10, "section": 0, "title": "Lab 10: Monitoring the Kernel Ring Buffer with dmesg", "shortTitle": "Monitoring the Kernel Ring Buffer with dmesg", "fields": {"objective": "<p>Use <code>dmesg</code> to view and filter kernel messages for diagnosing hardware issues, driver problems, and system errors.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access (required for dmesg on newer kernels with <code>dmesg_restrict=1</code>)</li>\n</ul>", "scenario": "<p>A server is experiencing intermittent storage errors. You need to check the kernel ring buffer for any disk-related error messages to determine the root cause.</p>", "procedure": "<ol>\n    <li>View all kernel messages:\n        <pre>sudo dmesg</pre>\n    </li>\n    <li>Display messages with human-readable timestamps:\n        <pre>sudo dmesg -T</pre>\n    </li>\n    <li>Filter by severity level — show only errors and warnings:\n        <pre>sudo dmesg --level=err,warn</pre>\n    </li>\n    <li>Search for specific device messages:\n        <pre>sudo dmesg | grep -i \"sd\\|ata\\|scsi\\|i/o error\"</pre>\n    </li>\n    <li>Search for USB device events:\n        <pre>sudo dmesg | grep -i usb</pre>\n    </li>\n    <li>Clear the ring buffer (useful for isolating new events):\n        <pre>sudo dmesg -c</pre>\n    </li>\n    <li>Use <code>journalctl</code> as an alternative for kernel messages:\n        <pre>journalctl -k\njournalctl -k -p err</pre>\n    </li>\n</ol>", "verification": "<p>Review the output for any <code>I/O error</code>, <code>medium error</code>, or <code>sense key</code> messages that would indicate disk hardware issues.</p>", "solution": "<pre>$ sudo dmesg --level=err,warn | tail -5\n[  12.345678] sd 0:0:0:0: [sda] Sense Key : Medium Error [current]\n[  12.345680] sd 0:0:0:0: [sda] Add. Sense: Unrecovered read error\n\n$ sudo dmesg -T | grep -i \"i/o error\"\n[Wed Apr 29 03:15:22 2026] Buffer I/O error on dev sdb, sector 12345</pre>"}}, {"id": 11, "section": 0, "title": "Lab 11: Configuring Kernel Parameters for IPv6", "shortTitle": "Configuring Kernel Parameters for IPv6", "fields": {"objective": "<p>Manage IPv6-related kernel parameters including disabling IPv6 system-wide when the network infrastructure does not support it.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>Knowledge of sysctl persistent configuration</li>\n</ul>", "scenario": "<p>The network team has confirmed that IPv6 is not used anywhere in the data center. To reduce the attack surface and eliminate unnecessary processes, you must disable IPv6 system-wide.</p>", "procedure": "<ol>\n    <li>Check the current IPv6 status:\n        <pre>sysctl net.ipv6.conf.all.disable_ipv6\nip -6 addr show</pre>\n    </li>\n    <li>Create a sysctl configuration to disable IPv6:\n        <pre>sudo vi /etc/sysctl.d/99-disable-ipv6.conf</pre>\n        <pre># Disable IPv6 system-wide\nnet.ipv6.conf.all.disable_ipv6 = 1\nnet.ipv6.conf.default.disable_ipv6 = 1</pre>\n    </li>\n    <li>Apply the changes:\n        <pre>sudo sysctl --system</pre>\n    </li>\n    <li>Verify IPv6 is disabled:\n        <pre>sysctl net.ipv6.conf.all.disable_ipv6\nip -6 addr show   # Should show no addresses</pre>\n    </li>\n    <li>Alternatively, disable via GRUB (more thorough):\n        <pre>sudo vi /etc/default/grub\n# Add ipv6.disable=1 to GRUB_CMDLINE_LINUX\nsudo grub2-mkconfig -o /boot/grub2/grub.cfg  # RHEL/Rocky\nsudo update-grub                               # Ubuntu</pre>\n    </li>\n    <li>To re-enable IPv6 later, remove the config file and apply:\n        <pre>sudo rm /etc/sysctl.d/99-disable-ipv6.conf\nsudo sysctl --system</pre>\n    </li>\n</ol>", "verification": "<p><code>ip -6 addr show</code> should produce no output after applying the changes.</p>", "solution": "<pre>$ sysctl net.ipv6.conf.all.disable_ipv6\nnet.ipv6.conf.all.disable_ipv6 = 1\n\n$ ip -6 addr show\n(no output)</pre>"}}, {"id": 12, "section": 0, "title": "Lab 12: Tuning Kernel I/O Scheduler Parameters", "shortTitle": "Tuning Kernel I/O Scheduler Parameters", "fields": {"objective": "<p>View and change the I/O scheduler for block devices to optimize disk performance for different workload types.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>At least one block device (e.g., <code>/dev/sda</code>)</li>\n</ul>", "scenario": "<p>An SSD-backed database server is using the default I/O scheduler. You need to evaluate and change the scheduler to one optimized for SSDs.</p>", "procedure": "<ol>\n    <li>Check the current I/O scheduler for your primary disk:\n        <pre>cat /sys/block/sda/queue/scheduler</pre>\n        <p>The active scheduler is shown in brackets, e.g., <code>[mq-deadline] kyber bfq none</code>.</p>\n    </li>\n    <li>Change the scheduler temporarily to <code>none</code> (best for NVMe/SSD):\n        <pre>echo \"none\" | sudo tee /sys/block/sda/queue/scheduler</pre>\n    </li>\n    <li>Verify the change:\n        <pre>cat /sys/block/sda/queue/scheduler</pre>\n    </li>\n    <li>Make the change persistent with a udev rule:\n        <pre>sudo vi /etc/udev/rules.d/60-io-scheduler.rules</pre>\n        <pre># Set I/O scheduler to none for SSDs\nACTION==\"add|change\", KERNEL==\"sd[a-z]\", ATTR{queue/rotational}==\"0\", ATTR{queue/scheduler}=\"none\"\n# Set I/O scheduler to mq-deadline for HDDs\nACTION==\"add|change\", KERNEL==\"sd[a-z]\", ATTR{queue/rotational}==\"1\", ATTR{queue/scheduler}=\"mq-deadline\"</pre>\n    </li>\n    <li>Reload udev rules:\n        <pre>sudo udevadm control --reload-rules\nsudo udevadm trigger</pre>\n    </li>\n</ol>\n\n\n    <p>💡 Scheduler Reference</p>\n    <p><strong>none</strong> — No scheduling; ideal for NVMe/SSD (device handles its own queue).\n    <strong>mq-deadline</strong> — Deadline-based; good for HDDs and latency-sensitive workloads.\n    <strong>bfq</strong> — Budget Fair Queueing; best for interactive desktop workloads.\n    <strong>kyber</strong> — Token-based; good for fast storage with mixed workloads.</p>", "verification": "<p><code>cat /sys/block/sda/queue/scheduler</code> should show <code>[none]</code> for SSD devices after applying the rule.</p>", "solution": "<pre>$ cat /sys/block/sda/queue/scheduler\n[none] mq-deadline kyber bfq</pre>"}}, {"id": 13, "section": 0, "title": "Lab 13: Configuring Kernel Panic and Crash Behavior", "shortTitle": "Configuring Kernel Panic and Crash Behavior", "fields": {"objective": "<p>Configure how the system handles kernel panics and out-of-memory (OOM) conditions to ensure critical production servers recover automatically.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Critical production servers must automatically reboot after a kernel panic rather than hanging indefinitely. You also need to configure the OOM killer behavior to protect essential services.</p>", "procedure": "<ol>\n    <li>Create a kernel panic configuration file:\n        <pre>sudo vi /etc/sysctl.d/85-panic.conf</pre>\n        <pre># Automatically reboot 10 seconds after a kernel panic\nkernel.panic = 10\n\n# Treat oops as a panic for reliability\nkernel.panic_on_oops = 1\n\n# Do not panic on OOM; let the OOM killer handle it\nvm.panic_on_oom = 0\n\n# Kill the process that triggered OOM (not a random one)\nvm.oom_kill_allocating_task = 1</pre>\n    </li>\n    <li>Apply the settings:\n        <pre>sudo sysctl -p /etc/sysctl.d/85-panic.conf</pre>\n    </li>\n    <li>Adjust OOM score for a critical process (e.g., database) to make it less likely to be killed:\n        <pre># Find the PID of the critical process\npidof postgres\n\n# Set OOM score adjustment (-1000 = never kill, 1000 = kill first)\necho -500 | sudo tee /proc/$(pidof postgres)/oom_score_adj\n\n# Check the current OOM score\ncat /proc/$(pidof postgres)/oom_score</pre>\n    </li>\n    <li>To make OOM score adjustments persistent, add to the systemd service unit:\n        <pre>sudo systemctl edit postgresql\n# Add under [Service]:\n# OOMScoreAdjust=-500</pre>\n    </li>\n</ol>", "verification": "<pre>$ sysctl kernel.panic\nkernel.panic = 10\n\n$ sysctl kernel.panic_on_oops\nkernel.panic_on_oops = 1\n\n$ sysctl vm.panic_on_oom\nvm.panic_on_oom = 0</pre>", "solution": "<pre>$ sudo sysctl -p /etc/sysctl.d/85-panic.conf\nkernel.panic = 10\nkernel.panic_on_oops = 1\nvm.panic_on_oom = 0\nvm.oom_kill_allocating_task = 1</pre>"}}, {"id": 14, "section": 1, "title": "Lab 14: Listing and Identifying Running Processes", "shortTitle": "Listing and Identifying Running Processes", "fields": {"objective": "<p>Use <code>ps</code>, <code>pgrep</code>, and the <code>/proc</code> filesystem to identify, examine, and gather information about running processes.</p>", "prerequisites": "<ul>\n    <li>A running Linux system with multiple active processes</li>\n</ul>", "scenario": "<p>You need to identify all processes owned by a specific user, find what is consuming the most resources, and gather detailed information about a suspect process.</p>", "procedure": "<ol>\n    <li>List all processes in BSD-style format:\n        <pre>ps aux</pre>\n    </li>\n    <li>List all processes in full UNIX-style format:\n        <pre>ps -ef</pre>\n    </li>\n    <li>Custom output sorted by CPU usage (top consumers first):\n        <pre>ps -eo pid,ppid,user,%cpu,%mem,stat,cmd --sort=-%cpu | head -20</pre>\n    </li>\n    <li>Find processes owned by a specific user:\n        <pre>pgrep -u apache\nps -u apache -o pid,cmd</pre>\n    </li>\n    <li>Examine a process via the proc filesystem:\n        <pre># Replace PID with an actual process ID\ncat /proc/PID/status    # Detailed status info\ncat /proc/PID/cmdline   # Full command line (null-delimited)\nls -la /proc/PID/fd/    # Open file descriptors</pre>\n    </li>\n</ol>", "verification": "<p>You should be able to identify the top CPU and memory consumers, list all processes for a given user, and read detailed process information from <code>/proc</code>.</p>", "solution": "<pre>$ ps -eo pid,ppid,user,%cpu,%mem,stat,cmd --sort=-%cpu | head -5\n    PID    PPID USER     %CPU %MEM STAT CMD\n   1234    1200 mysql     8.5  12.3 Ssl  /usr/sbin/mysqld\n    567     555 root      2.1   0.5 Ss   /usr/sbin/sshd -D\n\n$ pgrep -u root | wc -l\n45</pre>"}}, {"id": 15, "section": 1, "title": "Lab 15: Managing Process Priorities with nice and renice", "shortTitle": "Managing Process Priorities with nice and renice", "fields": {"objective": "<p>Launch processes with custom priorities and modify the priority of running processes using <code>nice</code> and <code>renice</code>.</p>", "prerequisites": "<ul>\n    <li>Root access (required for setting negative nice values)</li>\n</ul>", "scenario": "<p>A backup script running during business hours is consuming too much CPU time and impacting application performance. You need to lower its scheduling priority.</p>", "procedure": "<ol>\n    <li>Start a CPU-intensive process with the lowest priority (nice value 19):\n        <pre>nice -n 19 tar czf /backup/data.tar.gz /data &</pre>\n    </li>\n    <li>Verify the nice value:\n        <pre>ps -eo pid,ni,cmd | grep tar</pre>\n    </li>\n    <li>Change the priority of an already-running process:\n        <pre>renice +10 -p $(pgrep -f \"tar czf\")</pre>\n    </li>\n    <li>View nice values for all processes:\n        <pre>ps -eo pid,ni,user,cmd --sort=-ni | head -20</pre>\n    </li>\n    <li>Start a high-priority process (only root can use negative values):\n        <pre>sudo nice -n -5 /opt/critical-app/run.sh &</pre>\n    </li>\n</ol>\n\n\n    <p>💡 Nice Value Reference</p>\n    <p>Nice values range from <strong>-20</strong> (highest priority) to <strong>19</strong> (lowest priority). Default is <strong>0</strong>. Only root can set negative nice values. Regular users can only increase (lower priority) their own processes.</p>", "verification": "<pre>$ ps -eo pid,ni,cmd | grep tar\n  5432  19 tar czf /backup/data.tar.gz /data</pre>", "solution": "<pre>$ nice -n 19 tar czf /backup/data.tar.gz /data &\n[1] 5432\n\n$ ps -eo pid,ni,cmd | grep tar\n  5432  19 tar czf /backup/data.tar.gz /data\n\n$ renice +10 -p 5432\n5432 (process ID) old priority 19, new priority 19  # Already at max</pre>"}}, {"id": 16, "section": 1, "title": "Lab 16: Sending Signals to Processes", "shortTitle": "Sending Signals to Processes", "fields": {"objective": "<p>Use <code>kill</code>, <code>killall</code>, and <code>pkill</code> to manage processes with various signals, understanding the difference between graceful and forceful termination.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>A web server process is unresponsive and must be terminated. You also need to reload a service configuration without restarting it and clean up all processes for a departing user.</p>", "procedure": "<ol>\n    <li>List common signals:\n        <pre>kill -l</pre>\n    </li>\n    <li>Send SIGTERM (signal 15) for graceful termination:\n        <pre>kill PID\nkill -15 PID</pre>\n    </li>\n    <li>Send SIGHUP (signal 1) to reload configuration:\n        <pre>kill -HUP $(pgrep -x httpd | head -1)</pre>\n    </li>\n    <li>Send SIGKILL (signal 9) as a last resort for unresponsive processes:\n        <pre>kill -9 PID</pre>\n    </li>\n    <li>Kill all processes by name:\n        <pre>sudo killall httpd</pre>\n    </li>\n    <li>Kill processes matching a pattern or by user:\n        <pre>pkill -f \"python script.py\"\nsudo pkill -u testuser</pre>\n    </li>\n</ol>\n\n\n    <p>⚠ Important</p>\n    <p><strong>SIGTERM (15)</strong>: Asks the process to terminate gracefully; the process can catch and handle this signal.\n    <strong>SIGHUP (1)</strong>: Traditionally means “hang up”; many daemons interpret this as “reload config.”\n    <strong>SIGKILL (9)</strong>: Immediately terminates the process; cannot be caught or ignored. Use only as a last resort since it prevents cleanup.</p>", "verification": "<p>After sending the appropriate signal, use <code>ps</code> or <code>pgrep</code> to confirm the process has terminated or reloaded.</p>", "solution": "<pre>$ kill -15 1234\n$ ps -p 1234\n(no output - process terminated)\n\n$ sudo pkill -u testuser\n$ pgrep -u testuser\n(no output - all user processes terminated)</pre>"}}, {"id": 17, "section": 1, "title": "Lab 17: Monitoring Processes in Real-Time with top", "shortTitle": "Monitoring Processes in Real-Time with top", "fields": {"objective": "<p>Use <code>top</code> and related tools to monitor system processes interactively, sort by resource usage, and take action on resource-hungry processes.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access for killing/renicing processes within <code>top</code></li>\n</ul>", "scenario": "<p>A server is running slowly and users are complaining. You need to identify which process is consuming the most resources and take immediate action.</p>", "procedure": "<ol>\n    <li>Launch <code>top</code> in interactive mode:\n        <pre>top</pre>\n    </li>\n    <li>While in <code>top</code>, use the following keyboard commands:\n        <ul>\n            <li><code>M</code> — Sort by memory usage</li>\n            <li><code>P</code> — Sort by CPU usage</li>\n            <li><code>1</code> — Toggle per-CPU statistics</li>\n            <li><code>k</code> — Kill a process (enter PID and signal)</li>\n            <li><code>r</code> — Renice a process (enter PID and new nice value)</li>\n            <li><code>q</code> — Quit</li>\n        </ul>\n    </li>\n    <li>Use <code>top</code> in batch mode for scripting:\n        <pre>top -bn1 -o %CPU | head -20</pre>\n    </li>\n    <li>Use <code>pidstat</code> for interval-based monitoring:\n        <pre>pidstat 1 5   # Report every 1 second, 5 times</pre>\n    </li>\n</ol>", "verification": "<p>Identify the top CPU or memory consumer from <code>top</code> output. The batch mode command should produce a snapshot of the top 20 processes sorted by CPU.</p>", "solution": "<pre>$ top -bn1 -o %CPU | head -12\ntop - 05:37:00 up 2 days,  3:45,  1 user,  load average: 0.85, 0.72, 0.68\nTasks: 182 total,   1 running, 181 sleeping,   0 stopped,   0 zombie\n%Cpu(s):  5.2 us,  1.3 sy,  0.0 ni, 93.0 id,  0.5 wa,  0.0 hi,  0.0 si\nMiB Mem :   7953.5 total,   2145.3 free,   3201.8 used,   2606.4 buff/cache\n    PID USER      PR  NI    VIRT    RES    SHR S  %CPU  %MEM COMMAND\n   1234 mysql     20   0 1856272 524288  12800 S   8.5  12.3 mysqld\n    567 root      20   0  112640   4096   3072 S   2.1   0.5 sshd</pre>"}}, {"id": 18, "section": 1, "title": "Lab 18: Managing Background and Foreground Jobs", "shortTitle": "Managing Background and Foreground Jobs", "fields": {"objective": "<p>Control job execution using <code>bg</code>, <code>fg</code>, <code>jobs</code>, <code>nohup</code>, and <code>disown</code> to manage long-running tasks.</p>", "prerequisites": "<ul>\n    <li>An active shell session</li>\n</ul>", "scenario": "<p>You start a long-running data transfer over the network and realize you need to continue working in the same terminal. You must move the job to the background and ensure it survives if you disconnect.</p>", "procedure": "<ol>\n    <li>Start a long-running command and suspend it:\n        <pre>find / -name \"*.log\" -size +10M > /tmp/large-logs.txt 2>/dev/null\n# Press Ctrl+Z to suspend\n[1]+  Stopped</pre>\n    </li>\n    <li>Resume the suspended job in the background:\n        <pre>bg %1</pre>\n    </li>\n    <li>List current jobs:\n        <pre>jobs\njobs -l   # Include PIDs</pre>\n    </li>\n    <li>Bring a background job back to the foreground:\n        <pre>fg %1</pre>\n    </li>\n    <li>Start a command in the background that survives logout:\n        <pre>nohup ./long-running-script.sh &\n# Output goes to nohup.out by default</pre>\n    </li>\n    <li>Detach an already-running background job so it survives logout:\n        <pre>disown %1</pre>\n    </li>\n</ol>", "verification": "<p><code>jobs</code> should show the job status. After <code>disown</code>, the job will no longer appear in <code>jobs</code> output but will continue running (verify with <code>ps</code>).</p>", "solution": "<pre>$ sleep 600 &\n[1] 7890\n\n$ jobs\n[1]+  Running                 sleep 600 &\n\n$ disown %1\n$ jobs\n(no output)\n\n$ ps -p 7890\n  PID TTY      STAT   TIME COMMAND\n 7890 pts/0    S      0:00 sleep 600</pre>"}}, {"id": 19, "section": 1, "title": "Lab 19: Creating a Custom systemd Service Unit", "shortTitle": "Creating a Custom systemd Service Unit", "fields": {"objective": "<p>Write a systemd service unit file from scratch to manage a custom application as a system service.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>A simple application or script to manage (we will create one)</li>\n</ul>", "scenario": "<p>Deploy a Python web application as a managed systemd service with automatic restart on failure and proper dependency ordering.</p>", "procedure": "<ol>\n    <li>Create a simple test application:\n        <pre>sudo mkdir -p /opt/myapp\nsudo useradd -r -s /sbin/nologin myapp\n\ncat <<'EOF' | sudo tee /opt/myapp/app.py\n#!/usr/bin/env python3\nimport http.server, socketserver\nPORT = 8080\nHandler = http.server.SimpleHTTPRequestHandler\nwith socketserver.TCPServer((\"\", PORT), Handler) as httpd:\n    print(f\"Serving on port {PORT}\")\n    httpd.serve_forever()\nEOF\nsudo chmod +x /opt/myapp/app.py</pre>\n    </li>\n    <li>Create the systemd unit file:\n        <pre>sudo vi /etc/systemd/system/myapp.service</pre>\n        <pre>[Unit]\nDescription=My Custom Python Application\nAfter=network.target\nWants=network.target\n\n[Service]\nType=simple\nUser=myapp\nGroup=myapp\nWorkingDirectory=/opt/myapp\nExecStart=/usr/bin/python3 /opt/myapp/app.py\nRestart=on-failure\nRestartSec=5\nStandardOutput=journal\nStandardError=journal\n\n[Install]\nWantedBy=multi-user.target</pre>\n    </li>\n    <li>Reload systemd, start, and enable the service:\n        <pre>sudo systemctl daemon-reload\nsudo systemctl start myapp\nsudo systemctl enable myapp\nsudo systemctl status myapp</pre>\n    </li>\n</ol>", "verification": "<pre>$ sudo systemctl status myapp\n● myapp.service - My Custom Python Application\n     Loaded: loaded (/etc/systemd/system/myapp.service; enabled)\n     Active: active (running)\n   Main PID: 2345 (python3)\n\n$ curl http://localhost:8080\n(HTML response from the server)</pre>", "solution": "<p>The service should show <code>active (running)</code>. If it fails, check <code>journalctl -u myapp -e</code> for errors.</p>"}}, {"id": 20, "section": 1, "title": "Lab 20: Enabling and Disabling Services at Boot", "shortTitle": "Enabling and Disabling Services at Boot", "fields": {"objective": "<p>Control which services start automatically at boot by enabling, disabling, and auditing systemd service configurations.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Harden a newly deployed server by disabling unnecessary services that increase the attack surface and consume resources.</p>", "procedure": "<ol>\n    <li>List all service unit files and their boot state:\n        <pre>systemctl list-unit-files --type=service</pre>\n    </li>\n    <li>Filter for enabled services:\n        <pre>systemctl list-unit-files --type=service --state=enabled</pre>\n    </li>\n    <li>Disable and stop unnecessary services:\n        <pre>sudo systemctl disable --now cups.service\nsudo systemctl disable --now avahi-daemon.service\nsudo systemctl disable --now bluetooth.service</pre>\n    </li>\n    <li>Verify a specific service’s boot state:\n        <pre>systemctl is-enabled sshd\nsystemctl is-enabled cups</pre>\n    </li>\n    <li>Enable a required service:\n        <pre>sudo systemctl enable --now firewalld</pre>\n    </li>\n</ol>", "verification": "<pre>$ systemctl is-enabled cups\ndisabled\n\n$ systemctl is-enabled sshd\nenabled\n\n$ systemctl is-active cups\ninactive</pre>", "solution": "<p>Disabled services should show <code>disabled</code> for <code>is-enabled</code> and <code>inactive</code> for <code>is-active</code>.</p>"}}, {"id": 21, "section": 1, "title": "Lab 21: Troubleshooting a Failing systemd Service", "shortTitle": "Troubleshooting a Failing systemd Service", "fields": {"objective": "<p>Diagnose and fix a systemd service that fails to start using <code>systemctl status</code>, <code>journalctl</code>, and <code>systemd-analyze verify</code>.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>The myapp service from Lab 19 (or willingness to create a test service)</li>\n</ul>", "scenario": "<p>A critical application service fails to start after a configuration change. You must diagnose the root cause and fix it.</p>", "procedure": "<ol>\n    <li>Create an intentionally broken service (wrong ExecStart path):\n        <pre>sudo vi /etc/systemd/system/broken.service</pre>\n        <pre>[Unit]\nDescription=Intentionally Broken Service\n\n[Service]\nType=simple\nExecStart=/usr/bin/nonexistent-program --run\n\n[Install]\nWantedBy=multi-user.target</pre>\n    </li>\n    <li>Attempt to start the service:\n        <pre>sudo systemctl daemon-reload\nsudo systemctl start broken</pre>\n    </li>\n    <li>Check the status:\n        <pre>systemctl status broken</pre>\n    </li>\n    <li>Check the journal for detailed error messages:\n        <pre>journalctl -u broken -e</pre>\n    </li>\n    <li>Query specific properties:\n        <pre>systemctl show broken --property=ActiveState,SubState,Result</pre>\n    </li>\n    <li>Validate unit file syntax:\n        <pre>systemd-analyze verify /etc/systemd/system/broken.service</pre>\n    </li>\n    <li>Fix the ExecStart path and restart:\n        <pre># Edit the unit file with the correct path\nsudo systemctl daemon-reload\nsudo systemctl start broken</pre>\n    </li>\n</ol>", "verification": "<pre>$ systemctl show broken --property=ActiveState,SubState,Result\nActiveState=failed\nSubState=failed\nResult=exit-code</pre>", "solution": "<p>The journal will show an error such as <code>broken.service: Failed at step EXEC</code>. Fix the <code>ExecStart</code> path, run <code>daemon-reload</code>, and restart the service.</p>"}}, {"id": 22, "section": 1, "title": "Lab 22: Analyzing systemd Journal Logs with journalctl", "shortTitle": "Analyzing systemd Journal Logs with journalctl", "fields": {"objective": "<p>Query, filter, and manage the systemd journal to investigate service issues, system events, and time-bounded log analysis.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>A service crashed during the night between 2:00 AM and 4:00 AM. You need to investigate the journal logs for that time window and configure persistent logging for future analysis.</p>", "procedure": "<ol>\n    <li>Query logs for a specific service and time range:\n        <pre>journalctl -u sshd --since \"2026-04-28 02:00\" --until \"2026-04-28 04:00\"</pre>\n    </li>\n    <li>View only errors since the last boot:\n        <pre>journalctl -p err -b</pre>\n    </li>\n    <li>View logs from the previous boot:\n        <pre>journalctl -b -1</pre>\n    </li>\n    <li>Check journal disk usage:\n        <pre>journalctl --disk-usage</pre>\n    </li>\n    <li>Configure persistent journal storage:\n        <pre>sudo mkdir -p /var/log/journal\nsudo vi /etc/systemd/journald.conf</pre>\n        <pre># Set under [Journal]:\nStorage=persistent\nSystemMaxUse=500M\nSystemKeepFree=1G</pre>\n    </li>\n    <li>Restart journald to apply:\n        <pre>sudo systemctl restart systemd-journald</pre>\n    </li>\n</ol>", "verification": "<pre>$ journalctl --disk-usage\nArchived and active journals take up 248.0M in the file system.\n\n$ ls /var/log/journal/\n(machine-id directory should exist)</pre>", "solution": "<p>Journal logs should now be stored persistently in <code>/var/log/journal/</code> and capped at 500 MB.</p>"}}, {"id": 23, "section": 1, "title": "Lab 23: Managing systemd Targets (Runlevels)", "shortTitle": "Managing systemd Targets (Runlevels)", "fields": {"objective": "<p>Switch between systemd targets and set the default boot target. Understand the relationship between traditional runlevels and systemd targets.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>A graphical server should boot to the command-line interface to conserve resources, since administrative work is done via SSH.</p>", "procedure": "<ol>\n    <li>List available targets:\n        <pre>systemctl list-units --type=target</pre>\n    </li>\n    <li>Check the current default boot target:\n        <pre>systemctl get-default</pre>\n    </li>\n    <li>Change the default to multi-user (CLI only):\n        <pre>sudo systemctl set-default multi-user.target</pre>\n    </li>\n    <li>Switch to multi-user target without rebooting:\n        <pre>sudo systemctl isolate multi-user.target</pre>\n    </li>\n    <li>Switch back to graphical if needed:\n        <pre>sudo systemctl isolate graphical.target</pre>\n    </li>\n</ol>\n\n\n    <p>💡 Target ↔ Runlevel Equivalents</p>\n    <p><strong>poweroff.target</strong> = Runlevel 0 (Halt)\n    <strong>rescue.target</strong> = Runlevel 1 (Single-user)\n    <strong>multi-user.target</strong> = Runlevel 3 (Multi-user, CLI)\n    <strong>graphical.target</strong> = Runlevel 5 (Multi-user, GUI)\n    <strong>reboot.target</strong> = Runlevel 6 (Reboot)</p>", "verification": "<pre>$ systemctl get-default\nmulti-user.target</pre>", "solution": "<pre>$ sudo systemctl set-default multi-user.target\nRemoved /etc/systemd/system/default.target.\nCreated symlink /etc/systemd/system/default.target\n  → /usr/lib/systemd/system/multi-user.target.</pre>"}}, {"id": 24, "section": 1, "title": "Lab 24: Creating a systemd Timer Unit", "shortTitle": "Creating a systemd Timer Unit", "fields": {"objective": "<p>Create a systemd timer as a modern, feature-rich alternative to cron for scheduling recurring tasks.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>A cleanup script must run 5 minutes after every boot and then repeat every 6 hours to purge temporary files.</p>", "procedure": "<ol>\n    <li>Create the service unit (the task to run):\n        <pre>sudo vi /etc/systemd/system/cleanup.service</pre>\n        <pre>[Unit]\nDescription=Cleanup old temporary files\n\n[Service]\nType=oneshot\nExecStart=/usr/bin/find /tmp -type f -mtime +7 -delete</pre>\n    </li>\n    <li>Create the timer unit:\n        <pre>sudo vi /etc/systemd/system/cleanup.timer</pre>\n        <pre>[Unit]\nDescription=Run cleanup every 6 hours and at boot\n\n[Timer]\nOnBootSec=5min\nOnUnitActiveSec=6h\n\n[Install]\nWantedBy=timers.target</pre>\n    </li>\n    <li>Enable and start the timer:\n        <pre>sudo systemctl daemon-reload\nsudo systemctl enable --now cleanup.timer</pre>\n    </li>\n    <li>Verify the timer is active:\n        <pre>systemctl list-timers --all | grep cleanup</pre>\n    </li>\n</ol>", "verification": "<pre>$ systemctl list-timers | grep cleanup\nWed 2026-04-29 11:37:00 EDT  5h left  Wed 2026-04-29 05:42:00 EDT  ...  cleanup.timer  cleanup.service</pre>", "solution": "<p>The timer should show in <code>systemctl list-timers</code> with the next and last trigger times.</p>"}}, {"id": 25, "section": 1, "title": "Lab 25: Monitoring Resource Usage per Process with pidstat", "shortTitle": "Monitoring Resource Usage per Process with pidstat", "fields": {"objective": "<p>Track CPU, memory, and I/O usage for specific processes over time using <code>pidstat</code> from the sysstat package.</p>", "prerequisites": "<ul>\n    <li>Install sysstat: <code>sudo dnf install sysstat</code> or <code>sudo apt install sysstat</code></li>\n</ul>", "scenario": "<p>A suspect process periodically spikes CPU usage. You need to profile it over time to capture the spike pattern and identify the cause.</p>", "procedure": "<ol>\n    <li>Monitor CPU usage for all processes every 2 seconds, 10 reports:\n        <pre>pidstat -u 2 10</pre>\n    </li>\n    <li>Monitor memory usage:\n        <pre>pidstat -r 2 5</pre>\n    </li>\n    <li>Monitor disk I/O per process:\n        <pre>pidstat -d 2 5</pre>\n    </li>\n    <li>Monitor a specific process for all metrics:\n        <pre>pidstat -p PID -u -r -d 1 30</pre>\n    </li>\n</ol>", "verification": "<p>Output should show per-process CPU, memory, and I/O statistics at each interval, allowing you to observe patterns and spikes.</p>", "solution": "<pre>$ pidstat -u 2 3\nLinux 5.14.0-362.el9.x86_64    04/29/2026\n05:37:00 AM   UID       PID    %usr %system  %guest   %wait    %CPU  Command\n05:37:02 AM     0      1234   15.00    2.50    0.00    0.00   17.50  mysqld\n05:37:02 AM     0      5678    3.00    1.00    0.00    0.00    4.00  httpd</pre>"}}, {"id": 26, "section": 1, "title": "Lab 26: Masking and Unmasking systemd Services", "shortTitle": "Masking and Unmasking systemd Services", "fields": {"objective": "<p>Use <code>systemctl mask</code> to completely prevent a service from starting, even if another service or administrator tries to start it manually.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>On a server managed by <code>firewalld</code>, you must ensure the legacy <code>iptables</code> service can never accidentally start, as it would conflict with <code>firewalld</code>.</p>", "procedure": "<ol>\n    <li>Mask the service:\n        <pre>sudo systemctl mask iptables</pre>\n    </li>\n    <li>Verify the mask (it creates a symlink to /dev/null):\n        <pre>systemctl status iptables\nls -la /etc/systemd/system/iptables.service</pre>\n    </li>\n    <li>Attempt to start the masked service (should fail):\n        <pre>sudo systemctl start iptables</pre>\n    </li>\n    <li>Unmask the service when needed:\n        <pre>sudo systemctl unmask iptables</pre>\n    </li>\n</ol>\n\n\n    <p>💡 Disable vs. Mask</p>\n    <p><strong>disable</strong>: Removes the symlink from <code>multi-user.target.wants/</code> so the service does not auto-start at boot, but it can still be started manually.\n    <strong>mask</strong>: Creates a symlink to <code>/dev/null</code>, making it impossible to start the service by any means until unmasked.</p>", "verification": "<pre>$ sudo systemctl start iptables\nFailed to start iptables.service: Unit iptables.service is masked.</pre>", "solution": "<pre>$ sudo systemctl mask iptables\nCreated symlink /etc/systemd/system/iptables.service → /dev/null.\n\n$ sudo systemctl unmask iptables\nRemoved /etc/systemd/system/iptables.service.</pre>"}}, {"id": 27, "section": 1, "title": "Lab 27: Configuring systemd Service Dependencies", "shortTitle": "Configuring systemd Service Dependencies", "fields": {"objective": "<p>Define ordering and dependency relationships between systemd services using <code>After</code>, <code>Requires</code>, <code>Wants</code>, and <code>Before</code> directives.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>The myapp service from Lab 19</li>\n</ul>", "scenario": "<p>Your application service depends on a database. You need to ensure the database starts before the application and that the application fails if the database is unavailable.</p>", "procedure": "<ol>\n    <li>Edit the application service to add dependencies:\n        <pre>sudo systemctl edit myapp --force</pre>\n        <pre>[Unit]\nAfter=postgresql.service\nRequires=postgresql.service</pre>\n    </li>\n    <li>View the full dependency tree:\n        <pre>systemctl list-dependencies myapp.service</pre>\n    </li>\n    <li>Understand the dependency directives:\n        <ul>\n            <li><strong>After=</strong>: Ordering only — start after the named unit</li>\n            <li><strong>Wants=</strong>: Soft dependency — try to start the other unit, but don’t fail if it can’t</li>\n            <li><strong>Requires=</strong>: Hard dependency — if the other unit fails, this unit also fails</li>\n            <li><strong>BindsTo=</strong>: Strongest — if the other unit stops at any time, this unit also stops</li>\n        </ul>\n    </li>\n    <li>Reload and verify:\n        <pre>sudo systemctl daemon-reload\nsystemctl show myapp --property=After,Requires</pre>\n    </li>\n</ol>", "verification": "<pre>$ systemctl show myapp --property=After\nAfter=network.target postgresql.service basic.target system.slice ...\n\n$ systemctl show myapp --property=Requires\nRequires=postgresql.service sysinit.target system.slice</pre>", "solution": "<p>If <code>postgresql.service</code> is not running and you attempt to start <code>myapp</code>, systemd will attempt to start PostgreSQL first (due to <code>Requires=</code>) and order myapp to start after it (due to <code>After=</code>).</p>"}}, {"id": 28, "section": 1, "title": "Lab 28: Managing Process Resource Limits with ulimit and systemd", "shortTitle": "Managing Process Resource Limits with ulimit and systemd", "fields": {"objective": "<p>Configure per-process and per-service resource limits using <code>ulimit</code>, PAM limits configuration, and systemd <code>LimitNOFILE</code>.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>A Java application needs more than the default 1024 open file handles. You must increase this limit for both the user running the application and the systemd service.</p>", "procedure": "<ol>\n    <li>Check current limits:\n        <pre>ulimit -a\nulimit -n   # Open file descriptors only</pre>\n    </li>\n    <li>Set temporarily for the current session:\n        <pre>ulimit -n 65535</pre>\n    </li>\n    <li>Configure permanently via PAM limits:\n        <pre>sudo vi /etc/security/limits.d/99-custom.conf</pre>\n        <pre>myappuser  soft  nofile  65535\nmyappuser  hard  nofile  65535\nmyappuser  soft  nproc   4096\nmyappuser  hard  nproc   4096</pre>\n    </li>\n    <li>For systemd-managed services, add to the unit file:\n        <pre>sudo systemctl edit myapp</pre>\n        <pre>[Service]\nLimitNOFILE=65535\nLimitNPROC=4096</pre>\n    </li>\n    <li>Reload and restart:\n        <pre>sudo systemctl daemon-reload\nsudo systemctl restart myapp</pre>\n    </li>\n    <li>Verify the limits on a running process:\n        <pre>cat /proc/$(pgrep -x python3)/limits | grep \"open files\"</pre>\n    </li>\n</ol>", "verification": "<pre>$ cat /proc/$(pgrep -x python3)/limits | grep \"open files\"\nMax open files            65535                65535                files</pre>", "solution": "<p>The process limits should show 65535 for both soft and hard open file limits.</p>"}}, {"id": 29, "section": 2, "title": "Lab 29: Creating Basic Cron Jobs with crontab", "shortTitle": "Creating Basic Cron Jobs with crontab", "fields": {"objective": "<p>Schedule recurring tasks using user-level crontabs, understanding the five-field cron expression syntax.</p>", "prerequisites": "<ul>\n    <li>The <code>cronie</code> package (RHEL) or <code>cron</code> package (Ubuntu)</li>\n</ul>", "scenario": "<p>Automate daily log compression at 2:30 AM to manage disk space on an application server.</p>", "procedure": "<ol>\n    <li>Edit the current user’s crontab:\n        <pre>crontab -e</pre>\n    </li>\n    <li>Add a cron job to compress old logs:\n        <pre>30 2 * * * /usr/bin/find /var/log -name \"*.log\" -mtime +7 -exec gzip {} \\;</pre>\n    </li>\n    <li>Understand the five fields:\n        <pre># ┌───────────── minute (0-59)\n# │ ┌───────────── hour (0-23)\n# │ │ ┌───────────── day of month (1-31)\n# │ │ │ ┌───────────── month (1-12)\n# │ │ │ │ ┌───────────── day of week (0-7, 0 and 7 = Sunday)\n# │ │ │ │ │\n# * * * * * command</pre>\n    </li>\n    <li>List current cron jobs:\n        <pre>crontab -l</pre>\n    </li>\n    <li>Remove all cron jobs (use with caution):\n        <pre>crontab -r</pre>\n    </li>\n</ol>", "verification": "<pre>$ crontab -l\n30 2 * * * /usr/bin/find /var/log -name \"*.log\" -mtime +7 -exec gzip {} \\;</pre>", "solution": "<p>The cron daemon will execute the command at 2:30 AM every day. Check <code>/var/log/cron</code> (RHEL) or <code>/var/log/syslog</code> (Ubuntu) to verify execution.</p>"}}, {"id": 30, "section": 2, "title": "Lab 30: System-Wide Cron Jobs in /etc/crontab and /etc/cron.d/", "shortTitle": "System-Wide Cron Jobs in /etc/crontab and /etc/cron.d/", "fields": {"objective": "<p>Configure system-level cron jobs using configuration files that include a user specification field.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Set up a system-wide database backup cron job that runs as the <code>postgres</code> user at 1:00 AM daily.</p>", "procedure": "<ol>\n    <li>Create a drop-in cron file:\n        <pre>sudo vi /etc/cron.d/db-backup</pre>\n        <pre># Database backup - runs daily at 1:00 AM as postgres user\nSHELL=/bin/bash\nPATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin\n0 1 * * * postgres /opt/scripts/pg_backup.sh >> /var/log/pg_backup.log 2>&1</pre>\n    </li>\n    <li>Examine the system crontab:\n        <pre>cat /etc/crontab</pre>\n    </li>\n    <li>Explore the periodic directories:\n        <pre>ls /etc/cron.daily/\nls /etc/cron.hourly/\nls /etc/cron.weekly/\nls /etc/cron.monthly/</pre>\n        <p>Scripts placed in these directories run at the corresponding intervals via anacron or cronie.</p>\n    </li>\n</ol>", "verification": "<pre>$ cat /etc/cron.d/db-backup\n0 1 * * * postgres /opt/scripts/pg_backup.sh >> /var/log/pg_backup.log 2>&1</pre>", "solution": "<p>The key difference from user crontabs is the <strong>extra user field</strong> (sixth field) specifying which user runs the command.</p>"}}, {"id": 31, "section": 2, "title": "Lab 31: Scheduling Complex Cron Patterns", "shortTitle": "Scheduling Complex Cron Patterns", "fields": {"objective": "<p>Write advanced cron expressions using ranges, lists, step values, and special strings.</p>", "prerequisites": "<ul>\n    <li>Understanding of basic cron syntax from Lab 29</li>\n</ul>", "scenario": "<p>Create cron jobs with various complex schedules to meet different business requirements.</p>", "procedure": "<ol>\n    <li>Every 15 minutes:\n        <pre>*/15 * * * * /opt/scripts/check-health.sh</pre>\n    </li>\n    <li>Weekdays at 9:00 AM:\n        <pre>0 9 * * 1-5 /opt/scripts/morning-report.sh</pre>\n    </li>\n    <li>First day of each quarter:\n        <pre>0 0 1 1,4,7,10 * /opt/scripts/quarterly-report.sh</pre>\n    </li>\n    <li>Every other hour:\n        <pre>0 */2 * * * /opt/scripts/sync-data.sh</pre>\n    </li>\n    <li>Monday, Wednesday, Friday at 6:30 PM:\n        <pre>30 18 * * 1,3,5 /opt/scripts/mwf-task.sh</pre>\n    </li>\n    <li>Use special strings:\n        <pre>@reboot /opt/scripts/startup.sh\n@hourly /opt/scripts/hourly-check.sh\n@daily /opt/scripts/daily-clean.sh\n@weekly /opt/scripts/weekly-report.sh</pre>\n    </li>\n</ol>", "verification": "<p>Add each expression to a crontab and verify with <code>crontab -l</code>. The cron daemon will validate syntax on save.</p>", "solution": "<pre>$ crontab -l\n*/15 * * * * /opt/scripts/check-health.sh\n0 9 * * 1-5 /opt/scripts/morning-report.sh\n0 0 1 1,4,7,10 * /opt/scripts/quarterly-report.sh\n0 */2 * * * /opt/scripts/sync-data.sh\n30 18 * * 1,3,5 /opt/scripts/mwf-task.sh</pre>"}}, {"id": 32, "section": 2, "title": "Lab 32: Scheduling One-Time Jobs with at", "shortTitle": "Scheduling One-Time Jobs with at", "fields": {"objective": "<p>Use the <code>at</code> command to schedule tasks that run once at a specified time in the future.</p>", "prerequisites": "<ul>\n    <li>Install the <code>at</code> package: <code>sudo dnf install at</code> or <code>sudo apt install at</code></li>\n    <li>Start and enable the <code>atd</code> service</li>\n</ul>", "scenario": "<p>Schedule a server maintenance script to run at midnight tonight, and a follow-up report for 10:00 AM tomorrow.</p>", "procedure": "<ol>\n    <li>Start the at daemon:\n        <pre>sudo systemctl enable --now atd</pre>\n    </li>\n    <li>Schedule a job for midnight:\n        <pre>echo \"/opt/scripts/maintenance.sh\" | at midnight</pre>\n    </li>\n    <li>Schedule a job relative to now:\n        <pre>echo \"/opt/scripts/report.sh\" | at now + 2 hours</pre>\n    </li>\n    <li>Schedule for a specific date and time:\n        <pre>echo \"/opt/scripts/migrate.sh\" | at 10:00 AM tomorrow\necho \"/opt/scripts/release.sh\" | at 4:00 PM Apr 30</pre>\n    </li>\n    <li>List queued jobs:\n        <pre>atq</pre>\n    </li>\n    <li>View a specific job’s commands:\n        <pre>at -c JOB_NUMBER</pre>\n    </li>\n    <li>Remove a queued job:\n        <pre>atrm JOB_NUMBER</pre>\n    </li>\n</ol>", "verification": "<pre>$ atq\n5    Wed Apr 30 00:00:00 2026 a root\n6    Wed Apr 29 07:37:00 2026 a root\n\n$ atrm 6\n$ atq\n5    Wed Apr 30 00:00:00 2026 a root</pre>", "solution": "<p>The <code>atq</code> output shows job number, scheduled time, queue letter, and user.</p>"}}, {"id": 33, "section": 2, "title": "Lab 33: Managing at Job Queues and Batch Jobs", "shortTitle": "Managing at Job Queues and Batch Jobs", "fields": {"objective": "<p>Work with <code>at</code> job queues and use <code>batch</code> for load-dependent execution.</p>", "prerequisites": "<ul>\n    <li>The <code>at</code> package and atd service running</li>\n</ul>", "scenario": "<p>Schedule resource-intensive reports to run only when the system load is low, preventing them from impacting user-facing services.</p>", "procedure": "<ol>\n    <li>Use <code>batch</code> to run commands when load average drops below 1.5:\n        <pre>echo \"/opt/scripts/heavy-report.sh\" | batch</pre>\n    </li>\n    <li>Schedule multiple at jobs:\n        <pre>echo \"/opt/scripts/job1.sh\" | at now + 1 hour\necho \"/opt/scripts/job2.sh\" | at now + 2 hours\necho \"/opt/scripts/job3.sh\" | at now + 3 hours</pre>\n    </li>\n    <li>Configure access control with allow/deny files:\n        <pre># Only listed users can use at\nsudo vi /etc/at.allow\n# Add usernames, one per line:\nroot\nadmin\n\n# If at.allow does not exist, at.deny is checked\n# An empty at.deny allows all users\nsudo vi /etc/at.deny</pre>\n    </li>\n</ol>", "verification": "<pre>$ atq\n7    Wed Apr 29 06:37:00 2026 b root   # 'b' = batch queue\n8    Wed Apr 29 06:37:00 2026 a root   # 'a' = normal at queue</pre>", "solution": "<p>Batch jobs show queue <code>b</code> in the <code>atq</code> output. They execute only when the system load drops below the threshold (default 1.5).</p>"}}, {"id": 34, "section": 2, "title": "Lab 34: Using anacron for Periodic Tasks on Non-24/7 Systems", "shortTitle": "Using anacron for Periodic Tasks on Non-24/7 Systems", "fields": {"objective": "<p>Configure <code>anacron</code> for tasks that must run periodically on systems that are not always powered on.</p>", "prerequisites": "<ul>\n    <li>The <code>cronie-anacron</code> package (RHEL) or <code>anacron</code> (Ubuntu)</li>\n</ul>", "scenario": "<p>A developer workstation needs daily backups, but the machine is only powered on during business hours. Use anacron to ensure the backup runs even if the scheduled time was missed.</p>", "procedure": "<ol>\n    <li>Examine the current anacrontab:\n        <pre>cat /etc/anacrontab</pre>\n    </li>\n    <li>Understand the format: <code>period  delay  identifier  command</code>\n        <ul>\n            <li><strong>period</strong>: Days between runs (1=daily, 7=weekly, 30=monthly)</li>\n            <li><strong>delay</strong>: Minutes to wait after anacron starts before running</li>\n            <li><strong>identifier</strong>: Unique name for timestamp tracking</li>\n            <li><strong>command</strong>: The command to execute</li>\n        </ul>\n    </li>\n    <li>Add a daily backup entry:\n        <pre>sudo vi /etc/anacrontab</pre>\n        <pre>1   15   daily-backup   /opt/scripts/backup.sh</pre>\n    </li>\n    <li>Check when jobs last ran:\n        <pre>ls -la /var/spool/anacron/\ncat /var/spool/anacron/daily-backup</pre>\n    </li>\n    <li>Force anacron to run all pending jobs:\n        <pre>sudo anacron -f</pre>\n    </li>\n</ol>", "verification": "<pre>$ cat /var/spool/anacron/daily-backup\n20260429</pre>", "solution": "<p>Anacron stores the date of last execution in <code>/var/spool/anacron/</code>. If the system was off when the job was due, anacron runs it at the next boot (after the specified delay).</p>"}}, {"id": 35, "section": 2, "title": "Lab 35: Controlling Cron and at Access", "shortTitle": "Controlling Cron and at Access", "fields": {"objective": "<p>Restrict which users can create cron and at jobs using allow/deny files.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n    <li>A test user account</li>\n</ul>", "scenario": "<p>Only system administrators should be allowed to schedule jobs. Regular users should be prevented from creating cron or at jobs.</p>", "procedure": "<ol>\n    <li>Create the cron.allow file (only listed users can use cron):\n        <pre>sudo vi /etc/cron.allow</pre>\n        <pre>root\nadmin</pre>\n    </li>\n    <li>Create the at.allow file:\n        <pre>sudo vi /etc/at.allow</pre>\n        <pre>root\nadmin</pre>\n    </li>\n    <li>Test as a restricted user:\n        <pre>su - testuser\ncrontab -e\n# Expected: \"You (testuser) are not allowed to use this program (crontab)\"</pre>\n    </li>\n    <li>Understand the precedence rules:\n        <ul>\n            <li>If <code>cron.allow</code> exists, only users listed in it can use cron</li>\n            <li>If <code>cron.allow</code> does not exist but <code>cron.deny</code> exists, everyone except listed users can use cron</li>\n            <li>If neither exists, only root can use cron (on most distributions)</li>\n        </ul>\n    </li>\n</ol>", "verification": "<pre>$ su - testuser -c \"crontab -l\"\nYou (testuser) are not allowed to use this program (crontab)\nSee crontab(1) for more information</pre>", "solution": "<p>Creating <code>/etc/cron.allow</code> automatically restricts access to only listed users, regardless of <code>/etc/cron.deny</code> contents.</p>"}}, {"id": 36, "section": 2, "title": "Lab 36: Creating Systemd Calendar Timers", "shortTitle": "Creating Systemd Calendar Timers", "fields": {"objective": "<p>Create systemd timers with <code>OnCalendar</code> expressions for cron-like scheduling with better logging and management.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Replace existing cron jobs with systemd timers for better integration with the journal, dependency management, and real-time monitoring.</p>", "procedure": "<ol>\n    <li>Create a timer for daily at 3:00 AM:\n        <pre>sudo vi /etc/systemd/system/daily-backup.timer</pre>\n        <pre>[Unit]\nDescription=Daily backup timer\n\n[Timer]\nOnCalendar=*-*-* 03:00:00\nPersistent=true\n\n[Install]\nWantedBy=timers.target</pre>\n    </li>\n    <li>Create a timer for weekdays at 9:00 AM:\n        <pre>[Timer]\nOnCalendar=Mon..Fri *-*-* 09:00:00</pre>\n    </li>\n    <li>Validate calendar expressions:\n        <pre>systemd-analyze calendar \"*-*-* 03:00:00\"\nsystemd-analyze calendar \"Mon..Fri *-*-* 09:00:00\"\nsystemd-analyze calendar \"monthly\"</pre>\n    </li>\n    <li>Enable and start the timer:\n        <pre>sudo systemctl daemon-reload\nsudo systemctl enable --now daily-backup.timer</pre>\n    </li>\n</ol>", "verification": "<pre>$ systemd-analyze calendar \"Mon..Fri *-*-* 09:00:00\"\n  Original form: Mon..Fri *-*-* 09:00:00\nNormalized form: Mon..Fri *-*-* 09:00:00\n    Next elapse: Thu 2026-04-30 09:00:00 EDT\n       (in UTC): Thu 2026-04-30 13:00:00 UTC\n       From now: 27h left</pre>", "solution": "<p>The <code>Persistent=true</code> option ensures that if the system was off when the timer was due, it runs the task immediately on next boot.</p>"}}, {"id": 37, "section": 2, "title": "Lab 37: Creating Monotonic systemd Timers", "shortTitle": "Creating Monotonic systemd Timers", "fields": {"objective": "<p>Create timers that trigger relative to system events (boot, activation) rather than at fixed calendar times.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Run a health check 5 minutes after boot and every 30 minutes thereafter to monitor application availability.</p>", "procedure": "<ol>\n    <li>Create the timer unit:\n        <pre>sudo vi /etc/systemd/system/healthcheck.timer</pre>\n        <pre>[Unit]\nDescription=Periodic health check\n\n[Timer]\nOnBootSec=5min\nOnUnitActiveSec=30min\nPersistent=true\n\n[Install]\nWantedBy=timers.target</pre>\n    </li>\n    <li>Create the corresponding service:\n        <pre>sudo vi /etc/systemd/system/healthcheck.service</pre>\n        <pre>[Unit]\nDescription=Application health check\n\n[Service]\nType=oneshot\nExecStart=/opt/scripts/healthcheck.sh</pre>\n    </li>\n    <li>Enable and verify:\n        <pre>sudo systemctl daemon-reload\nsudo systemctl enable --now healthcheck.timer\nsystemctl list-timers --all | grep healthcheck</pre>\n    </li>\n</ol>", "verification": "<pre>$ systemctl list-timers | grep healthcheck\nWed 2026-04-29 06:07:00 EDT  30min left  Wed 2026-04-29 05:42:00 ...  healthcheck.timer</pre>", "solution": "<p>Monotonic timers use <code>OnBootSec</code> and <code>OnUnitActiveSec</code> for relative timing. Calendar timers use <code>OnCalendar</code> for absolute timing.</p>"}}, {"id": 38, "section": 2, "title": "Lab 38: Redirecting and Logging Scheduled Job Output", "shortTitle": "Redirecting and Logging Scheduled Job Output", "fields": {"objective": "<p>Properly handle output from cron jobs and systemd timers to ensure logging, prevent email floods, and integrate with syslog.</p>", "prerequisites": "<ul>\n    <li>Active cron jobs or systemd timers</li>\n</ul>", "scenario": "<p>Cron jobs are sending too many emails to root; redirect output to log files and configure logrotate for those files.</p>", "procedure": "<ol>\n    <li>Redirect cron output to a log file:\n        <pre>0 2 * * * /opt/scripts/backup.sh >> /var/log/backup-cron.log 2>&1</pre>\n    </li>\n    <li>Suppress all email from a cron job by setting MAILTO:\n        <pre>MAILTO=\"\"\n0 2 * * * /opt/scripts/backup.sh >> /var/log/backup-cron.log 2>&1</pre>\n    </li>\n    <li>For systemd timers, output goes to the journal automatically:\n        <pre>journalctl -u backup.service</pre>\n    </li>\n    <li>Use <code>logger</code> in scripts for syslog integration:\n        <pre>#!/bin/bash\nlogger -t backup \"Starting backup job\"\n/opt/scripts/backup.sh\nif [ $? -eq 0 ]; then\n    logger -t backup \"Backup completed successfully\"\nelse\n    logger -t backup -p user.err \"Backup FAILED\"\nfi</pre>\n    </li>\n    <li>Configure logrotate for cron job logs:\n        <pre>sudo vi /etc/logrotate.d/backup-cron</pre>\n        <pre>/var/log/backup-cron.log {\n    weekly\n    rotate 4\n    compress\n    missingok\n    notifempty\n}</pre>\n    </li>\n</ol>", "verification": "<pre>$ tail -5 /var/log/backup-cron.log\n2026-04-29 02:00:01 Starting backup...\n2026-04-29 02:15:33 Backup completed successfully.</pre>", "solution": "<p>Combining file redirection, MAILTO suppression, logger integration, and logrotate provides complete control over scheduled job output.</p>"}}, {"id": 39, "section": 2, "title": "Lab 39: Scheduling Jobs to Run at System Boot", "shortTitle": "Scheduling Jobs to Run at System Boot", "fields": {"objective": "<p>Configure commands to execute at system startup using multiple methods: cron <code>@reboot</code>, systemd services, and understanding legacy approaches.</p>", "prerequisites": "<ul>\n    <li>Root or sudo access</li>\n</ul>", "scenario": "<p>Start a monitoring agent every time the server boots, regardless of the boot target.</p>", "procedure": "<ol>\n    <li>Method 1 — Cron <code>@reboot</code>:\n        <pre>crontab -e\n@reboot /opt/monitor/start.sh</pre>\n    </li>\n    <li>Method 2 — systemd oneshot service:\n        <pre>sudo vi /etc/systemd/system/startup-task.service</pre>\n        <pre>[Unit]\nDescription=Run startup tasks\nAfter=network.target\n\n[Service]\nType=oneshot\nExecStart=/opt/monitor/start.sh\nRemainAfterExit=yes\n\n[Install]\nWantedBy=multi-user.target</pre>\n        <pre>sudo systemctl daemon-reload\nsudo systemctl enable startup-task</pre>\n    </li>\n    <li>Compare approaches:\n        <ul>\n            <li><strong>@reboot (cron)</strong>: Simple, but limited logging; no dependency control</li>\n            <li><strong>systemd service</strong>: Full dependency management, journal logging, restart policies</li>\n            <li><strong>/etc/rc.local</strong>: Legacy; still works on some systems but deprecated</li>\n        </ul>\n    </li>\n</ol>", "verification": "<p>Reboot the system and verify the monitoring agent is running with <code>ps aux | grep monitor</code>.</p>", "solution": "<p>For exam purposes, the systemd service method is preferred as it provides the most control and integrates with the rest of the systemd ecosystem.</p>"}}, {"id": 40, "section": 2, "title": "Lab 40: Comprehensive Job Scheduling Challenge", "shortTitle": "Comprehensive Job Scheduling Challenge", "fields": {"objective": "<p>Combine multiple scheduling techniques in a realistic, multi-component scenario.</p>", "prerequisites": "<ul>\n    <li>All scheduling concepts from Labs 29–39</li>\n</ul>", "scenario": "<p>Set up a complete backup infrastructure using four different
