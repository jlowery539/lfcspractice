    </li>
    <li>
        <p>Use <code>pushd</code>/<code>popd</code>:</p>
<pre># Push current dir onto stack and switch to /etc
pushd /etc
# You are now in /etc; the stack holds your previous location

# Push again and switch to projects
pushd /home/student/projects
# You are now in /home/student/projects

# View the directory stack
dirs -v

# Return to /etc (pop the stack)
popd

# Return to original directory
popd</pre>
        <p><code>pushd</code> saves your current directory on a stack before changing. <code>popd</code> returns to the most recently saved directory. This is faster than typing long paths repeatedly.</p>
    </li>
</ol>
</div>

<div class="lab-container">`},
{number:3,title:`File Permissions and Ownership`,html:`<h3>Lab 3: File Permissions and Ownership</h3>

<p><strong>Objective:</strong> Understand and modify file permissions using both symbolic and numeric notation, and manage ownership.</p>

<p><strong>Prerequisites:</strong> Root or sudo access. At least two user accounts on the system.</p>

<p><strong>Setup:</strong></p>
<pre>sudo useradd -m testuser1 2>/dev/null
sudo useradd -m testuser2 2>/dev/null
mkdir -p ~/lab3_perms
cd ~/lab3_perms
touch file_a.txt file_b.sh file_c.conf
echo '#!/bin/bash' &gt; file_b.sh
echo 'echo "Hello"' &gt;&gt; file_b.sh
mkdir shared_dir</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Set <code>file_a.txt</code> to read-write for owner, read-only for group, no access for others using numeric mode.</li>
    <li>Add execute permission for the owner on <code>file_b.sh</code> using symbolic mode.</li>
    <li>Change the owner of <code>file_c.conf</code> to <code>testuser1</code> and the group to <code>testuser2</code>.</li>
    <li>Set the default <code>umask</code> so that new files are created with <code>640</code> permissions and new directories with <code>750</code>.</li>
    <li>Verify all your changes with <code>ls -l</code> and <code>stat</code>.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>chmod 640 file_a.txt
ls -l file_a.txt
# -rw-r----- 1 student student 0 ... file_a.txt</pre>
        <p><code>6</code> = rw- (owner), <code>4</code> = r-- (group), <code>0</code> = --- (others). Each digit is the sum of r=4, w=2, x=1.</p>
    </li>
    <li>
<pre>chmod u+x file_b.sh
ls -l file_b.sh
# -rwxr--r-- 1 student student ... file_b.sh</pre>
        <p><code>u+x</code> adds execute for the user (owner). Symbolic: <code>u</code>=user, <code>g</code>=group, <code>o</code>=others, <code>a</code>=all.</p>
    </li>
    <li>
<pre>sudo chown testuser1:testuser2 file_c.conf
ls -l file_c.conf
# -rw-r--r-- 1 testuser1 testuser2 ... file_c.conf</pre>
        <p><code>chown user:group</code> sets both owner and group. You can also use <code>chgrp</code> to change group alone.</p>
    </li>
    <li>
<pre>umask 027
touch test_umask_file
mkdir test_umask_dir
ls -l test_umask_file
# -rw-r----- (640)
ls -ld test_umask_dir
# drwxr-x--- (750)</pre>
        <p>The umask is subtracted from the default (666 for files, 777 for dirs). <code>umask 027</code> means: files = 666-027 = 640, dirs = 777-027 = 750. To make it persistent, add <code>umask 027</code> to <code>~/.bashrc</code>.</p>
    </li>
    <li>
<pre>ls -l file_a.txt file_b.sh file_c.conf
stat file_a.txt</pre>
        <p><code>stat</code> shows detailed metadata including permissions in both symbolic and octal form.</p>
    </li>
</ol>
</div>

<!-- LAB 4 -->
<div class="lab-container">`},
{number:4,title:`Special Permissions &mdash; SUID, SGID, and Sticky Bit`,html:`<h3>Lab 4: Special Permissions &mdash; SUID, SGID, and Sticky Bit</h3>

<p><strong>Objective:</strong> Configure and understand SUID, SGID, and sticky bit special permissions.</p>

<p><strong>Prerequisites:</strong> Root or sudo access. Multiple user accounts.</p>

<p><strong>Setup:</strong></p>
<pre>sudo useradd -m alice 2>/dev/null
sudo useradd -m bob 2>/dev/null
sudo groupadd devteam 2>/dev/null
sudo usermod -aG devteam alice
sudo usermod -aG devteam bob
mkdir -p ~/lab4_special
cd ~/lab4_special
cp /bin/cat ./mycat
mkdir shared_project
mkdir public_tmp</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Set the SUID bit on <code>mycat</code> and explain when SUID is used in the real system (e.g., <code>/usr/bin/passwd</code>).</li>
    <li>Set the SGID bit on <code>shared_project/</code> and verify that new files created inside inherit the directory&rsquo;s group.</li>
    <li>Set the sticky bit on <code>public_tmp/</code> and verify that users cannot delete each other&rsquo;s files.</li>
    <li>Find all SUID and SGID files on the entire system using <code>find</code>.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>sudo chmod u+s mycat
ls -l mycat
# -rwsr-xr-x ... mycat</pre>
        <p>The <code>s</code> in the owner execute position means SUID is set. When any user runs this binary, it executes with the file owner&rsquo;s privileges. The classic example is <code>/usr/bin/passwd</code>, which needs root privileges to modify <code>/etc/shadow</code>.</p>
    </li>
    <li>
<pre>sudo chgrp devteam shared_project
sudo chmod g+s shared_project
ls -ld shared_project
# drwxr-sr-x ... devteam shared_project

# Test: create a file inside as alice
sudo -u alice touch shared_project/alice_file.txt
ls -l shared_project/alice_file.txt
# The group will be 'devteam', not alice's primary group</pre>
        <p>SGID on a directory causes new files/subdirectories to inherit the directory&rsquo;s group, which is essential for collaborative workspaces.</p>
    </li>
    <li>
<pre>sudo chmod 1777 public_tmp
ls -ld public_tmp
# drwxrwxrwt ... public_tmp

# Test:
sudo -u alice touch public_tmp/alice_file
sudo -u bob touch public_tmp/bob_file
sudo -u bob rm public_tmp/alice_file
# rm: cannot remove 'public_tmp/alice_file': Operation not permitted</pre>
        <p>The <code>t</code> (sticky bit) prevents users from deleting files they do not own, even in a world-writable directory. <code>/tmp</code> uses this on every Linux system.</p>
    </li>
    <li>
<pre># Find all SUID files
sudo find / -perm -4000 -type f 2>/dev/null

# Find all SGID files
sudo find / -perm -2000 -type f 2>/dev/null

# Find both SUID and SGID
sudo find / \\( -perm -4000 -o -perm -2000 \\) -type f 2>/dev/null</pre>
        <p><code>-perm -4000</code> matches files with at least the SUID bit set. Regularly auditing these files is a critical security practice.</p>
    </li>
</ol>
</div>

<div class="lab-container">`},
{number:5,title:`Finding Files with find`,html:`<h3>Lab 5: Finding Files with find</h3>

<p><strong>Objective:</strong> Master the <code>find</code> command with various criteria and actions.</p>

<p><strong>Prerequisites:</strong> Basic directory navigation skills.</p>

<p><strong>Setup:</strong></p>
<pre>mkdir -p ~/lab5_find/{docs,logs,config,temp}

chmod 777 temp/world_writable.txt

sudo chown root:root config/db.conf 2>/dev/null</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Find all <code>.log</code> files under <code>~/lab5_find</code>.</li>
    <li>Find files larger than 1 MB.</li>
    <li>Find files modified in the last 3 days.</li>
    <li>Find files with <code>777</code> permissions.</li>
    <li>Find all files owned by root.</li>
    <li>Find <code>.txt</code> files and delete them using <code>-exec</code>.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>find ~/lab5_find -name "*.log" -type f</pre>
        <p><code>-name</code> matches the filename pattern. <code>-type f</code> restricts to regular files.</p>
    </li>
    <li>
<pre>find ~/lab5_find -size +1M -type f</pre>
        <p><code>-size +1M</code> means greater than 1 megabyte. Use <code>k</code> for KB, <code>G</code> for GB.</p>
    </li>
    <li>
<pre>find ~/lab5_find -mtime -3 -type f</pre>
        <p><code>-mtime -3</code> means modified less than 3 days ago. <code>+3</code> means more than 3 days ago.</p>
    </li>
    <li>
<pre>find ~/lab5_find -perm 777 -type f</pre>
        <p><code>-perm 777</code> matches files with exactly 777 permissions. Use <code>-perm -777</code> for "at least" these permissions.</p>
    </li>
    <li>
<pre>find ~/lab5_find -user root -type f</pre>
        <p><code>-user</code> matches by owner name. You can also use <code>-uid 0</code>.</p>
    </li>
    <li>
<pre># Preview first
find ~/lab5_find -name "*.txt" -type f

# Delete with -exec
find ~/lab5_find -name "*.txt" -type f -exec rm -v {} \\;

# Alternative: use -ok for confirmation before each deletion
find ~/lab5_find -name "*.txt" -type f -ok rm -v {} \\;</pre>
        <p><code>{}</code> is replaced by each found filename. <code>\\;</code> terminates the <code>-exec</code> clause. <code>-ok</code> prompts before each execution.</p>
    </li>
</ol>
</div>

<pre>awk -F',' '{print $1, $3}' employees.csv</pre>
        <p><code>-F','</code> sets the field separator to comma. <code>$1</code> and <code>$3</code> are the first and third fields.</p>
    </li>
    <li>
<pre>awk -F',' 'NR>1 &amp;&amp; $3 > 60000 {print $1, $3}' employees.csv</pre>
        <p><code>NR>1</code> skips the header row. The condition <code>$3 > 60000</code> filters by salary.</p>
    </li>
    <li>
<pre>awk -F',' 'NR>1 {sum += $3; count++} END {printf "Average Salary: %.2f\\n", sum/count}' employees.csv</pre>
        <p>The <code>END</code> block runs after all lines are processed. We accumulate <code>sum</code> and <code>count</code> during processing.</p>
    </li>
    <li>
<pre>awk -F',' 'NR>1 {dept[$2]++} END {for (d in dept) print d, dept[d]}' employees.csv</pre>
        <p>Associative arrays (<code>dept[$2]++</code>) count occurrences of each unique department name.</p>
    </li>
</ol>
</div>

<div class="lab-container">`},

<p><strong>Objective:</strong> Combine text utilities for data extraction and analysis.</p>

<p><strong>Prerequisites:</strong> None.</p>

<p><strong>Setup:</strong></p>
<pre>cd ~ &amp;&amp; mkdir -p lab11_utils &amp;&amp; cd lab11_utils
cat &lt;&lt; 'EOF' &gt; weblog.txt
192.168.1.10 GET /index.html
10.0.0.5 POST /login
192.168.1.10 GET /about
10.0.0.5 GET /dashboard
172.16.0.1 GET /index.html
192.168.1.10 GET /contact
10.0.0.5 POST /logout
172.16.0.1 GET /about
EOF</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Extract only the IP addresses (column 1) from <code>weblog.txt</code>.</li>
    <li>Count how many requests each IP address made, sorted from most to least.</li>
    <li>Count the total number of lines, words, and characters in the file.</li>
    <li>Convert all text in <code>weblog.txt</code> to uppercase.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>cut -d' ' -f1 weblog.txt</pre>
        <p><code>-d' '</code> uses space as delimiter. <code>-f1</code> selects the first field.</p>
    </li>
    <li>
<pre>cut -d' ' -f1 weblog.txt | sort | uniq -c | sort -rn</pre>
        <p><code>sort</code> groups identical lines together (required before <code>uniq</code>). <code>uniq -c</code> counts consecutive duplicates. <code>sort -rn</code> sorts numerically in reverse.</p>
    </li>
    <li>
<pre>wc weblog.txt
# Output: lines  words  characters  filename</pre>
        <p>Use <code>wc -l</code> for lines only, <code>wc -w</code> for words, <code>wc -c</code> for bytes, <code>wc -m</code> for characters.</p>
    </li>
    <li>
<pre>tr '[:lower:]' '[:upper:]' &lt; weblog.txt</pre>
        <p><code>tr</code> translates characters. It reads from stdin, so use <code>&lt;</code> redirection.</p>
    </li>
</ol>
</div>

<div class="lab-container">`},
{number:12,title:`Comparing and Patching Files`,html:`<h3>Lab 12: Comparing and Patching Files</h3>

<p><strong>Objective:</strong> Use <code>diff</code>, <code>patch</code>, and related tools to compare and merge file changes.</p>

<p><strong>Prerequisites:</strong> None.</p>

<p><strong>Setup:</strong></p>
<pre>cd ~ &amp;&amp; mkdir -p lab12_diff &amp;&amp; cd lab12_diff
cat &lt;&lt; 'EOF' &gt; config_v1.conf
# Server Configuration
listen_port=8080
max_workers=4
log_level=INFO
database_host=localhost
EOF

cat &lt;&lt; 'EOF' &gt; config_v2.conf
# Server Configuration
listen_port=9090
max_workers=8
log_level=DEBUG
database_host=localhost
cache_enabled=true
EOF</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Compare the two files with <code>diff</code> in unified format.</li>
    <li>Generate a patch file and apply it to <code>config_v1.conf</code>.</li>
    <li>Use <code>sdiff</code> for a side-by-side comparison.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>diff -u config_v1.conf config_v2.conf</pre>
        <p><code>-u</code> produces unified diff format showing context around changes. Lines beginning with <code>-</code> are from the first file; <code>+</code> from the second.</p>
    </li>
    <li>
<pre>diff -u config_v1.conf config_v2.conf &gt; update.patch
patch config_v1.conf &lt; update.patch
cat config_v1.conf
# config_v1.conf now matches config_v2.conf</pre>
        <p><code>patch</code> applies the changes described in the diff file. Use <code>patch -R</code> to reverse a patch.</p>
    </li>
    <li>
<pre>sdiff config_v1.conf config_v2.conf</pre>
        <p><code>sdiff</code> shows both files side by side with <code>|</code> for changed lines, <code>&lt;</code> for removed, <code>&gt;</code> for added.</p>
    </li>
</ol>
</div>

<div class="lab-container">`},

SCRIPT

<p><strong>Tasks:</strong></p>
<ol>
    <li>Run <code>mixed_output.sh</code> and redirect stdout to <code>out.txt</code> and stderr to <code>err.txt</code>.</li>
    <li>Redirect both stdout and stderr to the same file.</li>
    <li>Discard all error output by redirecting stderr to <code>/dev/null</code>.</li>
    <li>Use <code>tee</code> to display output on screen and save it to a file simultaneously.</li>
    <li>Use a here string to pass input to <code>wc -w</code>.</li>

<ol>
    <li>
<pre>./mixed_output.sh 1>out.txt 2>err.txt

# Or equivalently:
./mixed_output.sh &gt; both.txt 2&gt;&amp;1</pre>

    <li>

        <p><code>/dev/null</code> is a special file that discards all data written to it.</p>

    <li>
<pre>./mixed_output.sh 2&gt;/dev/null | tee output_copy.txt</pre>
        <p><code>tee</code> reads stdin, writes to both stdout and the named file. Use <code>tee -a</code> to append.</p>
    </li>
    <li>

<p><strong>Objective:</strong> Create, list, and extract tar archives with various compression methods.</p>

<p><strong>Prerequisites:</strong> None.</p>

<p><strong>Setup:</strong></p>
<pre>cd ~ &amp;&amp; mkdir -p lab14_tar/project/{src,docs,tests}
cd lab14_tar

echo "readme" &gt; project/docs/README.md
echo "test1" &gt; project/tests/test1.sh
dd if=/dev/urandom of=project/src/data.bin bs=1K count=100 2&gt;/dev/null</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Create a gzip-compressed archive of the <code>project/</code> directory.</li>
    <li>Create bzip2 and xz archives and compare their sizes.</li>
    <li>List the contents of an archive without extracting.</li>
    <li>Extract the archive to a new directory <code>/tmp/restore</code>.</li>
    <li>Extract only the <code>docs/</code> subdirectory from the archive.</li>
    <li>Create an archive excluding <code>.bin</code> files.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>tar czf project.tar.gz project/</pre>
        <p><code>c</code>=create, <code>z</code>=gzip compression, <code>f</code>=filename.</p>
    </li>
    <li>
<pre>tar cjf project.tar.bz2 project/
tar cJf project.tar.xz project/
ls -lh project.tar.*</pre>
        <p><code>j</code>=bzip2, <code>J</code>=xz. Typically: gzip=fastest, xz=smallest, bzip2=middle.</p>
    </li>
    <li>
<pre>tar tzf project.tar.gz</pre>
        <p><code>t</code>=list contents. Combine with <code>z</code>/<code>j</code>/<code>J</code> to match the compression.</p>
    </li>
    <li>
<pre>mkdir -p /tmp/restore
tar xzf project.tar.gz -C /tmp/restore</pre>
        <p><code>x</code>=extract. <code>-C</code> specifies the target directory.</p>
    </li>
    <li>
<pre>tar xzf project.tar.gz project/docs/</pre>
        <p>Specifying a path after the archive extracts only that portion.</p>
    </li>
    <li>
<pre>tar czf project_no_bin.tar.gz --exclude='*.bin' project/</pre>
        <p><code>--exclude</code> accepts glob patterns. Multiple <code>--exclude</code> flags can be used.</p>
    </li>
</ol>
</div>

<div class="lab-container">`},
{number:16,title:`Hard Links and Soft Links`,html:`<h3>Lab 16: Hard Links and Soft Links</h3>

<p><strong>Objective:</strong> Create and understand hard links and symbolic links.</p>

<p><strong>Prerequisites:</strong> None.</p>

<p><strong>Setup:</strong></p>
<pre>cd ~ &amp;&amp; mkdir -p lab16_links &amp;&amp; cd lab16_links
echo "Original content" &gt; original.txt</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Create a hard link to <code>original.txt</code> and compare inode numbers.</li>
    <li>Create a symbolic link to <code>original.txt</code> and compare inode numbers.</li>
    <li>Delete <code>original.txt</code> and observe what happens to each link type.</li>
    <li>Find all hard links to a specific inode using <code>find</code>.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>ln original.txt hardlink.txt
ls -li original.txt hardlink.txt
# Both share the same inode number</pre>
        <p>A hard link is another directory entry pointing to the same inode. The file data persists until all hard links are removed.</p>
    </li>
    <li>
<pre>ln -s original.txt symlink.txt
ls -li original.txt symlink.txt
# Different inode numbers; symlink.txt -> original.txt</pre>
        <p>A symbolic link is a separate file that contains the path to the target. It has its own inode.</p>
    </li>
    <li>
<pre>rm original.txt
cat hardlink.txt    # Still works — data still on disk (inode link count = 1)
cat symlink.txt     # FAILS — "No such file or directory" (broken/dangling symlink)
ls -l symlink.txt   # Shows broken link (often colored red)</pre>
    </li>
    <li>
<pre># Get inode number
ls -i hardlink.txt
# Example output: 1234567 hardlink.txt

find . -inum 1234567</pre>
        <p><code>find -inum</code> searches by inode number, finding all hard links to the same data.</p>
    </li>
</ol>
</div>

    <li>Use <code>xargs -I {}</code> for placeholder substitution.</li>
    <li>Use <code>xargs</code> with <code>grep</code> to search multiple files.</li>

<ol>

    </li>

{number:25,title:`Shell Scripting Basics`,html:`<h3>Lab 25: Shell Scripting Basics</h3>

<p><strong>Objective:</strong> Write basic shell scripts for automation.</p>

<p><strong>Prerequisites:</strong> None.</p>

<p><strong>Setup:</strong></p>
<pre>mkdir -p ~/lab25_scripts &amp;&amp; cd ~/lab25_scripts</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Create a script that accepts a directory path as an argument and reports the number of files and directories inside it.</li>
    <li>Add error handling: if no argument is given, print a usage message and exit with code 1.</li>
    <li>Add a loop that processes multiple directories if several are passed.</li>
    <li>Make the script executable and run it.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>cat &lt;&lt; 'SCRIPT' &gt; dirinfo.sh
#!/bin/bash
# dirinfo.sh — Report file and directory counts

if [ $# -eq 0 ]; then
    echo "Usage: $0 &lt;directory&gt; [directory2] ..."
    exit 1
fi

for dir in "$@"; do
    if [ ! -d "$dir" ]; then
        echo "Error: '$dir' is not a valid directory." &gt;&amp;2
        continue
    fi
    file_count=$(find "$dir" -maxdepth 1 -type f | wc -l)
    dir_count=$(find "$dir" -maxdepth 1 -type d | wc -l)
    dir_count=$((dir_count - 1))  # Subtract the directory itself
    echo "Directory: $dir"
    echo "  Files:       $file_count"
    echo "  Subdirs:     $dir_count"
    echo ""
done
exit 0
SCRIPT</pre>
    </li>
    <li><p>Error handling is built into the script above: <code>$#</code> checks argument count; <code>-d</code> tests if the argument is a directory.</p></li>
    <li><p>The <code>for dir in "$@"</code> loop processes all positional arguments.</p></li>
    <li>
<pre>chmod +x dirinfo.sh
./dirinfo.sh /etc /home /tmp</pre>
        <p><code>chmod +x</code> sets the execute permission. The shebang <code>#!/bin/bash</code> tells the kernel which interpreter to use.</p>
    </li>
</ol>
</div>

{number:35,title:`Handling Merge Conflicts`,html:`<h3>Lab 35: Handling Merge Conflicts</h3>

<p><strong>Objective:</strong> Identify and resolve merge conflicts.</p>

<p><strong>Prerequisites:</strong> A repository with commits on main.</p>

<p><strong>Setup:</strong></p>
<pre>cd ~/git_labs/myproject

git commit -am "Branch A: set version 2.0-alpha"

git switch main
git switch -c branch-b
echo "version = 2.0-beta" &gt; version.txt
git commit -am "Branch B: set version 2.0-beta"

git switch main
git merge branch-a   # This succeeds (fast-forward)</pre>

<p><strong>Tasks:</strong></p>

</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>git merge branch-b

    </li>
    <li>
<pre>cat version.txt
# &lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
# version = 2.0-alpha
# =======
# version = 2.0-beta
# &gt;&gt;&gt;&gt;&gt;&gt;&gt; branch-b

# Edit the file to resolve — keep the version you want:
echo "version = 2.0-release" &gt; version.txt</pre>
        <p>The markers show both versions. Edit the file to contain the final desired content, removing all <code>&lt;&lt;&lt;</code>, <code>===</code>, <code>&gt;&gt;&gt;</code> markers.</p>
    </li>
    <li>
<pre>git add version.txt
git commit -m "Merge branch-b: resolve version conflict to 2.0-release"

# Clean up
git branch -d branch-a branch-b</pre>
    </li>
</ol>

{number:37,title:`Undoing Changes &mdash; reset, revert, checkout`,html:`<h3>Lab 37: Undoing Changes &mdash; reset, revert, checkout</h3>

<p><strong>Objective:</strong> Undo changes at different stages of the Git workflow.</p>

<p><strong>Prerequisites:</strong> A repo with several commits.</p>

<p><strong>Setup:</strong></p>
<pre>cd ~/git_labs/myproject

<p><strong>Tasks:</strong></p>
<ol>
    <li>Discard unstaged changes in a file.</li>
    <li>Revert the bad commit (creates a new commit that undoes it).</li>
    <li>Use <code>git reset --soft</code> to undo the last commit but keep changes staged.</li>
    <li>Recover a lost commit using <code>git reflog</code>.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>echo "accidental edit" &gt;&gt; README.md
git restore README.md
# Or older syntax: git checkout -- README.md</pre>
    </li>
    <li>
<pre>git revert HEAD
# Creates a new commit that undoes the changes from "Bad commit"
# This is safe for shared branches — it doesn't rewrite history</pre>
    </li>
    <li>
<pre>git reset --soft HEAD~1
git status    # Changes from the reverted commit are now staged
git commit -m "Re-commit with corrections"</pre>
        <p><code>--soft</code> keeps changes staged. <code>--mixed</code> (default) unstages them. <code>--hard</code> discards everything.</p>
    </li>
    <li>
<pre>git reflog
# Shows all recent HEAD movements with short hashes
# Find the lost commit hash and:
git checkout &lt;hash&gt;
# Or create a branch: git branch recovered &lt;hash&gt;</pre>
    </li>
</ol>

<div class="lab-container">`},
{number:44,title:`Creating a Custom systemd Service Unit`,html:`<h3>Lab 44: Creating a Custom systemd Service Unit</h3>

<p><strong>Objective:</strong> Write and deploy a custom systemd service unit file.</p>

<p><strong>Prerequisites:</strong> Root or sudo access.</p>

<p><strong>Setup:</strong></p>
<pre># Create a simple daemon script
sudo cat &lt;&lt; 'EOF' &gt; /usr/local/bin/myapp.sh
#!/bin/bash
while true; do
    echo "$(date) - myapp is running" &gt;&gt; /var/log/myapp.log
    sleep 10
done
EOF
sudo chmod +x /usr/local/bin/myapp.sh</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Write a systemd unit file for <code>myapp.sh</code>.</li>
    <li>Reload the systemd daemon, enable, and start the service.</li>
    <li>Verify it runs and restarts automatically after a kill.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>sudo cat &lt;&lt; 'EOF' &gt; /etc/systemd/system/myapp.service
[Unit]
Description=My Custom Application
After=network.target

[Service]
Type=simple
ExecStart=/usr/local/bin/myapp.sh
Restart=always
RestartSec=5

[Install]
WantedBy=multi-user.target
EOF</pre>
        <p><code>[Unit]</code> defines metadata and ordering. <code>[Service]</code> defines how to run it. <code>[Install]</code> defines where it gets enabled.</p>
    </li>
    <li>
<pre>sudo systemctl daemon-reload
sudo systemctl enable myapp.service
sudo systemctl start myapp.service
sudo systemctl status myapp.service</pre>
    </li>
    <li>
<pre>sudo kill $(pgrep -f myapp.sh)
sleep 6
sudo systemctl status myapp.service
# Should show "active (running)" — systemd restarted it due to Restart=always</pre>
    </li>
</ol>
</div>

<div class="lab-container">`},
{number:45,title:`Configuring systemd Service Dependencies and Ordering`,html:`<h3>Lab 45: Configuring systemd Service Dependencies and Ordering</h3>

<p><strong>Objective:</strong> Manage service startup ordering and dependencies.</p>

<p><strong>Prerequisites:</strong> Lab 44 custom service.</p>

<p><strong>Setup:</strong></p>
<pre># Create a second service
sudo cat &lt;&lt; 'EOF' &gt; /usr/local/bin/mydb.sh
#!/bin/bash
while true; do echo "$(date) - mydb running" >> /var/log/mydb.log; sleep 10; done
EOF
sudo chmod +x /usr/local/bin/mydb.sh

sudo cat &lt;&lt; 'EOF' &gt; /etc/systemd/system/mydb.service
[Unit]
Description=My Database Service
[Service]
Type=simple
ExecStart=/usr/local/bin/mydb.sh
Restart=always
[Install]
WantedBy=multi-user.target
EOF
sudo systemctl daemon-reload</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Configure <code>myapp.service</code> to start after and require <code>mydb.service</code>.</li>
    <li>Visualize dependencies with <code>systemctl list-dependencies</code>.</li>
    <li>Test: stop <code>mydb</code> and observe the effect on <code>myapp</code> when using <code>Requires=</code> vs. <code>Wants=</code>.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre># Edit myapp.service [Unit] section:
sudo sed -i '/\\[Unit\\]/,/\\[Service\\]/{
    /After=/c\\After=mydb.service
    /Requires=/d
}' /etc/systemd/system/myapp.service

# Or manually edit to add:
# After=mydb.service
# Requires=mydb.service
sudo systemctl daemon-reload</pre>
    </li>
    <li>
<pre>systemctl list-dependencies myapp.service</pre>
    </li>
    <li>
<pre># With Requires=: stopping mydb will also stop myapp
sudo systemctl stop mydb.service
systemctl is-active myapp.service    # inactive

# With Wants= instead: stopping mydb does NOT stop myapp
# Wants= is a weaker dependency — preferred when the service can function alone</pre>
    </li>
</ol>
</div>

{number:55,title:`Configuring Socket-Activated Services`,html:`<h3>Lab 55: Configuring Socket-Activated Services</h3>

<p><strong>Objective:</strong> Understand and configure on-demand service activation using systemd socket units.</p>

<p><strong>Prerequisites:</strong> Root/sudo access.</p>

<p><strong>Setup:</strong></p>
<pre>sudo cat &lt;&lt; 'EOF' &gt; /usr/local/bin/echo-server.sh
#!/bin/bash
while read line; do
    echo "Echo: $line"
done
EOF
sudo chmod +x /usr/local/bin/echo-server.sh</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Create a <code>.socket</code> and matching <code>.service</code> unit file.</li>
    <li>Enable and start the socket, then test activation by connecting.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>sudo cat &lt;&lt; 'EOF' &gt; /etc/systemd/system/echo-server.socket
[Unit]
Description=Echo Server Socket

[Socket]
ListenStream=9999
Accept=yes

[Install]
WantedBy=sockets.target
EOF

sudo cat &lt;&lt; 'EOF' &gt; /etc/systemd/system/echo-server@.service
[Unit]
Description=Echo Server Instance

[Service]
Type=simple
ExecStart=/usr/local/bin/echo-server.sh
StandardInput=socket
EOF
sudo systemctl daemon-reload</pre>
    </li>
    <li>
<pre>sudo systemctl enable --now echo-server.socket
echo "Hello" | nc localhost 9999
# Output: Echo: Hello

journalctl -u echo-server.socket
# Verify the socket triggered the service on demand</pre>
    </li>
</ol>
</div>

    <li>
<pre>vmstat 2 5

    </li>

<pre>vmstat -s

    </li>
</ol>

{number:77,title:`Using chroot for Application Isolation`,html:`<h3>Lab 77: Using chroot for Application Isolation</h3>

<p><strong>Objective:</strong> Create a chroot environment to isolate an application.</p>

<p><strong>Prerequisites:</strong> Root access.</p>

<p><strong>Setup:</strong></p>
<pre>sudo mkdir -p /srv/chroot/{bin,lib,lib64,usr/lib}</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Copy <code>/bin/bash</code> and its library dependencies into the chroot.</li>
    <li>Enter the chroot and verify isolation.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>sudo cp /bin/bash /srv/chroot/bin/

# Find and copy dependencies
ldd /bin/bash
# Copy each listed library:
for lib in $(ldd /bin/bash | grep -o '/lib[^ ]*'); do
    sudo cp --parents "$lib" /srv/chroot/
done

# Also copy basic commands
for cmd in ls cat echo; do
    sudo cp /bin/$cmd /srv/chroot/bin/ 2>/dev/null || sudo cp /usr/bin/$cmd /srv/chroot/bin/
    for lib in $(ldd $(which $cmd) | grep -o '/lib[^ ]*'); do
        sudo cp --parents "$lib" /srv/chroot/ 2>/dev/null
    done
done</pre>
    </li>
    <li>
<pre>sudo chroot /srv/chroot /bin/bash

# Inside the chroot:
ls /
# Only sees bin/ lib/ lib64/ usr/ — the host filesystem is invisible
echo "I am isolated"
exit</pre>
        <p>Note: <code>chroot</code> is not a security boundary like containers. A root user inside a chroot can potentially escape. It is useful for recovery and build environments.</p>
    </li>
</ol>
</div>

<p><strong>Prerequisites:</strong> Root access.</p>

<p><strong>Setup:</strong></p>
<pre># Create a small filesystem with limited inodes
dd if=/dev/zero of=/tmp/small_fs.img bs=1M count=20

sudo mkdir -p /mnt/small_fs
sudo mount /tmp/small_fs.img /mnt/small_fs

# Fill with tiny files until inodes are exhausted

<p><strong>Tasks:</strong></p>
<ol>

    <li>Find directories with the most files and clean up.</li>

    </li>
    <li>
<pre># Find directories with the most files:
sudo find /mnt/small_fs -type f | wc -l

# Remove unnecessary files:
sudo rm /mnt/small_fs/file_{100..180}

<div class="lab-container">`},
{number:86,title:`Investigating Deleted-but-Open Files`,html:`<h3>Lab 86: Investigating Deleted-but-Open Files</h3>

<p><strong>Objective:</strong> Find disk space held by files that have been deleted but are still open by a process.</p>

<p><strong>Prerequisites:</strong> lsof installed.</p>

<p><strong>Setup:</strong></p>
<pre># Create a large file and hold it open
dd if=/dev/zero of=/tmp/held_open_file bs=1M count=100 2>/dev/null
tail -f /tmp/held_open_file &amp;
TAIL_PID=$!
# Delete the file while the process has it open
rm /tmp/held_open_file</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Notice the discrepancy between <code>df</code> and <code>du</code>.</li>
    <li>Find the deleted-but-open file with <code>lsof</code>.</li>
    <li>Close the process to release the space.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>df -h /tmp      # Shows ~100MB used
du -sh /tmp     # Shows much less — the file is "gone" from the directory
# The discrepancy is because the deleted file's blocks are still allocated</pre>
    </li>
    <li>
<pre>sudo lsof +L1
# Shows files with link count &lt; 1 (deleted but open)
# You'll see tail holding the deleted file open

# You can even see it in /proc:
ls -l /proc/$TAIL_PID/fd/
# One entry will show "(deleted)" next to the filename</pre>
    </li>
    <li>
<pre>kill $TAIL_PID
df -h /tmp     # Space is now freed</pre>
    </li>
</ol>
</div>

{number:87,title:`Managing Log File Growth with logrotate`,html:`<h3>Lab 87: Managing Log File Growth with logrotate</h3>

<p><strong>Objective:</strong> Configure logrotate to prevent log files from consuming all disk space.</p>

<p><strong>Prerequisites:</strong> logrotate installed (usually default).</p>

<p><strong>Setup:</strong></p>
<pre>sudo mkdir -p /var/log/myapp
sudo sh -c 'for i in $(seq 1 1000); do echo "Log entry $i at $(date)"; done > /var/log/myapp/myapp.log'</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Create a logrotate configuration for the application log.</li>
    <li>Test with a dry run, then force rotation.</li>
    <li>Verify rotation occurred.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>sudo cat &lt;&lt; 'EOF' &gt; /etc/logrotate.d/myapp
/var/log/myapp/myapp.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    size 1M
}
EOF</pre>
        <p><code>copytruncate</code> copies then truncates the original file — necessary for apps that don&rsquo;t reopen their log files.</p>
    </li>
    <li>
<pre>sudo logrotate -d /etc/logrotate.d/myapp    # Dry run — shows what would happen
sudo logrotate -f /etc/logrotate.d/myapp    # Force rotation now</pre>
    </li>
    <li>
<pre>ls -la /var/log/myapp/
# myapp.log     (new, small/empty)
# myapp.log.1   (previous log, uncompressed due to delaycompress)
</pre>
    </li>
</ol>

{number:88,title:`Extending a Logical Volume to Reclaim Space`,html:`<h3>Lab 88: Extending a Logical Volume to Reclaim Space</h3>

<p><strong>Objective:</strong> Extend a logical volume and its filesystem when space is needed.</p>

<p><strong>Prerequisites:</strong> LVM packages installed.</p>

<p><strong>Setup:</strong></p>
<pre>sudo apt install -y lvm2 2>/dev/null || sudo dnf install -y lvm2

dd if=/dev/zero of=/tmp/lvm_disk2.img bs=1M count=200 2>/dev/null
LOOP1=$(sudo losetup --find --show /tmp/lvm_disk1.img)
LOOP2=$(sudo losetup --find --show /tmp/lvm_disk2.img)

sudo pvcreate $LOOP1 $LOOP2
sudo vgcreate lab_vg $LOOP1 $LOOP2
sudo lvcreate -L 100M -n lab_lv lab_vg
sudo mkfs.ext4 /dev/lab_vg/lab_lv
sudo mkdir -p /mnt/lab_lv
sudo mount /dev/lab_vg/lab_lv /mnt/lab_lv</pre>

<p><strong>Tasks:</strong></p>

    <li>Extend the logical volume and resize the filesystem.</li>
    <li>Verify the new size.</li>

    <li>
<pre>sudo vgdisplay lab_vg | grep "Free"

    </li>
    <li>
<pre># Extend the LV by 100MB and resize filesystem in one command:
sudo lvextend -r -L +100M /dev/lab_vg/lab_lv

# Or do it in two steps:

        <p><code>-r</code> automatically resizes the filesystem after extending the LV. ext4 and XFS support online (mounted) resizing.</p>

    </li>
</ol>

{number:93,title:`Understanding SSL/TLS Certificates &mdash; Concepts and Structure`,html:`<h3>Lab 93: Understanding SSL/TLS Certificates &mdash; Concepts and Structure</h3>

<p><strong>Objective:</strong> Examine the structure and key fields of an SSL/TLS certificate.</p>

<p><strong>Prerequisites:</strong> <code>openssl</code> installed (default on most Linux systems).</p>

<p><strong>Setup:</strong></p>
<pre>mkdir -p ~/lab93_ssl &amp;&amp; cd ~/lab93_ssl</pre>

<p><strong>Tasks:</strong></p>
<ol>
    <li>Retrieve and view a certificate from a live website using <code>openssl s_client</code>.</li>
    <li>Decode a PEM certificate and identify key fields (Subject, Issuer, Validity, SANs).</li>
    <li>Understand the certificate chain (Root CA &rarr; Intermediate CA &rarr; Leaf).</li>
    <li>Convert between PEM and DER formats.</li>
</ol>

<p><strong>Solution:</strong></p>
<ol>
    <li>
<pre>echo | openssl s_client -connect www.google.com:443 -servername www.google.com 2>/dev/null | \\
  openssl x509 -text -noout | head -40</pre>
    </li>
    <li>
<pre># Save the certificate to a file first:
echo | openssl s_client -connect www.google.com:443 -servername www.google.com 2>/dev/null | \\
  sed -n '/-----BEGIN CERTIFICATE-----/,/-----END CERTIFICATE-----/p' > google.pem

openssl x509 -in google.pem -text -noout
# Key fields:
# Subject: CN = www.google.com
# Issuer: who signed the certificate (CA)
# Validity: Not Before / Not After dates
# Subject Alternative Name: DNS names the cert is valid for</pre>
    </li>
    <li>
<pre>echo | openssl s_client -connect www.google.com:443 -showcerts 2>/dev/null
# Shows the full chain: server cert + intermediate(s)
# Certificate 0: leaf (server)
# Certificate 1: intermediate CA
# The root CA is trusted in the OS store and not sent</pre>
    </li>
    <li>
<pre># PEM to DER
openssl x509 -in google.pem -outform DER -out google.der

# DER to PEM
openssl x509 -in google.der -inform DER -outform PEM -out google_back.pem</pre>
    </li>
</ol>
</div>

[alt_names]

#!/bin/bash
# check_cert_expiry.sh — Alert if certificate expires within N days
CERT_FILE="$1"
WARN_DAYS="\${2:-30}"

if [ -z "$CERT_FILE" ]; then
    echo "Usage: $0 &lt;cert_file&gt; [warn_days]"
    exit 1
fi

EXPIRY_DATE=$(openssl x509 -in "$CERT_FILE" -enddate -noout | cut -d= -f2)
EXPIRY_EPOCH=$(date -d "$EXPIRY_DATE" +%s)
NOW_EPOCH=$(date +%s)
DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

if [ "$DAYS_LEFT" -le "$WARN_DAYS" ]; then
    echo "WARNING: $CERT_FILE expires in $DAYS_LEFT days ($EXPIRY_DATE)"
    exit 2
else
    echo "OK: $CERT_FILE expires in $DAYS_LEFT days ($EXPIRY_DATE)"
    exit 0
fi
SCRIPT
chmod +x ~/check_cert_expiry.sh

# Test it:
~/check_cert_expiry.sh /tmp/short.crt 30
# WARNING: /tmp/short.crt expires in 10 days ...</pre>

// ---- STATE ----
let progress = {};
let currentView = 'intro'; // 'intro' or lab number
let expandedSections = new Set([0]);

function loadProgress() {
  try {
    const saved = localStorage.getItem('lfcs-progress');
    if (saved) progress = JSON.parse(saved);
  } catch(e) {}
}
function saveProgress() {
  localStorage.setItem('lfcs-progress', JSON.stringify(progress));
}

// ---- SIDEBAR RENDERING ----
function buildSidebar() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  SECTIONS.forEach((section, si) => {
    const sDiv = document.createElement('div');
    sDiv.className = 'section-group';
    const completedInSection = section.labs.filter(l => progress[l.number]).length;
    const shortTitle = section.title.includes(':') ? section.title.split(':').slice(1).join(':').trim() : section.title;
    
    const header = document.createElement('div');
    header.className = 'section-header';
    header.dataset.section = si;
    header.innerHTML = `<span class="chevron ${expandedSections.has(si)?'open':''}" style="font-size:0.7rem;">&#9654;</span><span class="flex-1 truncate">${shortTitle}</span><span class="text-xs font-normal text-slate-500">${completedInSection}/${section.labs.length}</span>`;
    sDiv.appendChild(header);

    const labsList = document.createElement('div');
    labsList.className = 'section-labs';
    labsList.style.display = expandedSections.has(si) ? 'block' : 'none';
    labsList.dataset.sectionIndex = si;

    section.labs.forEach(lab => {
      const lDiv = document.createElement('div');
      lDiv.className = 'sidebar-lab' + (currentView === lab.number ? ' active' : '') + (progress[lab.number] ? ' completed' : '');
      lDiv.dataset.lab = lab.number;
      const done = progress[lab.number];
      lDiv.innerHTML = `<span class="lab-check ${done?'done':''}">${done?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"></rect></svg>'}</span><span><strong>Lab ${lab.number}</strong> ${lab.title}</span>`;
      labsList.appendChild(lDiv);
    });
    sDiv.appendChild(labsList);
    container.appendChild(sDiv);
  });
}

// ---- PROGRESS UPDATE ----
function updateProgressUI() {
  const completed = Object.keys(progress).filter(k => progress[k]).length;
  const pct = Math.round((completed/100)*100);
  document.getElementById('progress-label').textContent = `${completed} / 100 labs completed`;

function showIntro() {
  currentView = 'intro';
  document.getElementById('content-area').innerHTML = '<div class="lab-content">' + INTRO_HTML + '</div>';
  document.getElementById('nav-buttons').classList.add('hidden');

function showLab(labNumber) {
  let lab = null, sectionIndex = -1, labIndex = -1;
  for (let si = 0; si < SECTIONS.length; si++) {
    for (let li = 0; li < SECTIONS[si].labs.length; li++) {
      if (SECTIONS[si].labs[li].number === labNumber) {
        lab = SECTIONS[si].labs[li];
        sectionIndex = si;
        labIndex = li;
        break;
      }
    }
    if (lab) break;
  }
  if (!lab) return;
  currentView = labNumber;
  expandedSections.add(sectionIndex);

  // Process HTML to wrap solution
  let labHtml = lab.html;
  labHtml = wrapSolution(labHtml);

  document.getElementById('content-area').innerHTML = '<div class="lab-content">' + labHtml + '</div>';

  // Breadcrumb
  const shortSection = SECTIONS[sectionIndex].title.includes(':') ? SECTIONS[sectionIndex].title.split(':').slice(1).join(':').trim() : SECTIONS[sectionIndex].title;
  document.getElementById('breadcrumb-text').innerHTML = `<i data-lucide="folder" class="w-3.5 h-3.5"></i> ${shortSection} <span class="mx-1 text-gray-300">/</span> Lab ${labNumber}`;
  lucide.createIcons({ attrs: { class: 'inline-block' }, nameAttr: 'data-lucide' });

  // Nav buttons
  document.getElementById('nav-buttons').classList.remove('hidden');
  updateMarkCompleteBtn();

  // Prev/next
  const allLabs = SECTIONS.flatMap(s => s.labs);
  const idx = allLabs.findIndex(l => l.number === labNumber);
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  if (idx <= 0) { prevBtn.style.visibility = 'hidden'; } else { prevBtn.style.visibility = 'visible'; prevBtn.dataset.target = allLabs[idx-1].number; }
  if (idx >= allLabs.length-1) { nextBtn.style.visibility = 'hidden'; } else { nextBtn.style.visibility = 'visible'; nextBtn.dataset.target = allLabs[idx+1].number; }

  highlightSidebar();
  addCopyButtons();
  bindSolutionToggles();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function wrapSolution(html) {
  // Find the Solution: section - look for <p><strong>Solution:</strong></p>
  const solRegex = /(<p><strong>Solution:<\/strong><\/p>)/i;
  const match = html.match(solRegex);
  if (match) {
    const idx = html.indexOf(match[0]);
    const before = html.substring(0, idx);
    const after = html.substring(idx + match[0].length);
    return before + '<div class="solution-wrapper"><button class="solution-toggle-btn" data-action="toggle-solution"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg> Show Solution</button><div class="solution-content">' + match[0] + after + '</div></div>';
  }
  return html;
}

function bindSolutionToggles() {
  document.querySelectorAll('[data-action="toggle-solution"]').forEach(btn => {
    btn.addEventListener('click', function() {
      const wrapper = this.closest('.solution-wrapper');
      const content = wrapper.querySelector('.solution-content');
      const isVisible = content.classList.contains('visible');
      content.classList.toggle('visible');
      if (isVisible) {
        this.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg> Show Solution';
      } else {
        this.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg> Hide Solution';
      }
    });
  });
}

function addCopyButtons() {
  document.querySelectorAll('.lab-content pre').forEach(pre => {
    if (pre.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy';
    btn.addEventListener('click', function() {
      const code = pre.querySelector('code') ? pre.querySelector('code').textContent : pre.textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy';
        }, 2000);
      });
    });
    pre.style.position = 'relative';
    pre.appendChild(btn);
  });
}

function highlightSidebar() {
  document.querySelectorAll('.sidebar-lab').forEach(el => {
    const lab = el.dataset.lab;
    if (lab === 'intro') {
      el.classList.toggle('active', currentView === 'intro');
    } else {
      el.classList.toggle('active', parseInt(lab) === currentView);
    }
  });
}

function updateMarkCompleteBtn() {
  const btn = document.getElementById('mark-complete-btn');
  if (typeof currentView !== 'number') return;
  const done = progress[currentView];
  if (done) {
    btn.className = 'inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold transition-all cursor-pointer bg-success-100 text-success-700 border-2 border-success-400';
    btn.querySelector('span').textContent = 'Completed';
  } else {
    btn.className = 'inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold transition-all cursor-pointer bg-gray-100 text-gray-600 border-2 border-gray-300 hover:bg-success-50 hover:border-success-400 hover:text-success-600';
    btn.querySelector('span').textContent = 'Mark as Complete';
  }
}

function toggleLabComplete(labNumber) {
  if (progress[labNumber]) {
    delete progress[labNumber];
  } else {
    progress[labNumber] = true;
  }
  saveProgress();
  updateProgressUI();
  buildSidebar();
  if (currentView === labNumber) updateMarkCompleteBtn();
}

// ---- EVENT LISTENERS ----
function init() {
  loadProgress();
  updateProgressUI();
  buildSidebar();
  showIntro();

  // Sidebar click delegation
  document.getElementById('sidebar-nav').addEventListener('click', function(e) {
    // Intro link
    const introLink = e.target.closest('#intro-link');
    if (introLink) { showIntro(); closeMobile(); return; }

    // Section header toggle
    const header = e.target.closest('.section-header');
    if (header) {
      const si = parseInt(header.dataset.section);
      if (expandedSections.has(si)) expandedSections.delete(si); else expandedSections.add(si);
      buildSidebar();
      return;
    }

    // Lab click
    const labEl = e.target.closest('.sidebar-lab');
    if (labEl && labEl.dataset.lab && labEl.dataset.lab !== 'intro') {
      showLab(parseInt(labEl.dataset.lab));
      closeMobile();
    }
  });

  // Mark complete
  document.getElementById('mark-complete-btn').addEventListener('click', function() {
    if (typeof currentView === 'number') toggleLabComplete(currentView);
  });

  // Prev/Next
  document.getElementById('prev-btn').addEventListener('click', function() {
    if (this.dataset.target) showLab(parseInt(this.dataset.target));
  });
  document.getElementById('next-btn').addEventListener('click', function() {
    if (this.dataset.target) showLab(parseInt(this.dataset.target));
  });

  // Reset
  document.getElementById('reset-btn').addEventListener('click', function() {
    document.getElementById('confirm-dialog').classList.remove('hidden');
    document.getElementById('confirm-dialog').classList.add('flex');
  });
  document.getElementById('cancel-reset').addEventListener('click', function() {
    document.getElementById('confirm-dialog').classList.add('hidden');
    document.getElementById('confirm-dialog').classList.remove('flex');
  });
  document.getElementById('confirm-reset').addEventListener('click', function() {
    progress = {};
    saveProgress();
    updateProgressUI();
    buildSidebar();
    if (typeof currentView === 'number') updateMarkCompleteBtn();
    document.getElementById('confirm-dialog').classList.add('hidden');
    document.getElementById('confirm-dialog').classList.remove('flex');
  });

  // Mobile menu
  document.getElementById('mobile-menu-btn').addEventListener('click', function() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('open');
  });
  document.getElementById('sidebar-overlay').addEventListener('click', closeMobile);
}

function closeMobile() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

init();
lucide.createIcons();
</script>
</body>
